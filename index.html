<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />
<meta name="color-scheme" content="dark light" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AeroPlan Pro" />
<link rel="manifest" id="manifest-link" />
<title>AeroPlan Pro — UAV Manufacturing Planning</title>

<!-- jsPDF (PDF export). Loaded from CDN; app degrades gracefully if unavailable. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- QR code generation + camera scanning (optional; app degrades to manual check-in if offline). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
/* ============================================================
   AeroPlan Pro — Instrument-panel aerospace MES theme.
   Signature: a thin luminous "telemetry rail" running under the
   header, and data rendered like a flight-line readout (mono,
   tabular numerals, hairline rules). Quiet everywhere else.
   ============================================================ */

:root {
  --font-display: "Bahnschrift", "DIN Alternate", "Segoe UI Semibold", system-ui, sans-serif;
  --font-body: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Consolas", "Roboto Mono", monospace;
  --r: 6px;
  --rail: linear-gradient(90deg, transparent, var(--accent) 12%, var(--accent-2) 50%, var(--accent) 88%, transparent);
  --shadow: 0 1px 0 rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.25);
}

html[data-theme="dark"] {
  --bg: #0a0e14;
  --bg-2: #0e131c;
  --panel: #121927;
  --panel-2: #161f30;
  --line: #1e293b;
  --line-2: #273449;
  --ink: #e6edf6;
  --ink-2: #9fb0c6;
  --ink-3: #64748b;
  --accent: #38bdf8;      /* instrument cyan */
  --accent-2: #22d3ee;
  --amber: #f6a823;       /* caution */
  --green: #34d399;       /* on schedule */
  --red: #f43f5e;         /* critical */
  --blue: #60a5fa;        /* information */
  --orange: #fb923c;      /* curing / constraint */
  --grey: #64748b;
  --chip: #0b1220;
}
html[data-theme="light"] {
  --bg: #eef2f7;
  --bg-2: #e6ecf3;
  --panel: #ffffff;
  --panel-2: #f4f7fb;
  --line: #d7e0ea;
  --line-2: #c3d0de;
  --ink: #0e1726;
  --ink-2: #41526a;
  --ink-3: #7388a0;
  --accent: #0284c7;
  --accent-2: #0891b2;
  --amber: #b45309;
  --green: #047857;
  --red: #be123c;
  --blue: #1d4ed8;
  --orange: #c2410c;
  --grey: #64748b;
  --chip: #eef3f8;
  --shadow: 0 1px 0 rgba(0,0,0,.04), 0 6px 18px rgba(15,40,80,.08);
}
html[data-theme="ocean"] {
  --bg:#071a21; --bg-2:#0a212a; --panel:#0d2932; --panel-2:#10323d; --line:#163e4a; --line-2:#1e4f5e;
  --ink:#e0f2f1; --ink-2:#9fc6c9; --ink-3:#5f8a8f; --accent:#2dd4bf; --accent-2:#22d3ee;
  --amber:#fbbf24; --green:#34d399; --red:#fb7185; --blue:#38bdf8; --orange:#fb923c; --grey:#5f8a8f; --chip:#071a21;
}
html[data-theme="graphite"] {
  --bg:#15171a; --bg-2:#191c20; --panel:#1e2228; --panel-2:#23272e; --line:#2b3038; --line-2:#3a4049;
  --ink:#e8eaed; --ink-2:#a9b0ba; --ink-3:#6b7380; --accent:#7dd3fc; --accent-2:#5eead4;
  --amber:#fbbf24; --green:#4ade80; --red:#fb7185; --blue:#93c5fd; --orange:#fdba74; --grey:#6b7380; --chip:#15181d;
}
html[data-theme="nord"] {
  --bg:#2e3440; --bg-2:#2b303b; --panel:#3b4252; --panel-2:#434c5e; --line:#4c566a; --line-2:#5b6678;
  --ink:#eceff4; --ink-2:#d8dee9; --ink-3:#9aa4b8; --accent:#88c0d0; --accent-2:#8fbcbb;
  --amber:#ebcb8b; --green:#a3be8c; --red:#bf616a; --blue:#81a1c1; --orange:#d08770; --grey:#7b88a1; --chip:#2e3440;
}
html[data-theme="solarized"] {
  --bg:#002b36; --bg-2:#01303c; --panel:#073642; --panel-2:#0a3d49; --line:#0f4a57; --line-2:#155663;
  --ink:#eee8d5; --ink-2:#93a1a1; --ink-3:#657b83; --accent:#2aa198; --accent-2:#268bd2;
  --amber:#b58900; --green:#859900; --red:#dc322f; --blue:#268bd2; --orange:#cb4b16; --grey:#657b83; --chip:#002b36;
}
html[data-theme="contrast"] {
  --bg:#000000; --bg-2:#0a0a0a; --panel:#101010; --panel-2:#171717; --line:#2a2a2a; --line-2:#3d3d3d;
  --ink:#ffffff; --ink-2:#e2e2e2; --ink-3:#a3a3a3; --accent:#ffd400; --accent-2:#ffe34d;
  --amber:#ffb000; --green:#00e676; --red:#ff5252; --blue:#40c4ff; --orange:#ff9100; --grey:#9e9e9e; --chip:#000000;
}
html[data-theme="sandstone"] {
  --bg:#f3ede3; --bg-2:#ece4d6; --panel:#fffaf2; --panel-2:#f7f0e4; --line:#e3d8c5; --line-2:#d3c4ab;
  --ink:#3a322a; --ink-2:#6b5f50; --ink-3:#9a8b76; --accent:#b06a2c; --accent-2:#c98a3a;
  --amber:#b45309; --green:#3f7d4f; --red:#b3413c; --blue:#3b6ea5; --orange:#c2410c; --grey:#9a8b76; --chip:#f3ede3;
  --shadow:0 1px 0 rgba(0,0,0,.04), 0 6px 18px rgba(80,60,30,.10);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: var(--font-body); font-size: 13px; line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
button { font-family: inherit; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; border: 2px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* ---- App shell ---- */
.app { display: grid; grid-template-columns: 224px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }
.header {
  grid-column: 1 / -1; display: flex; align-items: center; gap: 16px;
  padding: 0 18px; background: var(--bg-2);
  border-bottom: 1px solid var(--line); position: relative; z-index: 30;
}
.header::after { content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background: var(--rail); opacity:.7; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand .glyph {
  width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center;
  background: radial-gradient(circle at 30% 25%, var(--accent), var(--accent-2));
  color: #04121c; font-weight: 800; font-family: var(--font-display); box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset;
}
.brand .name { font-family: var(--font-display); font-weight: 700; letter-spacing: .04em; font-size: 16px; }
.brand .name b { color: var(--accent); }
.brand .ver { font-size: 10px; color: var(--ink-3); letter-spacing:.14em; text-transform: uppercase; margin-top:2px; }
.header .spacer { flex: 1; }
.h-prog select, .h-prog input { background: var(--panel); color: var(--ink); border: 1px solid var(--line-2);
  padding: 6px 9px; border-radius: var(--r); font-size: 12px; }
.h-actions { display: flex; gap: 8px; align-items: center; }

.sidebar { background: var(--bg-2); border-right: 1px solid var(--line); padding: 12px 10px; overflow-y: auto; }
.nav-group-label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-3); padding: 12px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  padding: 8px 10px; margin: 2px 0; border-radius: var(--r); border: 1px solid transparent;
  background: transparent; color: var(--ink-2); cursor: pointer; font-size: 13px; transition: .12s;
}
.nav-item:hover { background: var(--panel); color: var(--ink); }
.nav-item.active { background: var(--panel-2); color: var(--ink); border-color: var(--line-2); }
.nav-item.active .nico { color: var(--accent); }
.nav-item .nico { width: 16px; height: 16px; color: var(--ink-3); flex: none; }
.nav-item .badge { margin-left: auto; font-size: 10px; background: var(--chip); border: 1px solid var(--line-2);
  color: var(--ink-2); padding: 1px 6px; border-radius: 20px; }

.main { overflow: auto; padding: 18px 22px 60px; }
.view-head { display:flex; align-items:flex-end; gap: 14px; margin-bottom: 16px; }
.view-head h1 { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing:.02em; margin:0; }
.view-head .sub { color: var(--ink-3); font-size: 12px; }
.view-head .spacer { flex:1; }

/* ---- Buttons ---- */
.btn { display:inline-flex; align-items:center; gap:7px; padding: 7px 12px; border-radius: var(--r);
  border: 1px solid var(--line-2); background: var(--panel); color: var(--ink); cursor: pointer;
  font-size: 12.5px; font-weight: 500; transition: .12s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--ink); }
.btn:active { transform: translateY(1px); }
.btn.primary { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color:#04121c; border-color: transparent; font-weight:700; }
.btn.primary:hover { filter: brightness(1.05); }
.btn.ghost { background: transparent; }
.btn.danger { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, var(--line-2)); }
.btn.danger:hover { background: color-mix(in srgb, var(--red) 14%, transparent); }
.btn.sm { padding: 5px 9px; font-size: 11.5px; }
.btn .ico { width: 15px; height: 15px; }
.icobtn { display:grid; place-items:center; width:32px; height:32px; border-radius: var(--r);
  border:1px solid var(--line-2); background: var(--panel); color: var(--ink-2); cursor:pointer; }
.icobtn:hover { color: var(--ink); border-color: var(--accent); }
.icobtn .ico { width:16px; height:16px; }

/* ---- Panels & cards ---- */
.panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow); }
.panel-h { display:flex; align-items:center; gap:10px; padding: 11px 14px; border-bottom: 1px solid var(--line); }
.panel-h h3 { margin:0; font-size: 13px; font-weight: 600; letter-spacing:.02em; }
.panel-h .eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color: var(--ink-3); }
.panel-b { padding: 14px; }
.grid { display: grid; gap: 14px; }
.cols-2 { grid-template-columns: 1fr 1fr; }
.cols-3 { grid-template-columns: repeat(3,1fr); }
.cols-4 { grid-template-columns: repeat(4,1fr); }
.cols-5 { grid-template-columns: repeat(5,1fr); }
@media (max-width: 1100px){ .cols-3,.cols-4,.cols-5 { grid-template-columns: repeat(2,1fr); } .cols-2{grid-template-columns:1fr;} }
/* ---- Responsive: phone / tablet / PC ---- */
.hamburger{ display:none; width:34px; height:34px; border:1px solid var(--line-2); background:var(--panel); color:var(--ink); border-radius:8px; place-items:center; cursor:pointer; flex:none; }
.hamburger svg{ width:18px; height:18px; }
.sidebar-tools{ display:none; }
.nav-backdrop{ display:none; }
@media (max-width: 1024px){
  .split{ grid-template-columns:1fr; height:auto; }
  .split .panel{ height:auto; }
  .split .panel .panel-b{ max-height:60vh; }
  .main{ padding:16px 16px 72px; }
  .cols-5{ grid-template-columns:repeat(3,1fr); }
}
@media (max-width: 760px){
  .app{ grid-template-columns:1fr; grid-template-rows:54px 1fr; }
  .hamburger{ display:grid; }
  .sidebar{ position:fixed; top:54px; left:0; bottom:0; width:250px; transform:translateX(-100%);
    transition:transform .22s ease; z-index:60; box-shadow:6px 0 26px rgba(0,0,0,.5); }
  .app.nav-open .sidebar{ transform:translateX(0); }
  .nav-backdrop{ position:fixed; inset:54px 0 0 0; background:rgba(0,0,0,.5); z-index:55; }
  .app.nav-open .nav-backdrop{ display:block; }
  .sidebar-tools{ display:flex; flex-direction:column; gap:8px; padding:4px 6px 12px; border-bottom:1px solid var(--line); margin-bottom:8px; }
  .sidebar-tools select, .sidebar-tools .btn{ width:100%; justify-content:center; }
  .sidebar-tools select{ background:var(--panel); color:var(--ink); border:1px solid var(--line-2); padding:9px; border-radius:8px; font-size:13px; }
  .header{ padding:0 12px; gap:10px; }
  .brand .ver{ display:none; }
  .brand .name{ font-size:14px; }
  .brand .glyph{ width:28px; height:28px; }
  .h-prog{ display:none; }
  .h-actions .desktop-only{ display:none; }
  .h-actions .btn.sm{ padding:8px 10px; }
  .main{ padding:12px 12px 84px; }
  .grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-5{ grid-template-columns:1fr; }
  .view-head{ flex-wrap:wrap; gap:8px; }
  .view-head h1{ font-size:18px; }
  .view-head .spacer{ display:none; }
  .modal{ width:96vw; max-height:92vh; }
  .g2-toolbar{ gap:6px; }
  .tbl{ font-size:12px; }
  .tabs{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
}
@media (max-width: 460px){
  .h-actions .btn.sm{ padding:8px; font-size:0; gap:0; }
  .h-actions .btn.sm .ico{ width:18px; height:18px; }
  .kpi .val{ font-size:24px; }
}
@media (hover:none){ .btn, .nav-item, .icobtn, .tab, select, input{ touch-action:manipulation; } }

/* ---- KPI ---- */
.kpi { background: var(--panel); border:1px solid var(--line); border-radius: var(--r); padding: 13px 14px; position: relative; overflow:hidden; }
.kpi::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--accent); opacity:.85; }
.kpi .label { font-size: 11px; color: var(--ink-3); letter-spacing:.06em; text-transform: uppercase; }
.kpi .val { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
.kpi .val .unit { font-size: 13px; color: var(--ink-3); margin-left: 3px; font-weight:500; }
.kpi .meta { font-size: 11px; color: var(--ink-2); margin-top: 3px; }
.kpi.k-green::before{background:var(--green);} .kpi.k-amber::before{background:var(--amber);}
.kpi.k-red::before{background:var(--red);} .kpi.k-blue::before{background:var(--blue);}

/* ---- Tables ---- */
table.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
table.tbl th { text-align: left; font-weight: 600; color: var(--ink-3); font-size: 10.5px;
  letter-spacing: .08em; text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--line-2); position: sticky; top: 0; background: var(--panel); }
table.tbl td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
table.tbl tr:hover td { background: var(--panel-2); }
table.tbl td.num, table.tbl th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
.tbl-wrap { overflow: auto; max-height: 100%; }

/* ---- Status / chips ---- */
.chip { display:inline-flex; align-items:center; gap:6px; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
.dot { width:7px; height:7px; border-radius:50%; flex:none; }
.s-grey{ color:var(--grey); background:color-mix(in srgb,var(--grey) 14%,transparent);} .s-grey .dot{background:var(--grey);}
.s-green{ color:var(--green); background:color-mix(in srgb,var(--green) 14%,transparent);} .s-green .dot{background:var(--green);}
.s-blue{ color:var(--blue); background:color-mix(in srgb,var(--blue) 14%,transparent);} .s-blue .dot{background:var(--blue);}
.s-orange{ color:var(--orange); background:color-mix(in srgb,var(--orange) 16%,transparent);} .s-orange .dot{background:var(--orange);}
.s-red{ color:var(--red); background:color-mix(in srgb,var(--red) 14%,transparent);} .s-red .dot{background:var(--red);}
.s-amber{ color:var(--amber); background:color-mix(in srgb,var(--amber) 16%,transparent);} .s-amber .dot{background:var(--amber);}

/* ---- Progress ---- */
.prog { height: 7px; background: var(--chip); border-radius: 20px; overflow:hidden; border:1px solid var(--line); }
.prog > span { display:block; height:100%; background: linear-gradient(90deg,var(--accent),var(--accent-2)); }
.prog.green>span{background:linear-gradient(90deg,var(--green),#10b981);}
.prog.amber>span{background:linear-gradient(90deg,var(--amber),#fbbf24);}
.prog.red>span{background:linear-gradient(90deg,var(--red),#fb7185);}

/* ---- Forms ---- */
.field { margin-bottom: 12px; }
.field label { display:block; font-size: 11px; color: var(--ink-2); margin-bottom: 5px; letter-spacing:.03em; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--bg); color: var(--ink); border: 1px solid var(--line-2);
  border-radius: var(--r); padding: 8px 10px; font-size: 12.5px; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
.field .hint { font-size: 10.5px; color: var(--ink-3); margin-top: 4px; }
.frow { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
.frow.three { grid-template-columns: 1fr 1fr 1fr; }

/* ---- Modal ---- */
.modal-bg { position: fixed; inset: 0; background: rgba(3,7,14,.62); backdrop-filter: blur(3px);
  display: grid; place-items: center; z-index: 100; padding: 24px; }
.modal { width: min(720px, 96vw); max-height: 90vh; overflow: auto; background: var(--panel);
  border: 1px solid var(--line-2); border-radius: 10px; box-shadow: 0 30px 80px rgba(0,0,0,.5); }
.modal-h { display:flex; align-items:center; padding: 14px 18px; border-bottom: 1px solid var(--line); position: sticky; top:0; background: var(--panel); z-index:2; }
.modal-h h3 { margin:0; font-family: var(--font-display); font-size: 16px; }
.modal-b { padding: 18px; }
.modal-f { display:flex; gap:10px; justify-content:flex-end; padding: 14px 18px; border-top: 1px solid var(--line); position: sticky; bottom:0; background: var(--panel); }

/* ---- Misc ---- */
.empty { text-align:center; padding: 48px 20px; color: var(--ink-3); }
.empty .ico { width: 38px; height: 38px; margin: 0 auto 12px; color: var(--line-2); }
.empty h4 { color: var(--ink-2); margin: 0 0 6px; font-weight:600; }
.toast-wrap { position: fixed; right: 18px; bottom: 18px; display:flex; flex-direction:column; gap:8px; z-index: 200; }
.toast { background: var(--panel); border:1px solid var(--line-2); border-left: 3px solid var(--accent);
  padding: 10px 14px; border-radius: var(--r); box-shadow: var(--shadow); font-size: 12.5px; min-width: 220px; animation: tin .2s ease; }
.toast.ok{border-left-color:var(--green);} .toast.warn{border-left-color:var(--amber);} .toast.err{border-left-color:var(--red);}
@keyframes tin { from{opacity:0; transform: translateX(20px);} to{opacity:1;transform:none;} }
.tag { font-size: 10px; padding: 1px 6px; border:1px solid var(--line-2); border-radius: 4px; color: var(--ink-3); }
.split { display:grid; grid-template-columns: 360px 1fr; gap: 14px; height: calc(100vh - 150px); }
.split .panel { overflow: hidden; display:flex; flex-direction: column; }
.split .panel .panel-b { overflow:auto; flex:1; }
.divider { height:1px; background: var(--line); margin: 14px 0; }
.inline-warn { display:flex; gap:8px; align-items:flex-start; padding:10px 12px; border-radius: var(--r);
  background: color-mix(in srgb, var(--amber) 12%, transparent); border:1px solid color-mix(in srgb,var(--amber) 35%, transparent); font-size:12px; color: var(--ink); margin-bottom: 10px; }
.inline-warn.err { background: color-mix(in srgb, var(--red) 12%, transparent); border-color: color-mix(in srgb,var(--red) 35%, transparent); }
.kv { display:grid; grid-template-columns: 130px 1fr; gap: 6px 12px; font-size: 12.5px; }
.kv dt { color: var(--ink-3); } .kv dd { margin:0; }
.muted { color: var(--ink-3); }
.right { text-align: right; }
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom: 14px; }
.tab { padding: 8px 14px; cursor:pointer; color: var(--ink-3); border-bottom: 2px solid transparent; font-size:12.5px; }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
canvas { display:block; }
.gantt-wrap { overflow: auto; border:1px solid var(--line); border-radius: var(--r); background: var(--bg); }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color: var(--ink-2); margin-top:10px; }
.legend i { width:11px; height:11px; border-radius:3px; display:inline-block; margin-right:5px; vertical-align:-1px; }

/* --- task modal / settings helpers --- */
.eqgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; }
.eqchk { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-2); }

/* ====================================================================================

     • Hierarchy: Program -> Aircraft -> Stage -> Task           (D1)

     • FS dependency gates on predecessor RELEASE (end of COOL)  (D3)
     • Stage gates (1..5) + audit log                            (D4)
     • Internal math in integer minutes; timestamps epoch-ms UTC; round at render only.
     • Worker -> duration: workMin = ceil(plannedLaborHours*60 / assignedWorkers)

<script>
/* ------------------------------------------------------------------ */
/* 3. APPLICATION STATE (single source of truth)                       */
/* ------------------------------------------------------------------ */
const State = {
  programs:[], aircraft:[], stages:[], tasks:[], dependencies:[], equipmentReqs:[],
  laborPools:[], equipment:[], calendars:[], gates:[], auditLogs:[], baselines:[],
  scenarios:[], templates:[], schedules:{}, /* programId -> Schedule */
  technicians:[], timeSessions:[],
  settings:{ userLabel:"Planner", theme:"dark", hoursPerDay:8, projectStartMs:null,
             companyName:"AeroPlan Pro", logoText:"APP", logoDataUrl:null },
  ui:{ module:"dashboard", activeProgram:null, activeAircraft:null, activeStage:null,
       taskFilter:"", lastConflicts:[], collapsedStages:{}, ganttCriticalOnly:false, ganttShowActual:true,
       checkinTech:null, checkinAircraft:null, checkinTask:null, checkinWorkers:1 }
};

/* ------------------------------------------------------------------ */
/* 4. PERSISTENCE — IndexedDB best-effort, in-memory fallback          */
/*    (JSON export is the real durability guarantee.)                  */
/* ------------------------------------------------------------------ */
const Persist = (function(){
  const DB_NAME="AeroPlanProDB", STORE="state", KEY="root";
  let db=null, ok=false;
  function open(){
    return new Promise((resolve)=>{
      try{
        if(!window.indexedDB){ resolve(false); return; }
        const req=indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded=()=>{ const d=req.result; if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE); };
        req.onsuccess=()=>{ db=req.result; ok=true; resolve(true); };
        req.onerror=()=>{ resolve(false); };
        req.onblocked=()=>{ resolve(false); };
      }catch(e){ resolve(false); }
    });
  }
  function save(snapshot){
    if(!ok||!db) return Promise.resolve(false);
    return new Promise((resolve)=>{
      try{
        const tx=db.transaction(STORE,"readwrite");
        tx.objectStore(STORE).put(snapshot, KEY);
        tx.oncomplete=()=>resolve(true); tx.onerror=()=>resolve(false);
      }catch(e){ resolve(false); }
    });
  }
  function load(){
    if(!ok||!db) return Promise.resolve(null);
    return new Promise((resolve)=>{
      try{
        const tx=db.transaction(STORE,"readonly");
        const r=tx.objectStore(STORE).get(KEY);
        r.onsuccess=()=>resolve(r.result||null); r.onerror=()=>resolve(null);
      }catch(e){ resolve(null); }
    });
  }
  return { open, save, load, get available(){ return ok; } };
})();

function snapshot(){
  return {
    version:SCHEMA_VERSION, savedAtMs:Date.now(),
    programs:State.programs, aircraft:State.aircraft, stages:State.stages, tasks:State.tasks,
    dependencies:State.dependencies, equipmentReqs:State.equipmentReqs, laborPools:State.laborPools,
    equipment:State.equipment, calendars:State.calendars, gates:State.gates, auditLogs:State.auditLogs,
    baselines:State.baselines, scenarios:State.scenarios, templates:State.templates,
    technicians:State.technicians, timeSessions:State.timeSessions,
    schedules:State.schedules, settings:State.settings, ui:State.ui
  };
}
function applySnapshot(s){
  if(!s) return;
  const keys=["programs","aircraft","stages","tasks","dependencies","equipmentReqs","laborPools",
    "equipment","calendars","gates","auditLogs","baselines","scenarios","templates","technicians","timeSessions"];
  keys.forEach(k=> State[k]=Array.isArray(s[k])?s[k]:[]);
  State.schedules = s.schedules||{};
  State.technicians=State.technicians||[]; State.timeSessions=State.timeSessions||[];
  State.settings = Object.assign({}, State.settings, s.settings||{});
  if(s.ui){ State.ui.activeProgram=s.ui.activeProgram||null; State.ui.activeAircraft=s.ui.activeAircraft||null; }
  normalizeCalendars(); normalizeTasks();
}

function normalizeTasks(){
  // backfill per-stage sequence where missing
  const byStage={}; State.tasks.forEach(t=>{ (byStage[t.stageId]=byStage[t.stageId]||[]).push(t); });
  Object.values(byStage).forEach(list=>{ if(list.some(t=>t.seq==null)){
    list.sort((a,b)=>(a.wbsCode||"").localeCompare(b.wbsCode||"",undefined,{numeric:true}));
    list.forEach((t,i)=>{ if(t.seq==null) t.seq=i+1; }); } });
  State.tasks.forEach(t=>{ if(t.cureMode==null){ const hasOven=State.equipmentReqs.some(r=>r.taskId===t.id&&r.equipmentType==="OVEN"); t.cureMode = hasOven?"OVEN":((t.curingDurationHrs||0)>0?"AMBIENT":"OVEN"); } });
}

/* Backfill calendar fields for older backups / ensure a usable calendar exists. */
function normalizeCalendars(){
  if(!State.calendars.length){
    State.calendars.push({ id:uid("cal"), name:"Standard 5\u00d78 (1 shift)", workingDays:[false,true,true,true,true,true,false],
      shifts:[{ id:uid("sh"), name:"Day Shift", startMin:480, endMin:990, breakStartMin:720, breakEndMin:750 }],
      overtime:{ enabled:false, extraMinPerDay:120, weekends:false }, holidays:[] });
  }
  State.calendars.forEach(c=>{
    if(!Array.isArray(c.workingDays)||c.workingDays.length!==7) c.workingDays=[false,true,true,true,true,true,false];
    if(!Array.isArray(c.shifts)||!c.shifts.length) c.shifts=[{ id:uid("sh"), name:"Day Shift", startMin:480, endMin:990, breakStartMin:720, breakEndMin:750 }];
    c.shifts.forEach(sh=>{ if(!sh.id) sh.id=uid("sh"); if(sh.name==null) sh.name="Shift";
      if(sh.startMin==null) sh.startMin=480; if(sh.endMin==null) sh.endMin=960;
      if(sh.breakStartMin===undefined) sh.breakStartMin=null; if(sh.breakEndMin===undefined) sh.breakEndMin=null; });
    if(!c.overtime||typeof c.overtime!=="object") c.overtime={ enabled:false, extraMinPerDay:120, weekends:false };
    if(c.overtime.extraMinPerDay==null) c.overtime.extraMinPerDay=120;
    if(!Array.isArray(c.holidays)) c.holidays=[];
  });
}

    status:"ACTIVE", aircraftIds:[], defaultCalendarId:cal.id, activeBaselineId:null, stageGating:false, lineMode:"off", lineScope:"program", optimizeLabor:false, createdAtMs:Date.now() };

      status:"PENDING", approvedBy:null, approvedAtMs:null, notes:"" }));

  addDependencyRecord(test.id, pp.id, "FS", 0);
  // Stage 10 — Paint
  const paint = mk(S(9),"Paint Scheme & Markings",{labor:18,skill:"PAINT_TECH",min:1,max:3,assigned:2,prio:6,cost:2200,paintBooth:true});

function newTaskRecord(stage, programId, name, opt={}){

    plannedLaborHours: opt.labor!=null?opt.labor:8, actualLaborHours:0,

function addDependencyRecord(taskId, predId, type, lagHours){

<script>
/* ================================================================== */
/* 5b. WORK CALENDAR — working days, shifts, breaks, overtime, holidays */
/*     Maps required working-minutes onto real wall-clock, skipping     */
/*     non-working time. Ovens/cooling run continuous wall-clock.       */
/* ================================================================== */
function activeCalendarId(programId){
  const p=byId(State.programs,programId);
  return (p && p.defaultCalendarId) || (State.calendars[0] && State.calendars[0].id) || null;
}
const WorkCal = (function(){
  function defaultCal(){ return { id:"__default", name:"Default", workingDays:[false,true,true,true,true,true,false],
    shifts:[{id:"s",name:"Day",startMin:480,endMin:990,breakStartMin:720,breakEndMin:750}],
    overtime:{enabled:false,extraMinPerDay:0,weekends:false}, holidays:[] }; }
  function get(id){ return byId(State.calendars,id) || State.calendars[0] || defaultCal(); }
  function dayKey(ms){ const d=new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }
  function isHoliday(cal,ms){ const k=dayKey(ms); return (cal.holidays||[]).some(h=>dayKey(h)===k); }
  /* Working ms-intervals within the calendar day that contains midnight `dm`. */
  function dayWindows(cal,dm){
    const dow=new Date(dm).getDay();
    const regular=(cal.workingDays||[])[dow];
    const ot=cal.overtime||{};
    const weekendOT= ot.enabled && ot.weekends;
    if(isHoliday(cal,dm)) return [];
    if(!regular && !weekendOT) return [];
    const shifts=(cal.shifts&&cal.shifts.length)? cal.shifts : [{startMin:480,endMin:960}];
    let wins=[];
    shifts.forEach(sh=>{ let a=sh.startMin, b=sh.endMin; if(b<=a) return;
      if(sh.breakStartMin!=null && sh.breakEndMin!=null && sh.breakEndMin>sh.breakStartMin && sh.breakStartMin>=a && sh.breakEndMin<=b){
        wins.push([a,sh.breakStartMin]); wins.push([sh.breakEndMin,b]);
      } else wins.push([a,b]);
    });
    if(ot.enabled && ot.extraMinPerDay>0 && wins.length){ let mi=0; for(let i=1;i<wins.length;i++) if(wins[i][1]>wins[mi][1]) mi=i;
      wins[mi][1]=Math.min(1440, wins[mi][1]+ot.extraMinPerDay); }
    wins.sort((a,b)=>a[0]-b[0]);
    const merged=[]; wins.forEach(w=>{ if(merged.length && w[0]<=merged[merged.length-1][1]) merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],w[1]); else merged.push([w[0],w[1]]); });
    return merged.map(([a,b])=>({s:dm+a*MIN, e:dm+b*MIN}));
  }
  function minutesPerWorkingDay(cal){
    const dow=(cal.workingDays||[]).findIndex(Boolean); if(dow<0) return 0;
    const probe=new Date(2024,0,7+ (dow%7)); probe.setHours(0,0,0,0);
    return Math.round(sum(dayWindows(cal,probe.getTime()),w=>(w.e-w.s)/MIN));
  }
  function nextWorkingStart(cal,ms){ let cur=ms;
    for(let i=0;i<400;i++){ const mid=dayKey(cur); const wins=dayWindows(cal,mid);
      for(const w of wins){ if(cur<w.s) return w.s; if(cur>=w.s && cur<w.e) return cur; }
      cur=mid+DAY; }
    return ms; }
  /* Consume `needMin` working-minutes from startMs; returns {endMs, intervals[]}. */
  function addWorkingTime(cal,startMs,needMin){
    if(needMin<=0) return { endMs:nextWorkingStart(cal,startMs), intervals:[] };
    let remaining=needMin*MIN, cur=startMs; const intervals=[]; let guard=0;
    while(remaining>0 && guard++<4000){ const mid=dayKey(cur); const wins=dayWindows(cal,mid); let used=false;
      for(const w of wins){ if(cur>=w.e) continue; const segStart=Math.max(cur,w.s); if(segStart>=w.e) continue;
        const avail=w.e-segStart;
        if(avail>=remaining){ intervals.push({s:segStart,e:segStart+remaining}); cur=segStart+remaining; remaining=0; used=true; break; }
        intervals.push({s:segStart,e:w.e}); remaining-=avail; cur=w.e; used=true; }
      if(remaining>0) cur=mid+DAY;
    }
    const merged=[]; intervals.forEach(iv=>{ if(merged.length && iv.s<=merged[merged.length-1].e) merged[merged.length-1].e=Math.max(merged[merged.length-1].e,iv.e); else merged.push({...iv}); });
    return { endMs:cur, intervals:merged };
  }
  function shiftOverlapMin(cal){ /* total overlapping minutes between shift windows on a working day (handover) */
    const shifts=(cal.shifts||[]).map(sh=>[sh.startMin,sh.endMin]).filter(([a,b])=>b>a).sort((a,b)=>a[0]-b[0]);
    let ov=0; for(let i=1;i<shifts.length;i++){ const prevEnd=Math.max(...shifts.slice(0,i).map(s=>s[1])); ov+=Math.max(0,Math.min(prevEnd,shifts[i][1])-shifts[i][0]); }
    return ov; }
  return { get, defaultCal, dayKey, isHoliday, dayWindows, minutesPerWorkingDay, nextWorkingStart, addWorkingTime, shiftOverlapMin };
})();
</script>

<script>
/* ================================================================== */
/* 6. SCHEDULING ENGINE                                                */
/*    All internal math in INTEGER MINUTES (00 §2). Timeline anchored  */
/*    to an epoch-ms project start; minute offsets -> ms at the edges. */
/* ================================================================== */
const Engine = (function(){
  let EXP_EFF=100; // expected/assumed labor efficiency % (planning factor) for the program being scheduled

  /* Worker -> duration (00 §3). Fixed-duration tasks bypass the formula. */
  function taskPhases(t, wOverride){
    let workMin;
    if(t.fixedDurationHrs!=null && t.fixedDurationHrs>0){
      workMin = Math.round(t.fixedDurationHrs*60);
    } else {
      const w = wOverride!=null? wOverride : clamp(t.assignedWorkers||1, Math.max(1,t.minWorkers||1), Math.max(t.minWorkers||1, t.maxWorkers||1));
      workMin = Math.ceil((t.plannedLaborHours||0)*60 / Math.max(1,w) * (100/Math.max(10,EXP_EFF)));
    }
    const cureMin = Math.round((t.curingDurationHrs||0)*60);
    const coolMin = Math.round((t.coolingDurationHrs||0)*60);
    return { workMin:Math.max(0,workMin), cureMin, coolMin, totalMin: Math.max(0,workMin)+cureMin+coolMin };
  }

  /* Build predecessor / successor adjacency for a task set */
  function buildGraph(tasks, deps){
    const ids=new Set(tasks.map(t=>t.id));
    const preds={}, succs={};
    tasks.forEach(t=>{ preds[t.id]=[]; succs[t.id]=[]; });
    deps.forEach(d=>{ if(ids.has(d.taskId)&&ids.has(d.predecessorId)){
      preds[d.taskId].push(d); succs[d.predecessorId].push(d); } });
    return {preds,succs};
  }

  /* Topological sort with cycle detection (Kahn). Returns {order, cyclic[]} */
  function topoSort(tasks, preds, succs){
    const indeg={}; tasks.forEach(t=>indeg[t.id]=preds[t.id].length);
    const q=tasks.filter(t=>indeg[t.id]===0).map(t=>t.id);
    const order=[];
    while(q.length){
      const id=q.shift(); order.push(id);
      (succs[id]||[]).forEach(d=>{ indeg[d.taskId]--; if(indeg[d.taskId]===0) q.push(d.taskId); });
    }
    const cyclic = tasks.filter(t=>!order.includes(t.id)).map(t=>t.id);
    return {order, cyclic};
  }

  /* Unconstrained CPM in minutes. Curing extends the chain (D3). */
  function cpm(tasks, deps){
    const {preds,succs}=buildGraph(tasks,deps);
    const {order,cyclic}=topoSort(tasks,preds,succs);
    const P={}; tasks.forEach(t=>P[t.id]=taskPhases(t));
    const ES={},EF={},LS={},LF={};
    // Forward pass
    order.forEach(id=>{
      const dur=P[id].totalMin;
      let es=0;
      preds[id].forEach(d=>{
        const lag=Math.round((d.lagHours||0)*60); const pd=P[d.predecessorId];
        if(d.type==="FS") es=Math.max(es,(EF[d.predecessorId]||0)+lag);          // gate on Release (D3)
        else if(d.type==="SS") es=Math.max(es,(ES[d.predecessorId]||0)+lag);
        else if(d.type==="FF") es=Math.max(es,(EF[d.predecessorId]||0)+lag-dur);
        else if(d.type==="SF") es=Math.max(es,(ES[d.predecessorId]||0)+lag-dur);
      });
      ES[id]=Math.max(0,es); EF[id]=ES[id]+dur;
    });
    const projEnd=Math.max(0,...tasks.map(t=>EF[t.id]||0));
    // Backward pass
    [...order].reverse().forEach(id=>{
      const dur=P[id].totalMin;
      let lf=projEnd;
      succs[id].forEach(d=>{
        const lag=Math.round((d.lagHours||0)*60); const sdur=P[d.taskId].totalMin;
        if(d.type==="FS") lf=Math.min(lf,(LS[d.taskId]||projEnd)-lag);
        else if(d.type==="SS") lf=Math.min(lf,(LS[d.taskId]||projEnd)-lag+dur);
        else if(d.type==="FF") lf=Math.min(lf,(LF[d.taskId]||projEnd)-lag);
        else if(d.type==="SF") lf=Math.min(lf,(LF[d.taskId]||projEnd)-lag+dur);
      });
      LF[id]=lf; LS[id]=lf-dur;
    });
    const out={};
    tasks.forEach(t=>{ const f=(LS[t.id]||0)-(ES[t.id]||0);
      out[t.id]={ es:ES[t.id]||0, ef:EF[t.id]||0, ls:LS[t.id]||0, lf:LF[t.id]||0,
        floatMin: Math.round(f), critical: Math.round(f)<=0, phases:P[t.id] }; });
    return { cpm:out, order, cyclic, projEnd, preds, succs };
  }

  /* -----------------------------------------------------------------
     Resource-constrained serial schedule generation (SGS).
     Continuous wall-clock time (robust + deterministic). Honors:
       • dependency precedence (FS on Release, SS/FF/SF)
       • labor pool capacity (headcount per skill)
       • equipment capacity (units per type), no double-booking
       • curing: labor freed during CURE/COOL; oven held WORK+CURE;
         storage rack held during COOL (D2).
     ----------------------------------------------------------------- */
  function schedule(programId){
    { const _p=byId(State.programs,programId); EXP_EFF=clamp(_p&&_p.expectedEfficiency?_p.expectedEfficiency:100,10,200); }
    const tasks=State.tasks.filter(t=>t.programId===programId);
    const deps=State.dependencies.filter(d=>tasks.some(t=>t.id===d.taskId));
    const conflicts=[];
    const base=projectStart();
    if(tasks.length===0) return { taskSchedules:[], assignments:[], conflicts, computedAtMs:Date.now(), programId, projectStartMs:base, projectFinishMs:base };

    const cal=WorkCal.get(activeCalendarId(programId));
    if(WorkCal.minutesPerWorkingDay(cal)<=0)
      conflicts.push({kind:"CALENDAR",severity:"err",msg:"The active calendar has no working time (no working days or empty shifts). Tasks cannot be placed. Fix it in Settings → Working Calendar.",taskIds:[]});

    const c=cpm(tasks,deps);
    if(c.cyclic.length) conflicts.push({kind:"CYCLE",severity:"err",msg:`Cyclic dependency detected (${c.cyclic.length} task(s) cannot be ordered). Remove the loop to schedule.`,taskIds:c.cyclic});

    const laborCap={}; LABOR_SKILLS.forEach(s=>laborCap[s]=sum(State.laborPools.filter(p=>p.category===s),p=>p.headcount));
    const equipCap={}; EQUIP_TYPES.forEach(t=>equipCap[t]=sum(State.equipment.filter(e=>e.type===t),e=>e.units));
    const equipCont={}; EQUIP_TYPES.forEach(t=>{ const list=State.equipment.filter(e=>e.type===t); equipCont[t]= list.length? list.every(e=>e.continuousOperation):(t==="OVEN"); });

    const ledger={}; const bookKey=(k,n)=>k+":"+n;
    function maxConcurrent(key,s,e){ const arr=ledger[key]; if(!arr) return 0; let evs=[];
      for(const b of arr){ if(b.e<=s||b.s>=e) continue; evs.push([Math.max(b.s,s),b.units],[Math.min(b.e,e),-b.units]); }
      if(!evs.length) return 0; evs.sort((a,b)=>a[0]-b[0]||a[1]-b[1]); let cur=0,mx=0; for(const[,d]of evs){cur+=d; if(cur>mx)mx=cur;} return mx; }

      const workStart= work.intervals.length? work.intervals[0].s : WorkCal.nextWorkingStart(cal,wsMs);
      const workEnd= work.intervals.length? work.endMs : workStart;
      const cureEnd= workEnd + P.cureMin*MIN;   // ovens cure continuous wall-clock
      const coolEnd= cureEnd + P.coolMin*MIN;   // cooling continuous wall-clock

    }
    /* resource bookings (ms intervals) for the task at this layout */
    function bookings(t,P,L,workersArg){
      const out=[]; const reqs=State.equipmentReqs.filter(r=>r.taskId===t.id);
      const workers= workersArg!=null? workersArg : clamp(t.assignedWorkers||1, Math.max(1,t.minWorkers||1), Math.max(t.minWorkers||1,t.maxWorkers||1));
      if(P.workMin>0 && ((t.plannedLaborHours||0)>0 || (t.fixedDurationHrs||0)>0) && L.workIntervals.length)
        out.push({key:bookKey("LABOR",t.laborSkill),cap:laborCap[t.laborSkill]||0,units:workers,intervals:L.workIntervals,kind:"LABOR",res:t.laborSkill,phase:"WORK"});
      reqs.forEach(r=>{ const cap=equipCap[r.equipmentType]||0; const cont=equipCont[r.equipmentType]; let ivs=[];
        if(r.phase==="WORK") ivs= cont? [{s:L.workStart,e:L.workEnd}] : L.workIntervals;
        else if(r.phase==="CURE") ivs=[{s:L.workEnd,e:L.cureEnd}];
        else if(r.phase==="COOL") ivs=[{s:L.cureEnd,e:L.coolEnd}];

      if(P.coolMin>0) out.push({key:bookKey("EQUIP","STORAGE_RACK"),cap:equipCap["STORAGE_RACK"]||0,units:1,intervals:[{s:L.cureEnd,e:L.coolEnd}],kind:"EQUIP",res:"STORAGE_RACK",phase:"COOL"});

    function approxSpan(t,P,refMs){ const ws=WorkCal.nextWorkingStart(cal,refMs); const w=WorkCal.addWorkingTime(cal,ws,P.workMin); return (w.endMs-ws)+P.cureMin*MIN+P.coolMin*MIN; }

    tasks.forEach(t=>{ const a=t.assignedWorkers||0;
      if(a<(t.minWorkers||1)||a>(t.maxWorkers||1)) conflicts.push({kind:"WORKER_BOUNDS",severity:"warn",msg:`"${t.name}" assigned ${a} workers outside [${t.minWorkers}, ${t.maxWorkers}].`,taskIds:[t.id]});
      const need=clamp(a,1,99);
      if((laborCap[t.laborSkill]||0)<need && (t.plannedLaborHours||0)>0) conflicts.push({kind:"LABOR_SHORTAGE",severity:"err",msg:`"${t.name}" needs ${need} ${SKILL_LABEL[t.laborSkill]} but pool capacity is ${laborCap[t.laborSkill]||0}.`,taskIds:[t.id]});
      State.equipmentReqs.filter(r=>r.taskId===t.id).forEach(r=>{ if((equipCap[r.equipmentType]||0)<(r.quantity||1)) conflicts.push({kind:"EQUIP_SHORTAGE",severity:"err",msg:`"${t.name}" needs ${r.quantity||1}× ${EQUIP_LABEL[r.equipmentType]} but only ${equipCap[r.equipmentType]||0} unit(s) exist.`,taskIds:[t.id]}); });

    const workStartMs={}, finishMs={}, placed={}; const assignments=[], taskSchedules=[];
    // Stage gating (decision): when ON, a stage starts only after every task in earlier stages of the same aircraft is released.
    const program=byId(State.programs,programId); const gating=!!(program&&program.stageGating);
    const stInfo={}; tasks.forEach(t=>{ const st=byId(State.stages,t.stageId); stInfo[t.id]={ac: st?st.aircraftId:null, seq: st?st.sequence:0, tseq: t.seq||0, gated: st?!!st.gated:false}; });
    // Production-line gating across aircraft (serial / pulse). Stations = stages.
    const lineMode=(program&&program.lineMode)||"off"; const lineScope=(program&&program.lineScope)||"program";
    const acListP=State.aircraft.filter(a=>a.programId===programId);
    const grpOf=(acId)=>{ const a=byId(State.aircraft,acId); if(!a) return "ALL"; return lineScope==="model"? ("M:"+(a.model||"")) : "ALL"; };
    const _grp={}; acListP.forEach(a=>{ const g=grpOf(a.id); (_grp[g]=_grp[g]||[]).push(a); });
    const buildIdx={}; Object.keys(_grp).forEach(g=>{ _grp[g].slice().sort((x,y)=> ((x.buildSeq||0)-(y.buildSeq||0)) || ((x.plannedStartMs||0)-(y.plannedStartMs||0)) || String(x.serialNumber||"").localeCompare(String(y.serialNumber||""),undefined,{numeric:true})).forEach((a,i)=>buildIdx[a.id]=i); });
    tasks.forEach(t=>{ const inf=stInfo[t.id]; if(inf){ inf.grp= inf.ac!=null? grpOf(inf.ac):"ALL"; inf.bi= inf.ac!=null? (buildIdx[inf.ac]||0):0; } });
    const stageMax={}; // aircraftId -> { stageSeq -> max release(finish)Ms }
    const order=[...c.order].sort((a,b)=>{
      const A=stInfo[a]||{}, B=stInfo[b]||{};
      if(lineMode!=="off"){
        // Flow line: process tail-by-tail (build order) within each scope group, in station order.
        if((A.grp||"")!==(B.grp||"")) return (A.grp||"")<(B.grp||"")?-1:1;
        if((A.bi||0)!==(B.bi||0)) return (A.bi||0)-(B.bi||0);
        if(A.seq!==B.seq) return A.seq-B.seq;
        if((A.tseq||0)!==(B.tseq||0)) return (A.tseq||0)-(B.tseq||0);
      } else if(A.ac===B.ac){ if(A.seq!==B.seq) return A.seq-B.seq; if(A.tseq!==B.tseq) return (A.tseq||0)-(B.tseq||0); }

    // Each aircraft begins no earlier than its planned-window start date (falls back to the program/project start).
    function acStartFor(id){ const acId=stInfo[id]&&stInfo[id].ac; const ac=acId?byId(State.aircraft,acId):null; return (ac&&ac.plannedStartMs)? ac.plannedStartMs : base; }
    order.forEach(id=>{
      const t=byId(tasks,id); if(!t) return;
      const acFloor=acStartFor(id); let eps=acFloor;
      (c.preds[id]||[]).forEach(d=>{ const lag=(d.lagHours||0)*HOUR; const pf=finishMs[d.predecessorId], ps=workStartMs[d.predecessorId];
        if(pf==null||ps==null) return;

        else if(d.type==="SS") eps=Math.max(eps, ps+lag);
        else if(d.type==="FF") eps=Math.max(eps, pf+lag-approxSpan(t,P,pf));

        if(gateThis && inf && inf.ac!=null){ const sm=stageMax[inf.ac]||{};

      if(lineMode!=="off"){ const inf=stInfo[id]; const g=inf.grp||"ALL"; let ls=lineState[g];
        if(!ls){ ls={curBi:inf.bi,prevAcFinish:0,prevStationRelease:{},curStationRelease:{}}; lineState[g]=ls; }
        if(inf.bi!==ls.curBi){ let mx=0; for(const k in ls.curStationRelease) mx=Math.max(mx,ls.curStationRelease[k]);
          ls.prevAcFinish=mx; ls.prevStationRelease=ls.curStationRelease; ls.curStationRelease={}; ls.curBi=inf.bi; }
        if(inf.bi>0){ if(lineMode==="serial") eps=Math.max(eps, ls.prevAcFinish||0);
          else if(lineMode==="pulse") eps=Math.max(eps, ls.prevStationRelease[inf.seq]||0); } }
      eps=WorkCal.nextWorkingStart(cal, Math.max(eps,acFloor));

      // Resource-aware worker allocation. FIXED honours assignedWorkers; OPTIMIZE puts
      // otherwise-idle technicians to work (up to maxWorkers) so bottlenecks finish sooner
      // and the next station is unblocked earlier — maximising utilisation, cutting idle time.
      const mn=Math.max(1,t.minWorkers||1), mx=Math.max(mn,t.maxWorkers||mn);
      const optimize = (!!(program&&program.optimizeLabor) || t.allocationMode==="OPTIMIZE") && (t.plannedLaborHours||0)>0 && !((t.fixedDurationHrs||0)>0);
      const fixedW=clamp(t.assignedWorkers||mn, mn, mx); const labKey=bookKey("LABOR",t.laborSkill); const labCap=laborCap[t.laborSkill]||0;

      { const inf=stInfo[id]; if(inf && inf.ac!=null){ (stageMax[inf.ac]=stageMax[inf.ac]||{});
        stageMax[inf.ac][inf.seq]=Math.max(stageMax[inf.ac][inf.seq]||0, cl.coolEnd); } }
      if(lineMode!=="off"){ const inf=stInfo[id]; const ls=lineState[inf.grp||"ALL"]; if(ls){ ls.curStationRelease[inf.seq]=Math.max(ls.curStationRelease[inf.seq]||0, cl.coolEnd); } }

        earlyStartMs:cl.workStart, earlyFinishMs:cl.coolEnd, lateStartMs:cl.workStart+floatMs, lateFinishMs:cl.coolEnd+floatMs,
        totalFloatMin:cc.floatMin, onCriticalPath:cc.critical, workMin:cP.workMin, cureMin:cP.cureMin, coolMin:cP.coolMin, workers:cw });
    });

    const unplaced=tasks.filter(t=>!placed[t.id] && !c.cyclic.includes(t.id));
    if(unplaced.length) conflicts.push({kind:"DEADLOCK",severity:"err",msg:`${unplaced.length} task(s) could not be scheduled (resource starvation).`,taskIds:unplaced.map(t=>t.id)});

    const projFinishMs= taskSchedules.length? Math.max(...taskSchedules.map(s=>s.finishMs)) : base;

  }

  }

  return { schedule, cpm, taskPhases, projectStart };
})();

/* Run + cache schedule for a program; surface conflicts in UI state. */
function runSchedule(programId, silent){
  if(!programId) return null;
  const res=Engine.schedule(programId);
  State.schedules[programId]=res;
  State.ui.lastConflicts=res.conflicts||[];
  audit("SCHEDULE", programId, "RECOMPUTE", null, null, `${res.taskSchedules.length} tasks, ${res.conflicts.length} conflict(s)`);
  persist();
  if(!silent){
    const errs=res.conflicts.filter(c=>c.severity==="err").length;
    if(errs) toast(`Scheduled with ${errs} blocking conflict(s). See warnings.`, "warn");
    else toast(`Schedule computed — ${res.taskSchedules.length} tasks placed.`, "ok");

}
function currentSchedule(){ const p=State.ui.activeProgram; return p?State.schedules[p]:null; }

/* ================================================================== */
/* 7. ANALYTICS — capacity, utilization, EVM, bottlenecks, forecast    */
/* ================================================================== */
const Analytics = (function(){

  /* Daily capacity buckets per labor skill and equipment type. */
  function capacityBuckets(programId){
    const sched=State.schedules[programId];
    if(!sched||!sched.assignments.length) return {days:[],nDays:0,labor:{},equip:{},laborCapDayTotal:[],equipCapDayTotal:[]};
    const cal=WorkCal.get(activeCalendarId(programId));
    const start=sched.projectStartMs, end=sched.projectFinishMs;
    const nDays=clamp(daysBetween(start,end)+1,1,400);
    const dayStart=new Date(start); dayStart.setHours(0,0,0,0);
    const days=[]; for(let i=0;i<nDays;i++) days.push(dayStart.getTime()+i*DAY);
    const winMin=days.map(d=>sum(WorkCal.dayWindows(cal,d),w=>(w.e-w.s)/MIN));   // working minutes per day
    const labor={}, equip={};
    LABOR_SKILLS.forEach(sk=>{ const hc=sum(State.laborPools.filter(p=>p.category===sk),p=>p.headcount);
      labor[sk]={headcount:hc, alloc:new Array(nDays).fill(0), capDay:winMin.map(m=>hc*m/60)}; });
    EQUIP_TYPES.forEach(t=>{ const list=State.equipment.filter(e=>e.type===t); const u=sum(list,e=>e.units);
      const cont= list.length? list.every(e=>e.continuousOperation):(t==="OVEN");
      equip[t]={units:u, continuous:cont, alloc:new Array(nDays).fill(0),
        capDay: winMin.map(m=> u? (cont? u*24 : u*m/60) : 0)}; });
    sched.assignments.forEach(a=>{ const tgt= a.resourceKind==="LABOR"? labor[a.resourceId]: equip[a.resourceId]; if(!tgt) return;
      for(let i=0;i<nDays;i++){ const ds=days[i], de=ds+DAY; const ov=Math.min(a.endMs,de)-Math.max(a.startMs,ds); if(ov>0) tgt.alloc[i]+=(ov/HOUR)*a.units; } });
    const laborCapDayTotal=days.map((d,i)=>sum(Object.values(labor),L=>L.capDay[i]));
    const equipCapDayTotal=days.map((d,i)=>sum(Object.values(equip),E=>E.capDay[i]));
    return {days,nDays,labor,equip,laborCapDayTotal,equipCapDayTotal};
  }

  function utilizationSummary(programId){
    const b=capacityBuckets(programId);
    const out={labor:{},equip:{},peakLabor:0,peakEquip:0};
    Object.keys(b.labor||{}).forEach(sk=>{ const L=b.labor[sk]; const tA=sum(L.alloc), tC=sum(L.capDay);
      let peak=0; L.alloc.forEach((v,i)=>{ if(L.capDay[i]>0) peak=Math.max(peak, v/L.capDay[i]*100); });
      out.labor[sk]={util:round(tC>0?tA/tC*100:0,1), peak:round(peak,0), headcount:L.headcount};
      out.peakLabor=Math.max(out.peakLabor,peak); });
    Object.keys(b.equip||{}).forEach(t=>{ const E=b.equip[t]; if(E.units===0){ out.equip[t]={util:0,peak:0,units:0}; return; }
      const tA=sum(E.alloc), tC=sum(E.capDay); let peak=0; E.alloc.forEach((v,i)=>{ if(E.capDay[i]>0) peak=Math.max(peak, v/E.capDay[i]*100); });
      out.equip[t]={util:round(tC>0?tA/tC*100:0,1), peak:round(peak,0), units:E.units};
      out.peakEquip=Math.max(out.peakEquip,peak); });
    return out;
  }

  function utilClass(p){ if(p>100) return "red"; if(p>=85) return "amber"; if(p>=60) return "green"; return "blue"; }
  function utilStatus(p){ if(p>100) return "Overallocated"; if(p>=85) return "High"; if(p>=60) return "Healthy"; return "Underutilized"; }

  /* Bottleneck detection from utilization + curing queue. */
  function bottlenecks(programId){
    const u=utilizationSummary(programId); const list=[];
    Object.entries(u.equip).forEach(([t,d])=>{ if(d.units>0 && d.peak>=85)
      list.push({sev:d.peak>100?"red":"amber",type:"Equipment",name:EQUIP_LABEL[t],val:d.peak,
        rec: d.peak>100? `Add ${EQUIP_LABEL[t]} capacity or add a shift` : "Monitor — near capacity"}); });
    Object.entries(u.labor).forEach(([s,d])=>{ if(d.peak>=85)
      list.push({sev:d.peak>100?"red":"amber",type:"Labor",name:SKILL_LABEL[s],val:d.peak,
        rec: d.peak>100? `Add ${SKILL_LABEL[s]} headcount or overtime` : "Monitor — near capacity"}); });
    return list.sort((a,b)=>b.val-a.val);
  }

  /* Earned Value Management against active baseline (or live plan). */
  function evm(programId){
    const tasks=State.tasks.filter(t=>t.programId===programId);
    if(!tasks.length) return null;
    const BAC=sum(tasks,t=>t.plannedCost||0);
    const EV=sum(tasks,t=>(t.plannedCost||0)*(t.percentComplete||0)/100);
    const AC=sum(tasks,t=>t.actualCost||0);
    // Planned Value = planned cost of work that should be complete by "now" per schedule.
    const sched=State.schedules[programId]; const now=Date.now(); let PV=0;
    if(sched){
      const map={}; sched.taskSchedules.forEach(s=>map[s.taskId]=s);
      tasks.forEach(t=>{ const s=map[t.id]; if(!s){ return; }
        if(now>=s.finishMs) PV+=t.plannedCost||0;

  /* Forecast completion (optimistic / expected / pessimistic). */
  function forecast(programId){
    const sched=State.schedules[programId]; if(!sched) return null;
    const e=evm(programId); const spi= e? e.SPI:1;
    const expected=sched.projectFinishMs;
    const span=expected-sched.projectStartMs;
    const slip= spi>0 ? span*(1/spi - 1) : 0;

    const pess= exp + span*0.15;

    if(spi<0.9 || (e&&e.CPI<0.9)){ risk="High"; riskCls="s-red"; }
    else if(spi<0.98){ risk="Medium"; riskCls="s-amber"; }
    const conf= clamp(round(100 - Math.abs(1-spi)*180 - (sched.conflicts.filter(c=>c.severity==="err").length*12),0),20,98);

  }

  function workingHoursBetween(cal,a,b){ if(!cal||!a||!b||b<=a) return 0; let mins=0; const d=new Date(a); d.setHours(0,0,0,0);
    for(let t=d.getTime(); t<b; t+=DAY){ WorkCal.dayWindows(cal,t).forEach(w=>{ const s=Math.max(w.s,a), e=Math.min(w.e,b); if(e>s) mins+=(e-s)/MIN; }); } return mins/60; }

  /* Per-aircraft (unit) labor efficiency.
     achieved = earned (standard hrs completed) / actual hrs expended.
     required = standard hrs / labor capacity available inside the aircraft's planned window. */
  function efficiency(programId){
    const prog=byId(State.programs,programId); const expectedEff= prog&&prog.expectedEfficiency? prog.expectedEfficiency : 100;
    const sched=State.schedules[programId]; const cal=WorkCal.get(activeCalendarId(programId));
    const map={}; if(sched) sched.taskSchedules.forEach(s=>map[s.taskId]=s);
    const acs=State.aircraft.filter(a=>a.programId===programId).slice().sort((a,b)=>(a.plannedStartMs||0)-(b.plannedStartMs||0));
    const units=acs.map((ac,idx)=>{
      const stageIds=State.stages.filter(s=>s.aircraftId===ac.id).map(s=>s.id);
      const tasks=State.tasks.filter(t=>stageIds.includes(t.stageId));
      const std=sum(tasks,t=>t.plannedLaborHours||0);
      const act=sum(tasks,t=>t.actualLaborHours||0);
      const earned=sum(tasks,t=>(t.plannedLaborHours||0)*(t.percentComplete||0)/100);
      const pct= tasks.length? round(sum(tasks,t=>t.percentComplete||0)/tasks.length,0):0;
      const winHrs= workingHoursBetween(cal, ac.plannedStartMs, ac.plannedFinishMs);
      const avgCrew= std>0? sum(tasks,t=>(t.plannedLaborHours||0)*Math.max(1,t.assignedWorkers||1))/std : 1;
      const capHrs= winHrs*avgCrew;
      const requiredEff= capHrs>0? round(std/capHrs*100,0): null;
      const achievedEff= act>0? round(earned/act*100,0): null;
      const starts=tasks.map(t=>map[t.id]&&map[t.id].startMs).filter(Boolean);
      const fins=tasks.map(t=>map[t.id]&&map[t.id].finishMs).filter(Boolean);
      const complete= tasks.length>0 && tasks.every(t=>t.status==="COMPLETE");
      return { id:ac.id, unit:idx+1, serial:ac.serialNumber, model:ac.model, taskCount:tasks.length,
        std:round(std,0), act:round(act,0), earned:round(earned,0), pct,
        requiredEff, achievedEff, winHrs:round(winHrs,0), capHrs:round(capHrs,0), avgCrew:round(avgCrew,1),
        plannedStartMs:ac.plannedStartMs, plannedFinishMs:ac.plannedFinishMs,
        schedStartMs: starts.length?Math.min(...starts):null, schedFinishMs: fins.length?Math.max(...fins):null, complete };
    });
    const totStd=sum(units,u=>u.std), totAct=sum(units,u=>u.act), totEarned=sum(units,u=>u.earned);
    const progAchieved= totAct>0? round(totEarned/totAct*100,0): null;
    const rq=units.map(u=>u.requiredEff).filter(v=>v!=null);
    const progRequired= rq.length? round(rq.reduce((a,b)=>a+b,0)/rq.length,0): null;
    const built= units.filter(u=>u.act>0).length;
    return { units, totStd:round(totStd,0), totAct:round(totAct,0), totEarned:round(totEarned,0), progAchieved, progRequired, built, expectedEff };
  }

  /* Wright unit learning curve across serial units with recorded actual hours: Y(n)=T1 * n^b, LR=2^b. */
  function learningCurve(programId){
    const eff=efficiency(programId);
    const pts=eff.units.filter(u=>u.act>0).map(u=>({n:u.unit, serial:u.serial, hrs:u.act, std:u.std, eff:u.achievedEff, complete:u.complete}));
    if(pts.length<2) return { points:pts, enough:false, eff };
    const xs=pts.map(p=>Math.log(p.n)), ys=pts.map(p=>Math.log(p.hrs)); const n=pts.length;
    const sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
    const sxx=xs.reduce((a,x)=>a+x*x,0), sxy=xs.reduce((a,x,i)=>a+x*ys[i],0);
    const denom=(n*sxx - sx*sx); const b= Math.abs(denom)<1e-9? 0 : (n*sxy - sx*sy)/denom;
    const lnT1=(sy - b*sx)/n, T1=Math.exp(lnT1), LR=Math.pow(2,b);
    const ymean=sy/n; let ssTot=0, ssRes=0; ys.forEach((yv,i)=>{ const pred=lnT1+b*xs[i]; ssRes+=(yv-pred)*(yv-pred); ssTot+=(yv-ymean)*(yv-ymean); });
    const r2= ssTot>0? 1-ssRes/ssTot : 1;
    const fit=k=>T1*Math.pow(k,b); const obsMax=Math.max(...pts.map(p=>p.n));
    const curve=[]; for(let k=1;k<=obsMax+5;k++) curve.push({n:k, hrs:fit(k)});
    const proj=[]; for(let k=obsMax+1;k<=obsMax+5;k++) proj.push({n:k, hrs:round(fit(k),0)});
    return { points:pts, enough:true, eff, T1:round(T1,0), b:round(b,3), LR:round(LR*100,1),
      slopePct:round((1-LR)*100,1), r2:round(r2,3), fit, curve, proj, obsMax };
  }

  return { capacityBuckets, utilizationSummary, utilClass, utilStatus, bottlenecks, evm, forecast, efficiency, learningCurve };
})();
</script>

<script>
/* ================================================================== */
/* 8. LIGHTWEIGHT CHARTS (dependency-free SVG + Canvas)                 */
/* ================================================================== */
const Chart = (function(){
  const C=()=> getComputedStyle(document.documentElement);
  function cssVar(n){ return C().getPropertyValue(n).trim(); }

  function donut(pct, label, color){
    pct=clamp(pct,0,100); const r=52,cx=70,cy=70,circ=2*Math.PI*r;
    const off=circ*(1-pct/100); const col=color||cssVar("--accent");
    return `<svg viewBox="0 0 140 140" style="width:140px;height:140px">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cssVar("--line")}" stroke-width="12"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"
        stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy-2}" text-anchor="middle" fill="${cssVar('--ink')}" font-size="26" font-weight="700" font-family="var(--font-display)">${round(pct,0)}%</text>
      <text x="${cx}" y="${cy+18}" text-anchor="middle" fill="${cssVar('--ink-3')}" font-size="10" letter-spacing="1">${esc(label||"")}</text>
    </svg>`;
  }

  /* Horizontal bar list: [{label, value, max, color}] */
  function hbars(rows, opts={}){
    const max=opts.max||Math.max(1,...rows.map(r=>r.max||r.value));
    return `<div style="display:flex;flex-direction:column;gap:9px">`+rows.map(r=>{
      const pct=clamp((r.value/(r.max||max))*100,0,140);
      const col=r.color||cssVar("--accent");
      const over=pct>100;
      return `<div>
        <div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px">
          <span class="muted">${esc(r.label)}</span>
          <span class="mono" style="color:${over?cssVar('--red'):cssVar('--ink-2')}">${round(r.value,0)}${opts.unit||""}${r.sub?` <span class="muted">${esc(r.sub)}</span>`:""}</span>
        </div>
        <div class="prog" style="height:9px"><span style="width:${Math.min(100,pct)}%;background:${col}"></span></div>
      </div>`;
    }).join("")+`</div>`;
  }

  /* Stacked daily capacity histogram (allocated vs available). Canvas. */
  function histogram(canvas, days, series, opts={}){
    if(!canvas) return; const ctx=canvas.getContext("2d");
    const W=canvas.width=canvas.clientWidth*2, H=canvas.height=(opts.height||220)*2;
    ctx.scale(1,1); ctx.clearRect(0,0,W,H);
    const padL=70,padR=20,padT=20,padB=44;
    const plotW=W-padL-padR, plotH=H-padT-padB;
    const n=days.length; const bw=plotW/Math.max(1,n);
    const maxV=Math.max(1,opts.max|| Math.max(...series.flatMap(s=>s.values)));
    // gridlines
    ctx.strokeStyle=cssVar("--line"); ctx.fillStyle=cssVar("--ink-3"); ctx.font="20px monospace"; ctx.lineWidth=2;
    for(let g=0;g<=4;g++){ const y=padT+plotH*(g/4); ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
      ctx.fillText(round(maxV*(1-g/4),0), 8, y+7); }
    // bars (first series = available outline, second = allocated fill)
    days.forEach((d,i)=>{
      const x=padL+i*bw+bw*0.18, w=bw*0.64;
      series.forEach((s,si)=>{
        const v=s.values[i]||0; const h=plotH*Math.min(1.3,(v/maxV));
        const y=padT+plotH-h;
        if(s.outline){ ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.strokeRect(x,Math.max(padT,y),w,Math.min(plotH,h)); }
        else { ctx.fillStyle= (v/ (opts.capFor? opts.capFor[i]:maxV))>1 ? cssVar("--red") : s.color; ctx.fillRect(x,Math.max(padT,y),w,Math.min(plotH+ (y<padT? (padT-y):0),h)); }
      });
    });
    // x labels (sparse)
    ctx.fillStyle=cssVar("--ink-3"); ctx.textAlign="center";
    const step=Math.ceil(n/12);
    days.forEach((d,i)=>{ if(i%step!==0) return; const x=padL+i*bw+bw/2;
      const lab=new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});
      ctx.fillText(lab, x, H-12); });
    ctx.textAlign="left";
  }

  /* Multi-line chart (EVM: PV/EV/AC). Canvas. */
  function lines(canvas, labels, series, opts={}){
    if(!canvas) return; const ctx=canvas.getContext("2d");
    const W=canvas.width=canvas.clientWidth*2, H=canvas.height=(opts.height||220)*2;
    ctx.clearRect(0,0,W,H);
    const padL=70,padR=20,padT=20,padB=40, plotW=W-padL-padR, plotH=H-padT-padB;
    const all=series.flatMap(s=>s.values); const maxV=Math.max(1,...all);
    ctx.strokeStyle=cssVar("--line"); ctx.fillStyle=cssVar("--ink-3"); ctx.font="20px monospace"; ctx.lineWidth=2;
    for(let g=0;g<=4;g++){ const y=padT+plotH*(g/4); ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
      ctx.fillText("$"+round(maxV*(1-g/4)/1000,0)+"k",6,y+7); }
    const n=labels.length; const dx= n>1? plotW/(n-1):plotW;
    series.forEach(s=>{
      ctx.strokeStyle=s.color; ctx.lineWidth=3; ctx.beginPath();
      s.values.forEach((v,i)=>{ const x=padL+i*dx, y=padT+plotH*(1-v/maxV); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      ctx.stroke();
    });
    ctx.fillStyle=cssVar("--ink-3"); ctx.textAlign="center";
    const step=Math.ceil(n/8);
    labels.forEach((l,i)=>{ if(i%step!==0&&i!==n-1) return; ctx.fillText(l,padL+i*dx,H-12); });
    ctx.textAlign="left";
  }

  /* Canvas Gantt with curing segments + critical path highlight. */
  function gantt(canvas, rows, opts={}){
    if(!canvas) return; const ctx=canvas.getContext("2d");
    const rowH=opts.rowH||28, labelW=opts.labelW||250, top=48, padR=18;
    const groups=[]; rows.forEach((r,i)=>{ const g=groups[groups.length-1];
      if(g && g.name===(r.stage||"")) g.count++; else groups.push({name:r.stage||"",startIdx:i,count:1}); });
    const H=(rows.length*rowH+top+26);
    const W=canvas.clientWidth||900;
    canvas.width=W*2; canvas.height=H*2; canvas.style.height=H+"px"; ctx.scale(2,2);
    ctx.clearRect(0,0,W,H); ctx.textBaseline="alphabetic";
    if(!rows.length){ ctx.fillStyle=cssVar("--ink-3"); ctx.font="12px sans-serif"; ctx.fillText("No scheduled tasks yet \u2014 press Run Schedule.",labelW,top+20); return; }
    const cal = opts.calId!=null ? WorkCal.get(opts.calId) : null;
    let t0=Math.min(...rows.map(r=>r.startMs)), t1=Math.max(...rows.map(r=>r.finishMs));
    const d0=new Date(t0); d0.setHours(0,0,0,0); t0=d0.getTime();
    const d1=new Date(t1); d1.setHours(0,0,0,0); t1=d1.getTime()+DAY;
    const span=Math.max(HOUR, t1-t0); const plotW=W-labelW-padR;
    const x=(ms)=> labelW + ((ms-t0)/span)*plotW;

    // shade non-working days
    if(cal){ for(let d=t0; d<t1; d+=DAY){ if(!WorkCal.dayWindows(cal,d).length){ const xa=x(d), xb=x(d+DAY);
      ctx.fillStyle=cssVar("--line"); ctx.globalAlpha=.4; ctx.fillRect(xa,top-10,xb-xa,H-top-2); ctx.globalAlpha=1; } } }

    // gridlines + day / week labels
    ctx.font="10px monospace"; ctx.lineWidth=1;
    for(let d=t0; d<=t1; d+=DAY){ const xx=x(d); const monday=(new Date(d).getDay()===1);
      ctx.strokeStyle= monday? cssVar("--line-2"): cssVar("--line");
      ctx.beginPath(); ctx.moveTo(xx,top-10); ctx.lineTo(xx,H-14); ctx.stroke();
      ctx.fillStyle=cssVar("--ink-3"); ctx.fillText(String(new Date(d).getDate()), xx+2, top-22);
      if(monday){ ctx.fillStyle=cssVar("--ink-2"); ctx.fillText(new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"}), xx+2, top-34); } }
    // today marker
    const now=Date.now(); if(now>=t0 && now<=t1){ const xx=x(now); ctx.strokeStyle=cssVar("--accent"); ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(xx,top-10); ctx.lineTo(xx,H-14); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=cssVar("--accent"); ctx.font="9px monospace"; ctx.fillText("TODAY", xx+3, top-2); }

    const geom=[];
    rows.forEach((r,i)=>{ const y=top+i*rowH;
      if(i%2===1){ ctx.fillStyle=cssVar("--panel-2"); ctx.globalAlpha=.45; ctx.fillRect(0,y,W,rowH); ctx.globalAlpha=1; }
      ctx.fillStyle=cssVar("--ink-2"); ctx.font="11px sans-serif";
      const name=r.label.length>36? r.label.slice(0,35)+"\u2026":r.label;
      ctx.fillText((r.critical?"\u25C6 ":"")+name, 10, y+rowH/2+4);
      const bx=x(r.startMs), by=y+6, bh=rowH-14;
      const wEnd=x(r.workEndMs), cEnd=x(r.cureEndMs), kEnd=x(r.finishMs);
      const accent= r.critical? cssVar("--red") : (r.done? cssVar("--green"): cssVar("--accent"));
      ctx.fillStyle=accent; roundRect(ctx,bx,by,Math.max(3,wEnd-bx),bh,3); ctx.fill();
      if(cEnd>wEnd){ ctx.fillStyle=cssVar("--orange"); ctx.globalAlpha=.9; ctx.fillRect(wEnd,by,cEnd-wEnd,bh); ctx.globalAlpha=1; }
      if(kEnd>cEnd){ ctx.fillStyle=cssVar("--amber"); ctx.globalAlpha=.55; ctx.fillRect(cEnd,by,kEnd-cEnd,bh); ctx.globalAlpha=1; }
      ctx.strokeStyle=cssVar("--bg"); ctx.lineWidth=1; ctx.strokeRect(bx,by,Math.max(3,kEnd-bx),bh);
      const durDays=Math.max(.1,Math.round((r.finishMs-r.startMs)/DAY*10)/10);
      if(kEnd+40<W){ ctx.fillStyle=cssVar("--ink-3"); ctx.font="9.5px monospace"; ctx.fillText(durDays+"d", kEnd+5, y+rowH/2+4); }
      geom.push({y,r}); });
    // stage separators
    groups.forEach(g=>{ const y=top+g.startIdx*rowH; ctx.strokeStyle=cssVar("--line-2"); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); });

    // hover tooltip
    canvas.__gantt={geom,top,rowH};
    if(!canvas.__tipBound){ canvas.__tipBound=true;
      canvas.addEventListener("mousemove",(ev)=>{ const g=canvas.__gantt; const tip=document.getElementById("gantt-tip"); if(!g||!tip) return;
        const rect=canvas.getBoundingClientRect(); const idx=Math.floor((ev.clientY-rect.top-g.top)/g.rowH);
        if(idx>=0 && idx<g.geom.length){ const r=g.geom[idx].r;
          tip.style.display="block";
          tip.style.left=Math.min(ev.clientX-rect.left+14, (canvas.clientWidth||900)-228)+"px";
          tip.style.top=(g.geom[idx].y+g.rowH+2)+"px";
          tip.innerHTML=`<b>${esc(r.label)}</b><div class="tl">${r.stage?esc(r.stage)+"<br>":""}Start: ${fmtDateTime(r.startMs)}<br>Finish: ${fmtDateTime(r.finishMs)}${r.critical?'<br><span style="color:var(--red)">On critical path</span>':''}</div>`;
        } else tip.style.display="none"; });
      canvas.addEventListener("mouseleave",()=>{ const tip=document.getElementById("gantt-tip"); if(tip) tip.style.display="none"; }); }
  }
  function roundRect(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  /* Learning-curve chart: actual points + fitted Wright curve (+ dashed projection). Canvas. */
  function learningCurve(canvas, pts, curve, opts={}){
    if(!canvas) return; const ctx=canvas.getContext("2d");
    const W=canvas.width=canvas.clientWidth*2, H=canvas.height=(opts.height||240)*2;
    ctx.clearRect(0,0,W,H); const padL=72,padR=24,padT=20,padB=44, plotW=W-padL-padR, plotH=H-padT-padB;
    const obsMax=opts.obsMax||Math.max(1,...pts.map(p=>p.n));
    const maxN=Math.max(1, ...curve.map(c=>c.n), ...pts.map(p=>p.n));
    const maxV=Math.max(1, ...curve.map(c=>c.hrs), ...pts.map(p=>p.hrs))*1.08;
    const X=k=> padL + (maxN>1? (k-1)/(maxN-1):0)*plotW;
    const Y=v=> padT + plotH*(1 - v/maxV);
    ctx.strokeStyle=cssVar("--line"); ctx.fillStyle=cssVar("--ink-3"); ctx.font="20px monospace"; ctx.lineWidth=2; ctx.textAlign="left";
    for(let g=0;g<=4;g++){ const yy=padT+plotH*(g/4); ctx.beginPath(); ctx.moveTo(padL,yy); ctx.lineTo(W-padR,yy); ctx.stroke(); ctx.fillText(round(maxV*(1-g/4),0),8,yy+7); }
    ctx.textAlign="center"; ctx.fillStyle=cssVar("--ink-3");
    for(let k=1;k<=maxN;k++){ if(maxN>14 && k%2===0) continue; ctx.fillText("U"+k, X(k), H-14); }
    ctx.textAlign="left";
    // fitted curve (solid up to obsMax, dashed beyond)
    ctx.lineWidth=3; let prev=null;
    curve.forEach(c=>{ const cx=X(c.n), cy=Y(c.hrs); if(prev){ ctx.beginPath(); if(c.n<=obsMax){ ctx.setLineDash([]); ctx.strokeStyle=cssVar("--accent"); } else { ctx.setLineDash([8,6]); ctx.strokeStyle=cssVar("--amber"); } ctx.moveTo(prev[0],prev[1]); ctx.lineTo(cx,cy); ctx.stroke(); } prev=[cx,cy]; });
    ctx.setLineDash([]);
    // actual points
    pts.forEach(p=>{ const cx=X(p.n), cy=Y(p.hrs); ctx.fillStyle= p.complete? cssVar("--green"):cssVar("--blue"); ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=cssVar("--panel"); ctx.lineWidth=3; ctx.stroke(); });
  }

  return { donut, hbars, histogram, lines, gantt, cssVar, learningCurve };
})();

/* ================================================================== */
/* 8b. INTERACTIVE GANTT — scroll, zoom, hour/day/week/month scales    */
/*     Freeze-panes layout: sticky label column + sticky time axis,    */
/*     one scrollbar on the body, real pixels-per-hour timeline.       */
/* ================================================================== */
const Gantt2 = (function(){
  const SCALE_PPH = { hour:34, day:5.2, week:1.35, month:0.40 };
  const LABELW=256, AXISH=50, ROWH=26, MAXW=16000, MAXBODYH=560, SEG_GAP=7, PADX=26;
  let cur=null;
  function cv(n){ return Chart.cssVar(n); }
  function setup(canvas, wL, hL){ const dpr=Math.min(2,(window.devicePixelRatio||1));
    canvas.width=Math.max(1,Math.round(wL*dpr)); canvas.height=Math.max(1,Math.round(hL*dpr));
    canvas.style.width=wL+"px"; canvas.style.height=hL+"px"; const ctx=canvas.getContext("2d"); if(!ctx) return null; ctx.setTransform(dpr,0,0,dpr,0,0); return ctx; }
  function rr(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); if(w<=0) return; ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function hrLabel(min){ const h=min/60; if(h<48) return (Math.round(h*10)/10).toString().replace(/\.0$/,"")+"h"; return (Math.round(h/24*10)/10)+"d"; }
  function computeBounds(){ let t0=Math.min(...cur.rows.map(r=>r.startMs!=null?r.startMs:(r.stageStartMs!=null?r.stageStartMs:Infinity)));
    let t1=Math.max(...cur.rows.map(r=>r.finishMs!=null?r.finishMs:(r.stageEndMs!=null?r.stageEndMs:-Infinity)));
    if(!isFinite(t0)) t0=Date.now(); if(!isFinite(t1)) t1=t0+DAY;
    const d0=new Date(t0); d0.setHours(0,0,0,0); cur.t0=d0.getTime();
    const d1=new Date(t1); d1.setHours(0,0,0,0); cur.t1=d1.getTime()+DAY; }
  function buildSegments(){ cur.segs=[]; cur.segCum=[]; cur.totalWorkMs=0;
    if(!cur.cal){ cur.segs=[{s:cur.t0,e:cur.t1}]; cur.segCum=[0]; cur.totalWorkMs=cur.t1-cur.t0; return; }
    for(let d=cur.t0; d<cur.t1; d+=DAY) WorkCal.dayWindows(cur.cal,d).forEach(w=>cur.segs.push({s:w.s,e:w.e}));
    cur.segs.sort((a,b)=>a.s-b.s); if(!cur.segs.length) cur.segs=[{s:cur.t0,e:cur.t1}];
    let acc=0; cur.segs.forEach(sg=>{ cur.segCum.push(acc); acc+=(sg.e-sg.s); }); cur.totalWorkMs=acc; }
  function Wx(ms){ return PADX + _Wx(ms); }
  function _Wx(ms){ const segs=cur.segs, cum=cur.segCum, pph=cur.pph; if(!segs.length) return 0;
    if(ms<=segs[0].s) return 0; let lo=0,hi=segs.length-1,idx=segs.length-1;
    while(lo<=hi){ const m=(lo+hi)>>1; if(segs[m].s>ms){ idx=m-1; hi=m-1; } else { lo=m+1; idx=m; } }
    if(idx<0) idx=0; const sg=segs[idx];
    if(ms<sg.s) return cum[idx]/HOUR*pph + idx*SEG_GAP;
    return (cum[idx]+Math.min(ms,sg.e)-sg.s)/HOUR*pph + idx*SEG_GAP; }
  function Xcal(ms){ return PADX + (ms-cur.t0)/HOUR*cur.pph; }
  function xOf(ms){ return cur.workTime? Wx(ms) : Xcal(ms); }

  function drawAxis(ctx){ if(!ctx) return; const W=cur.timelineW;
    ctx.strokeStyle=cv("--line-2"); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,AXISH-0.5); ctx.lineTo(W,AXISH-0.5); ctx.stroke();
    const now=Date.now();
    if(cur.workTime){ let lastDay=null,lastLX=-999; const gap=cur.scale==="month"?70:cur.scale==="week"?42:30;
      cur.segs.forEach((sg,i)=>{ const xa=Wx(sg.s);

  function printOpsBoard(opts){ opts=opts||{};

    const SLOT=30; const slotMins=[]; for(let m=dayStartMin;m<dayEndMin;m+=SLOT) slotMins.push(m);

        <div><div class="name">Aero<b>Plan</b> Pro</div><div class="ver">UAV MANUFACTURING · MES</div></div>
      </div>
      <div class="spacer"></div>

        <select data-act="switch-program">${progOpts||`<option>No programs</option>`}</select>

        <button class="icobtn desktop-only" data-act="import-json" title="Restore backup">${icon("upload")}</button>
        <button class="icobtn" data-act="toggle-theme" title="Cycle theme">${icon(LIGHT_THEMES.includes(State.settings.theme)?"sun":"moon")}</button>

        <select data-act="switch-program">${progOpts||`<option>No programs</option>`}</select>
        <button class="btn sm" data-act="export-json">${icon("download","ico")} Backup</button>

        let badge="";
