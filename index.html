<script>
/* ================================================================== */
/* 10. VIEWS                                                           */
/* ================================================================== */

function statusChip(status){ const s=STATUS[status]||STATUS.NOT_STARTED;
  return `<span class="chip ${s.cls}"><span class="dot"></span>${s.label}</span>`; }
function progArc(programId){ const tasks=State.tasks.filter(t=>t.programId===programId);
  if(!tasks.length) return 0; return round(sum(tasks,t=>t.percentComplete||0)/tasks.length,0); }

function emptyState(iconName, title, body, action){
  return `<div class="empty">${icon(iconName,"ico")}<h4>${esc(title)}</h4><p class="muted">${esc(body)}</p>${action||""}</div>`;
}

/* ---------- DASHBOARD ---------- */
function viewDashboard(){
  const ap=activeProgram();
  if(!ap) return viewHead("Dashboard","Program overview")+emptyState("program","No active program","Create a program to begin planning.",
    `<button class="btn primary" data-act="nav" data-mod="programs">${icon("plus","ico")} Go to Programs</button>`);
  const pid=ap.id;
  const acs=State.aircraft.filter(a=>a.programId===pid);
  const tasks=State.tasks.filter(t=>t.programId===pid);
  const sched=State.schedules[pid];
  const u=Analytics.utilizationSummary(pid);
  const e=Analytics.evm(pid);
  const fc=Analytics.forecast(pid);
  const completion=progArc(pid);
  const critical= sched? sched.criticalCount : 0;
  const peakLabor=round(u.peakLabor,0), peakEquip=round(u.peakEquip,0);

  const labRows=Object.entries(u.labor).map(([s,d])=>({label:SKILL_LABEL[s],value:d.peak,max:100,sub:`${d.headcount} hc`,color:Chart.cssVar("--"+(Analytics.utilClass(d.peak)==="red"?"red":Analytics.utilClass(d.peak)==="amber"?"amber":Analytics.utilClass(d.peak)==="green"?"green":"blue"))}));
  const eqRows=Object.entries(u.equip).filter(([,d])=>d.units>0).map(([t,d])=>({label:EQUIP_LABEL[t],value:d.peak,max:100,sub:`${d.units}u`,color:Chart.cssVar("--"+(Analytics.utilClass(d.peak)==="red"?"red":Analytics.utilClass(d.peak)==="amber"?"amber":Analytics.utilClass(d.peak)==="green"?"green":"blue"))}));
  const bn=Analytics.bottlenecks(pid);
  const conflicts=(sched&&sched.conflicts)||[];

  return viewHead("Dashboard", esc(ap.name)+" · "+esc(ap.code)) + `
    ${conflicts.length? `<div class="inline-warn ${conflicts.some(c=>c.severity==='err')?'err':''}">${icon("alert")}
      <div><b>${conflicts.length} scheduling conflict(s).</b> ${esc(conflicts[0].msg)} ${conflicts.length>1?`<span class="muted">(+${conflicts.length-1} more in Scheduling)</span>`:""}</div></div>`:""}
    <div class="grid cols-5" style="margin-bottom:14px">
      <div class="kpi k-blue"><div class="label">Active Aircraft</div><div class="val">${acs.length}</div><div class="meta">${tasks.length} tasks tracked</div></div>
      <div class="kpi ${completion>=70?'k-green':completion>=30?'k-amber':''}"><div class="label">Completion</div><div class="val">${completion}<span class="unit">%</span></div><div class="meta">${tasks.filter(t=>t.status==='COMPLETE').length} of ${tasks.length} done</div></div>
      <div class="kpi ${peakLabor>100?'k-red':peakLabor>=85?'k-amber':'k-green'}"><div class="label">Labor Peak</div><div class="val">${peakLabor}<span class="unit">%</span></div><div class="meta">${Analytics.utilStatus(peakLabor)}</div></div>
      <div class="kpi ${peakEquip>100?'k-red':peakEquip>=85?'k-amber':'k-green'}"><div class="label">Equipment Peak</div><div class="val">${peakEquip}<span class="unit">%</span></div><div class="meta">${Analytics.utilStatus(peakEquip)}</div></div>
      <div class="kpi ${critical>0?'k-red':'k-green'}"><div class="label">Critical Tasks</div><div class="val">${critical}</div><div class="meta">${sched?fmtDate(sched.projectFinishMs):"not scheduled"}</div></div>
    </div>

    <div class="grid cols-3">
      <div class="panel">
        <div class="panel-h"><span class="eyebrow">Production</span><h3>Program Progress</h3></div>
        <div class="panel-b" style="display:flex;align-items:center;gap:18px;justify-content:center">
          ${Chart.donut(completion,"COMPLETE")}
          <div style="flex:1">${Chart.hbars(acs.map(a=>({label:a.serialNumber,value:aircraftCompletion(a.id),max:100,color:Chart.cssVar("--accent")})),{unit:"%"})||'<span class="muted">No aircraft</span>'}</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-h"><span class="eyebrow">Labor</span><h3>Peak Loading</h3></div>
        <div class="panel-b">${labRows.length?Chart.hbars(labRows,{unit:"%"}):'<span class="muted">No labor data</span>'}</div>
      </div>
      <div class="panel">
        <div class="panel-h"><span class="eyebrow">Equipment</span><h3>Peak Loading</h3></div>
        <div class="panel-b">${eqRows.length?Chart.hbars(eqRows,{unit:"%"}):'<span class="muted">No equipment data</span>'}</div>
      </div>
    </div>

    <div class="grid cols-2" style="margin-top:14px">
      <div class="panel">
        <div class="panel-h"><span class="eyebrow">Constraints</span><h3>Bottleneck Analysis</h3></div>
        <div class="panel-b">${ bn.length? `<table class="tbl"><thead><tr><th>Resource</th><th>Type</th><th class="num">Peak</th><th>Recommendation</th></tr></thead><tbody>
          ${bn.map(b=>`<tr><td>${esc(b.name)}</td><td><span class="tag">${b.type}</span></td><td class="num" style="color:var(--${b.sev})">${round(b.val,0)}%</td><td class="muted">${esc(b.rec)}</td></tr>`).join("")}
        </tbody></table>` : `<div class="empty" style="padding:24px">${icon("check","ico")}<h4>No bottlenecks</h4><p class="muted">All resources below 85% peak utilization.</p></div>` }</div>
      </div>
      <div class="panel">
        <div class="panel-h"><span class="eyebrow">Forecast & EVM</span><h3>Completion Outlook</h3></div>
        <div class="panel-b">
          ${ fc? `<div class="grid cols-3" style="margin-bottom:12px">
            <div><div class="muted" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em">Optimistic</div><div class="mono">${fmtDate(fc.optimisticMs)}</div></div>
            <div><div class="muted" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em">Expected</div><div class="mono" style="font-weight:700">${fmtDate(fc.expectedMs)}</div></div>
            <div><div class="muted" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em">Pessimistic</div><div class="mono">${fmtDate(fc.pessimisticMs)}</div></div>
          </div>
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
            <span class="chip ${fc.riskCls}"><span class="dot"></span>${fc.risk} risk</span>
            <span class="muted">Confidence ${fc.confidence}%</span>
          </div>`:'<p class="muted">Run the scheduler to generate a forecast.</p>' }
          ${ e? `<div class="divider"></div><div class="kv">
            <dt>SPI / CPI</dt><dd class="mono">${e.SPI} / ${e.CPI} <span class="muted">${e.SPI<1?"behind":"on/ahead"} · ${e.CPI<1?"over budget":"on/under"}</span></dd>
            <dt>Earned Value</dt><dd class="mono">${fmtMoney(e.EV)} of ${fmtMoney(e.BAC)}</dd>
            <dt>Est. at Complete</dt><dd class="mono">${fmtMoney(e.EAC)}</dd>
          </div>`:"" }
        </div>
      </div>
    </div>`;
}
function aircraftCompletion(acId){ const sts=State.stages.filter(s=>s.aircraftId===acId).map(s=>s.id);
  const tasks=State.tasks.filter(t=>sts.includes(t.stageId)); if(!tasks.length) return 0;
  const wOf=(t)=>{ const lh=(t.plannedLaborHours||0); if(lh>0) return lh; const fx=(t.fixedDurationHrs||0)*(t.assignedWorkers||1); return fx>0?fx:1; };
  const tw=sum(tasks,wOf); return tw? round(sum(tasks,t=>wOf(t)*(t.percentComplete||0))/tw,0):0; }

function viewHead(title, sub, actions){
  return `<div class="view-head"><h1>${esc(title)}</h1><span class="sub">${sub||""}</span><span class="spacer"></span>${actions||""}</div>`;
}

/* ---------- PROGRAMS ---------- */
function viewPrograms(){
  return viewHead("Programs","Manage UAV production programs",
    `<button class="btn primary" data-act="new-program">${icon("plus","ico")} New Program</button>`) +
  (State.programs.length? `<div class="grid cols-3">${State.programs.map(p=>{
    const acs=State.aircraft.filter(a=>a.programId===p.id).length;
    const tasks=State.tasks.filter(t=>t.programId===p.id).length;
    const comp=progArc(p.id);
    return `<div class="panel" style="cursor:pointer" data-act="open-program" data-id="${p.id}">
      <div class="panel-h"><span class="eyebrow mono">${esc(p.code)}</span><h3>${esc(p.name)}</h3>
        <span class="spacer"></span>${p.id===State.ui.activeProgram?'<span class="chip s-green"><span class="dot"></span>Active</span>':''}</div>
      <div class="panel-b">
        <p class="muted" style="min-height:32px;margin:0 0 12px">${esc(p.description||"No description")}</p>
        <div class="kv"><dt>Aircraft</dt><dd class="mono">${acs}</dd><dt>Tasks</dt><dd class="mono">${tasks}</dd></div>
        <div style="margin-top:12px"><div class="prog ${comp>=70?'green':comp>=30?'amber':''}"><span style="width:${comp}%"></span></div>
        <div class="muted" style="font-size:11px;margin-top:4px">${comp}% complete</div></div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn sm" data-act="edit-program" data-id="${p.id}">${icon("edit","ico")} Edit</button>
          <button class="btn sm" data-act="dup-program" data-id="${p.id}">${icon("copy","ico")} Duplicate</button>
          <button class="btn sm danger" data-act="delete-program" data-id="${p.id}">${icon("trash","ico")} Delete</button>
        </div>
      </div></div>`;
  }).join("")}</div>` : emptyState("program","No programs yet","Create your first UAV production program.",
    `<button class="btn primary" data-act="new-program">${icon("plus","ico")} New Program</button>`));
}

/* ---------- AIRCRAFT ---------- */
function viewAircraft(){
  const ap=activeProgram();
  if(!ap) return viewHead("Aircraft","")+emptyState("aircraft","No active program","Select or create a program first.","");
  const acs=State.aircraft.filter(a=>a.programId===ap.id);
  return viewHead("Aircraft", esc(ap.name)+" tail numbers",
    `<button class="btn primary" data-act="new-aircraft">${icon("plus","ico")} New Aircraft</button>`) +
  (acs.length? `<div class="grid cols-2">${acs.map(a=>{
    const stages=State.stages.filter(s=>s.aircraftId===a.id).sort((x,y)=>x.sequence-y.sequence);
    const comp=aircraftCompletion(a.id);
    const gates=State.gates.filter(g=>g.aircraftId===a.id).sort((x,y)=>x.gateNumber-y.gateNumber);
    const curStage=stages.find(s=>{ const ts=State.tasks.filter(t=>t.stageId===s.id); return ts.some(t=>t.status!=="COMPLETE"&&t.status!=="CANCELLED"); });
    return `<div class="panel">
      <div class="panel-h"><span class="eyebrow">${esc(a.model)} · rev ${esc(a.buildRevision)}</span>
        <h3 class="mono">${esc(a.serialNumber)}</h3><span class="spacer"></span>
        <button class="btn sm" data-act="edit-aircraft" data-id="${a.id}">${icon("edit","ico")}</button>
        <button class="btn sm" data-act="dup-aircraft" data-id="${a.id}" title="Duplicate aircraft">${icon("copy","ico")}</button>
        <button class="btn sm danger" data-act="delete-aircraft" data-id="${a.id}">${icon("trash","ico")}</button></div>
      <div class="panel-b">
        <div class="kv">
          <dt>Config Version</dt><dd class="mono">${esc(a.configVersion)}</dd>
          <dt>Current Stage</dt><dd>${curStage?esc(curStage.name):'<span class="muted">— complete —</span>'}</dd>
          <dt>Planned Window</dt><dd class="mono">${fmtDate(a.plannedStartMs)} → ${fmtDate(a.plannedFinishMs)}</dd>
        </div>
        <div style="margin-top:12px"><div class="prog ${comp>=70?'green':comp>=30?'amber':''}"><span style="width:${comp}%"></span></div>
          <div class="muted" style="font-size:11px;margin-top:4px">${comp}% complete · ${stages.length} stages</div></div>
        <div class="divider"></div>
        <div class="muted" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Stage Gates</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${gates.map(g=>{ const cls=g.status==="APPROVED"?"s-green":g.status==="REJECTED"?"s-red":"s-grey";
            return `<button class="chip ${cls}" style="cursor:pointer" data-act="open-gate" data-id="${g.id}" title="${esc(g.name)}"><span class="dot"></span>G${g.gateNumber}</button>`; }).join("")}
        </div>
        <div style="margin-top:14px;display:flex;gap:8px">
          <button class="btn sm" data-act="open-aircraft-stages" data-id="${a.id}">${icon("layers","ico")} Stages & Tasks</button>
        </div>
      </div></div>`;
  }).join("")}</div>` : emptyState("aircraft","No aircraft in this program","Add a tail number to start building its schedule.",
    `<button class="btn primary" data-act="new-aircraft">${icon("plus","ico")} New Aircraft</button>`));
}
</script>

<script>
/* ---------- SCHEDULING (split: task tree + Gantt) ---------- */
function viewScheduling(){
  const ap=activeProgram();
  if(!ap) return viewHead("Scheduling","")+emptyState("schedule","No active program","Create a program and aircraft to schedule.","");
  const acs=State.aircraft.filter(a=>a.programId===ap.id);
  const acFilter=State.ui.activeAircraft && byId(State.aircraft,State.ui.activeAircraft) ? State.ui.activeAircraft : (acs[0]&&acs[0].id);
  const stages=State.stages.filter(s=>s.aircraftId===acFilter).sort((a,b)=>a.sequence-b.sequence);
  const sched=State.schedules[ap.id];
  const schedMap={}; if(sched) sched.taskSchedules.forEach(s=>schedMap[s.taskId]=s);
  const conflicts=(sched&&sched.conflicts)||[];
  const filter=(State.ui.taskFilter||"").toLowerCase();

  const acTabs=acs.map(a=>`<button class="tab ${a.id===acFilter?'active':''}" data-act="sched-aircraft" data-id="${a.id}">${esc(a.serialNumber)}</button>`).join("");
  const effUnit=(function(){ try{ const e=Analytics.efficiency(ap.id); return e.units.find(u=>u.id===acFilter)||null; }catch(_){ return null; } })();
  const expEff= ap.expectedEfficiency||100;
  const effBand=`<div class="grid cols-3" style="margin:0 0 12px">
    <div class="kpi" style="padding:9px 12px"><div class="label">Expected Efficiency</div>
      <div class="val" style="font-size:20px;display:flex;align-items:center;gap:6px">
        <input type="number" min="10" max="200" step="5" value="${expEff}" data-act="set-expected-eff" style="width:64px;background:var(--panel-2);border:1px solid var(--line-2);color:var(--ink);border-radius:6px;padding:3px 6px;font-size:18px;font-weight:700">%
      </div><div class="meta">planning pace \u2014 the whole schedule recalculates from this</div></div>
    <div class="kpi k-blue" style="padding:9px 12px"><div class="label">Required Efficiency</div><div class="val" style="font-size:20px">${!effUnit||effUnit.requiredEff==null?"\u2014":effUnit.requiredEff+"<span class='unit'>%</span>"}</div><div class="meta">productivity needed to fit ${effUnit?esc(effUnit.serial):"this tail"} into its planned window</div></div>
    <div class="kpi ${effUnit&&effUnit.achievedEff!=null?(effUnit.requiredEff!=null&&effUnit.achievedEff<effUnit.requiredEff?'k-red':effUnit.achievedEff>=100?'k-green':'k-amber'):''}" style="padding:9px 12px"><div class="label">Current Efficiency</div><div class="val" style="font-size:20px">${!effUnit||effUnit.achievedEff==null?"\u2014":effUnit.achievedEff+"<span class='unit'>%</span>"}</div><div class="meta">earned \u00f7 actual labor${effUnit&&effUnit.achievedEff!=null?" \u00b7 "+effUnit.pct+"% complete":" \u2014 log actuals on tasks"} \u00b7 <a data-act="nav" data-mod="efficiency" style="color:var(--accent);cursor:pointer">details</a></div></div>
  </div>`;

  const tree= stages.map(st=>{
    let tasks=State.tasks.filter(t=>t.stageId===st.id).sort((a,b)=>((a.seq||0)-(b.seq||0))||a.wbsCode.localeCompare(b.wbsCode,undefined,{numeric:true}));
    if(filter) tasks=tasks.filter(t=>t.name.toLowerCase().includes(filter)||t.wbsCode.includes(filter));
    if(filter && !tasks.length) return "";
    const collapsed=!!(State.ui.collapsedStages&&State.ui.collapsedStages[st.id]);
    const allCount=State.tasks.filter(t=>t.stageId===st.id).length;
    const shownTasks= collapsed? [] : tasks;
    return `<div style="margin-bottom:10px">
      <div class="stage-hd" style="display:flex;align-items:center;gap:5px;padding:6px 4px;border-bottom:1px solid var(--line-2)">
        <button class="btn sm ghost" data-act="toggle-stage-collapse" data-id="${st.id}" title="${collapsed?'Expand':'Collapse'} stage" style="padding:3px 5px">${icon(collapsed?"chevright":"down","ico")}</button>
        <span class="mono muted" style="font-size:11px">S${st.sequence}</span>
        <b style="font-size:12.5px;cursor:pointer" data-act="toggle-stage-collapse" data-id="${st.id}">${esc(st.name)}</b>
        <span class="tag" style="font-size:9px" title="${allCount} task(s)">${allCount}</span>${st.gated?` <span class="chip s-amber" style="font-size:9px;padding:1px 6px" title="Gated: starts only after all earlier stages finish"><span class="dot"></span>Gate</span>`:""}
        <span class="spacer"></span>
        <button class="btn sm ghost ${st.gated?'active':''}" data-act="toggle-stage-gate" data-id="${st.id}" title="${st.gated?'Gate ON \u2014 this stage waits for all earlier stages to finish':'Gate OFF \u2014 click to make this stage wait for all earlier stages'}">${icon("lock","ico")}</button>
        <button class="btn sm ghost" data-act="dup-stage" data-id="${st.id}" title="Duplicate stage">${icon("copy","ico")}</button>
        <button class="btn sm ghost" data-act="move-stage" data-id="${st.id}" data-dir="up" title="Move stage up">${icon("up","ico")}</button>
        <button class="btn sm ghost" data-act="move-stage" data-id="${st.id}" data-dir="down" title="Move stage down">${icon("down","ico")}</button>
        <button class="btn sm ghost" data-act="edit-stage" data-id="${st.id}" title="Edit stage">${icon("edit","ico")}</button>
        <button class="btn sm ghost" data-act="add-task" data-stage="${st.id}" title="Add task">${icon("plus","ico")}</button>
        <button class="btn sm ghost" data-act="del-stage" data-id="${st.id}" title="Delete stage">${icon("trash","ico")}</button>
      </div>
      ${shownTasks.length? shownTasks.map(t=>{
        const s=schedMap[t.id]; const cure=(t.curingDurationHrs||0)>0; const ambient=cure&&t.cureMode==="AMBIENT";
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--line)">
          <span class="mono muted" style="font-size:10.5px;width:46px" title="Sequence ${t.seq||1} · WBS ${esc(t.wbsCode)}">#${t.seq||1} <span style="opacity:.6">${esc(t.wbsCode)}</span></span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px" title="${esc(t.name)}">${cure?icon("flask","ico")+" ":""}${esc(t.name)}${ambient?' <span class="tag" style="font-size:9px">ambient</span>':""}</span>
              ${s&&s.onCriticalPath?'<span class="tag" style="color:var(--red);border-color:var(--red)">CRIT</span>':""}
            </div>
            <div class="muted" style="font-size:10.5px">${SKILL_LABEL[t.laborSkill]} · ${t.assignedWorkers}w · ${s?fmtDate(s.startMs):"—"}${(()=>{const dp=State.dependencies.filter(d=>d.taskId===t.id);return dp.length?` · <span style="color:var(--accent)">${icon("link","ico")} after ${dp.length} task${dp.length>1?"s":""}</span>`:' · <span style="color:var(--ink-3)">parallel</span>';})()}</div>
          </div>
          ${statusChip(t.status)}
          <button class="btn sm ghost" data-act="edit-task" data-id="${t.id}">${icon("edit","ico")}</button>
          <button class="btn sm ghost" data-act="dup-task" data-id="${t.id}" title="Duplicate task">${icon("copy","ico")}</button>
        </div>`;
      }).join("") : `<div class="muted" style="font-size:11.5px;padding:7px 6px">${collapsed? allCount+" task(s) hidden \u2014 click the stage to expand." : "No tasks yet \u2014 use + to add one."}</div>`}
    </div>`;
  }).join("");

  // Gantt rows
  let rows=[];

/* Planned-vs-actual comparison for a task: derives actual effort/elapsed from
   time-tracking sessions, actual labor hours, fixed-duration progress, or % complete. */
function taskActual(t, sc){
  const workers=clamp(t.assignedWorkers||1, Math.max(1,t.minWorkers||1), Math.max(t.minWorkers||1,t.maxWorkers||1));
  const planMin=(sc.workMin||0)+(sc.cureMin||0)+(sc.coolMin||0);
  const pct=clamp(Math.round(t.percentComplete||0),0,100);
  const done=t.status==="COMPLETE"||pct>=100;
  const sessions=(State.timeSessions||[]).filter(s=>s.taskId===t.id);
  let actWorkMin=0, basis="none";
  if(sessions.length){ actWorkMin=sessions.reduce((a,s)=>a+Math.max(0,((s.endMs||Date.now())-s.startMs))/MIN,0); basis="time"; }
  else if((t.fixedDurationHrs||0)>0 && (done||pct>0)){ actWorkMin=(t.fixedDurationHrs*60)*(done?1:pct/100); basis="fixed"; }
  else if((t.actualLaborHours||0)>0){ actWorkMin=Math.ceil((t.actualLaborHours*60)/Math.max(1,workers)); basis="labor"; }
  else if(pct>0){ actWorkMin=(sc.workMin||0)*(pct/100); basis="pct"; }
  const hasActual= basis!=="none" || done || t.status==="WORKING";
  const actMin= actWorkMin + (done? ((sc.cureMin||0)+(sc.coolMin||0)) : 0);
  const ratio= planMin>0? actMin/planMin : (done?1:0);
  const deltaH=Math.round((actMin-planMin)/60*10)/10;
  return { hasActual, pct, done, inProgress: hasActual&&!done, actRatio:ratio, actMin, planMin, actLate: done && actMin>planMin*1.02, deltaH };
}

<script>
/* ---------- REPORTS ---------- */
/* Per-aircraft live status: current station, station %, overall %, schedule window. */
function acStatus(acId){
  const ac=byId(State.aircraft,acId);
  const stages=State.stages.filter(s=>s.aircraftId===acId).sort((a,b)=>a.sequence-b.sequence);
  const groups=stages.map(s=>({stage:s,tasks:State.tasks.filter(t=>t.stageId===s.id)}));
  const allTasks=groups.reduce((a,g)=>a.concat(g.tasks),[]);
  const wOf=(t)=>{ const lh=(t.plannedLaborHours||0); if(lh>0) return lh; const fx=(t.fixedDurationHrs||0)*(t.assignedWorkers||1); return fx>0?fx:1; };
  const totW=sum(allTasks,wOf);
  const overall= totW? round(sum(allTasks,t=>wOf(t)*(t.percentComplete||0))/totW,0):0;
  let curIdx=-1; for(let i=0;i<groups.length;i++){ const ts=groups[i].tasks; if(ts.length && ts.some(t=>t.status!=="COMPLETE")){ curIdx=i; break; } }
  const released= curIdx<0 && groups.some(g=>g.tasks.length);
  const started= allTasks.some(t=>(t.percentComplete||0)>0 || (t.status&&t.status!=="NOT_STARTED"));
  let stationPct=0; if(curIdx>=0){ const ts=groups[curIdx].tasks; const sw=sum(ts,wOf); stationPct= sw? round(sum(ts,t=>wOf(t)*(t.percentComplete||0))/sw,0):0; }
  const sched= ac? State.schedules[ac.programId] : null; let finMs=null,startMs=null;
  if(sched){ const ids=new Set(allTasks.map(t=>t.id)); const ss=sched.taskSchedules.filter(s=>ids.has(s.taskId));
    if(ss.length){ finMs=Math.max.apply(null,ss.map(s=>s.finishMs)); startMs=Math.min.apply(null,ss.map(s=>s.startMs)); } }
  const behind= finMs!=null && ac && ac.plannedFinishMs && finMs>ac.plannedFinishMs+DAY;
  return { ac, stages, totalStations:stages.length, currentSeq: curIdx>=0?groups[curIdx].stage.sequence:(released?stages.length+1:0),
    currentStation: released?"Released":(curIdx>=0?groups[curIdx].stage.name:(started?"In setup":"Not started")),
    currentStageId: curIdx>=0?groups[curIdx].stage.id:null, doneStations: curIdx<0?(released?stages.length:0):curIdx,
    stationPct, overall, released, started, finMs, startMs, behind };
}
function buildOrder(acs){ return acs.slice().sort((x,y)=> ((x.buildSeq||0)-(y.buildSeq||0)) || ((x.plannedStartMs||0)-(y.plannedStartMs||0)) || String(x.serialNumber||"").localeCompare(String(y.serialNumber||""),undefined,{numeric:true})); }
function _flowW(t){ const lh=(t.plannedLaborHours||0); if(lh>0) return lh; const fx=(t.fixedDurationHrs||0)*(t.assignedWorkers||1); return fx>0?fx:1; }
function stationFlow(acId){ const sts=State.stages.filter(s=>s.aircraftId===acId).sort((a,b)=>a.sequence-b.sequence);
  return sts.map(st=>{ const tk=State.tasks.filter(t=>t.stageId===st.id); const tw=sum(tk,_flowW);
    const pct= tw? round(sum(tk,t=>_flowW(t)*(t.percentComplete||0))/tw,0):0;
    const anyStarted= tk.some(t=>(t.percentComplete||0)>0 || (t.status&&t.status!=="NOT_STARTED"));
    const status= (tk.length && pct>=100)?"complete":(anyStarted?"active":"pending");
    return {name:st.name, pct, status}; }); }
function stationFlowFleet(programId, stName){ const acs=State.aircraft.filter(a=>a.programId===programId);
  let pctSum=0,cnt=0,anyAct=false,allComplete=true;
  acs.forEach(a=>{ const st=State.stages.find(s=>s.aircraftId===a.id&&s.name===stName); if(!st){ allComplete=false; return; } const tk=State.tasks.filter(t=>t.stageId===st.id); if(!tk.length){ allComplete=false; return; }
    const tw=sum(tk,_flowW); const p= tw? sum(tk,t=>_flowW(t)*(t.percentComplete||0))/tw:0; pctSum+=p; cnt++;
    if(p>0&&p<100) anyAct=true; if(p<100) allComplete=false; if(tk.some(t=>t.status==="WORKING")) anyAct=true; });
  const pct= cnt? round(pctSum/cnt,0):0; return { pct, status:(cnt&&allComplete)?"complete":((pct>0||anyAct)?"active":"pending") }; }
function programFlow(programId){ const acs=State.aircraft.filter(a=>a.programId===programId); if(!acs.length) return [];
  const ref=State.stages.filter(s=>s.aircraftId===buildOrder(acs)[0].id).sort((a,b)=>a.sequence-b.sequence).map(s=>s.name);
  return ref.map(name=>{ let pctSum=0,cnt=0,anyAct=false,allComplete=true;
    acs.forEach(a=>{ const st=State.stages.find(s=>s.aircraftId===a.id&&s.name===name); if(!st) return; const tk=State.tasks.filter(t=>t.stageId===st.id); if(!tk.length){ allComplete=false; return; }
      const tw=sum(tk,_flowW); const p= tw? sum(tk,t=>_flowW(t)*(t.percentComplete||0))/tw:0; pctSum+=p; cnt++;
      if(p>0&&p<100) anyAct=true; if(p<100) allComplete=false; if(tk.some(t=>t.status==="WORKING")) anyAct=true; });
    const pct= cnt? round(pctSum/cnt,0):0; const status= (cnt&&allComplete)?"complete":((pct>0||anyAct)?"active":"pending");
    return {name, pct, status}; }); }

function viewLine(){

  const sorted=buildOrder(acs);

  const refStages=State.stages.filter(s=>s.aircraftId===sorted[0].id).sort((a,b)=>a.sequence-b.sequence).map(s=>s.name);
  const stats=sorted.map(a=>acStatus(a.id));
  const released=stats.filter(s=>s.released).length, building=stats.filter(s=>s.started&&!s.released).length, notStarted=stats.filter(s=>!s.started).length;
  const behind=stats.filter(s=>s.behind).length;
  const avg= stats.length? round(sum(stats,s=>s.overall)/stats.length,0):0;

function lineReorder(acId,dir){ const ap=activeProgram(); if(!ap) return;
  const acs=buildOrder(State.aircraft.filter(a=>a.programId===ap.id));
  // ensure contiguous buildSeq
  acs.forEach((a,i)=>a.buildSeq=i);
  const idx=acs.findIndex(a=>a.id===acId); if(idx<0) return; const j= dir<0? idx-1: idx+1; if(j<0||j>=acs.length) return;
  const t=acs[idx].buildSeq; acs[idx].buildSeq=acs[j].buildSeq; acs[j].buildSeq=t;
  audit("AIRCRAFT",acId,"UPDATE","buildSeq",String(idx),String(j));
  if(State.schedules[ap.id]) runSchedule(ap.id); commit();
}

postRender.reports=function(){
  const ap=activeProgram(); if(!ap) return; const e=Analytics.evm(ap.id); const sched=State.schedules[ap.id];
  const cv=document.getElementById("evm-canvas"); if(!cv||!e) return;
  // Build a simple cumulative S-curve over the schedule horizon.
  const tasks=State.tasks.filter(t=>t.programId===ap.id);
  let labels=[],pv=[],ev=[],ac=[];
  if(sched && sched.taskSchedules.length){
    const t0=sched.projectStartMs, t1=sched.projectFinishMs, steps=10;
    const map={}; sched.taskSchedules.forEach(s=>map[s.taskId]=s);
    for(let i=0;i<=steps;i++){ const t=t0+(t1-t0)*i/steps; labels.push(fmtDate(t));
      let p=0,v=0,a=0;
      tasks.forEach(tk=>{ const s=map[tk.id]; if(!s) return;
        const pc=tk.percentComplete||0;
        if(t>=s.finishMs){ p+=tk.plannedCost||0; }
        else if(t>s.startMs){ p+=(tk.plannedCost||0)*clamp((t-s.startMs)/Math.max(1,s.finishMs-s.startMs),0,1); }
        // EV/AC grow with progress, ramped by time fraction
        const tf=clamp((t-t0)/Math.max(1,t1-t0),0,1);
        v+=(tk.plannedCost||0)*(pc/100)*tf;
        a+=(tk.actualCost||0)*tf;
      });
      pv.push(p); ev.push(v); ac.push(a);
    }
  } else { labels=["Start","Now"]; pv=[0,e.PV]; ev=[0,e.EV]; ac=[0,e.AC]; }
  Chart.lines(cv, labels, [
    {values:pv,color:Chart.cssVar("--blue")},
    {values:ev,color:Chart.cssVar("--green")},
    {values:ac,color:Chart.cssVar("--amber")}
  ]);
};

function timeStr(min){ if(min==null||isNaN(min)) return ""; min=clamp(min,0,1440); const h=Math.floor(min/60),m=min%60,p=n=>String(n).padStart(2,"0"); return p(h)+":"+p(m); }
function parseTimeStr(v){ if(!v||!/^\d{1,2}:\d{2}$/.test(v)) return null; const [h,m]=v.split(":").map(Number); return clamp(h*60+m,0,1440); }

              <div class="field"><label>Extra hours / day</label><input type="number" min="0" max="12" step="0.5" id="ot_extra" value="${round((ot.extraMinPerDay||0)/60,1)}" ${ot.enabled?'':'disabled'}></div>
              <div class="field"><label>Weekend work</label><label class="swrow" style="margin:6px 0 0"><input type="checkbox" id="ot_wk" ${ot.weekends?'checked':''} ${ot.enabled?'':'disabled'}> Allow weekends</label></div>
            </div>
            <button class="btn sm" data-act="cal-save-ot">${icon("check","ico")} Apply overtime</button>
          </div>
          <div>
            <div style="display:flex;align-items:center;margin-bottom:8px"><label class="lbl" style="margin:0">Shifts</label><span class="spacer"></span>
              <button class="btn sm" data-act="add-shift">${icon("plus","ico")} Add shift</button></div>
            <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:8px;margin-bottom:6px"><table class="tbl">
              <thead><tr><th>Shift</th><th>Hours</th><th>Break</th><th></th></tr></thead>
              <tbody>${(cal.shifts||[]).map(sh=>`<tr>
                <td>${esc(sh.name||"Shift")}</td>
                <td class="mono">${timeStr(sh.startMin)}&ndash;${timeStr(sh.endMin)}</td>
                <td class="mono">${sh.breakStartMin!=null?timeStr(sh.breakStartMin)+"&ndash;"+timeStr(sh.breakEndMin):"&mdash;"}</td>
                <td style="text-align:right;white-space:nowrap">
                  <button class="btn sm ghost" data-act="edit-shift" data-id="${sh.id}">${icon("edit","ico")}</button>
                  <button class="btn sm ghost" data-act="del-shift" data-id="${sh.id}">${icon("trash","ico")}</button></td></tr>`).join("")}
              </tbody></table></div>
            <div class="minihint" style="margin-bottom:16px">Add a second shift (e.g. 14:00&ndash;22:00) for double-shift days. Each shift can have one break (lunch).</div>

            <label class="lbl">Holidays (non-working dates)</label>
            <div class="depadd" style="margin:6px 0 8px">
              <input type="date" id="hol_date" style="flex:1">
              <button class="btn sm" data-act="add-holiday">${icon("plus","ico")} Add</button>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${(cal.holidays||[]).slice().sort((a,b)=>a-b).map(h=>`<span class="chip s-grey"><span class="dot"></span>${fmtDate(h)} <span data-act="del-holiday" data-h="${h}" style="cursor:pointer;margin-left:4px;color:var(--red);font-weight:700">&times;</span></span>`).join("") || '<span class="muted" style="font-size:11.5px">No holidays set.</span>'}
            </div>
          </div>
        </div>
      </div></div>`;
}
</script>
<script>
/* ================================================================== */
/* 11. INTERACTION LAYER — dispatcher, modals, import/export, init     */
/* ================================================================== */

/* ---------- small modal + input helpers ---------- */
let MB = null; /* modal working buffer (task editor / template flows) */

function openModal(title, bodyHTML, footerHTML){
  els.modal.innerHTML = `<div class="modal-bg"><div class="modal" role="dialog" aria-modal="true">
    <div class="modal-h"><h3>${esc(title)}</h3><span class="spacer"></span>
      <button class="icobtn" data-act="m-close" title="Close">${icon("x")}</button></div>
    <div class="modal-b" id="modal-body">${bodyHTML}</div>
    <div class="modal-f">${footerHTML||""}</div></div></div>`;
}
function closeModal(){ els.modal.innerHTML=""; MB=null; }
function setModalBody(html){ const b=document.getElementById("modal-body"); if(b) b.innerHTML=html; }

const mv  = (id)=>{ const el=document.getElementById(id); return el? el.value : ""; };
const mvt = (id)=> mv(id).trim();
const mvn = (id,def=0)=>{ const v=parseFloat(mv(id)); return isNaN(v)? def : v; };
const mc  = (id)=>{ const el=document.getElementById(id); return el? !!el.checked : false; };

function isoDate(ms){ if(ms==null||isNaN(ms)) return ""; const d=new Date(ms);
  const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function dateToMs(v, fallback){ if(!v) return fallback==null?null:fallback;
  const d=new Date(v+"T08:00:00"); return isNaN(d.getTime())? (fallback==null?null:fallback) : d.getTime(); }
function isoStamp(){ return new Date().toISOString().slice(0,10); }

function applyTheme(){ const ids=THEMES.map(t=>t.id); document.documentElement.dataset.theme = ids.includes(State.settings.theme)?State.settings.theme:"dark"; }
function commit(){ persist(); render(); }

/* ================================================================== */
/* PROGRAM editor                                                      */
/* ================================================================== */
function ensureCalendarId(){
  if(State.calendars[0]) return State.calendars[0].id;
  const cal={ id:uid("cal"), name:"Standard 5×8", workingDays:[false,true,true,true,true,true,false],
    shifts:[{startMin:480,endMin:960}], holidays:[], overtimeRules:[] };
  State.calendars.push(cal); return cal.id;
}
const PROG_STATUS=["ACTIVE","ON_HOLD","COMPLETED","CANCELLED"];

function programModal(id){
  const p=id? byId(State.programs,id):null; const isNew=!p;
  const body=`
    <div class="frow">
      <div class="field"><label>Program code</label><input id="m_code" value="${esc(p?p.code:"")}" placeholder="TACTICAL-UAV"></div>
      <div class="field"><label>Status</label><select id="m_status">
        ${PROG_STATUS.map(s=>`<option ${p&&p.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
    </div>
    <div class="field"><label>Program name</label><input id="m_name" value="${esc(p?p.name:"")}" placeholder="Tactical UAV"></div>
    <div class="grid cols-2"><div class="field"><label>Line gating</label>
      <select id="m_linemode"><option value="off" ${(p&&p.lineMode==="off")||!p||!p.lineMode?"selected":""}>Off (parallel)</option>
        <option value="serial" ${p&&p.lineMode==="serial"?"selected":""}>Serial (SN1 then SN2)</option>
        <option value="pulse" ${p&&p.lineMode==="pulse"?"selected":""}>Pulse line (relay)</option></select></div>
      <div class="field"><label>Line scope</label>
      <select id="m_linescope"><option value="program" ${!p||p.lineScope!=="model"?"selected":""}>Whole program</option>
        <option value="model" ${p&&p.lineScope==="model"?"selected":""}>Per model</option></select></div></div>
    <div class="swrow" style="margin-top:4px"><input type="checkbox" id="m_optlabor" ${p&&p.optimizeLabor?"checked":""}><label for="m_optlabor">Optimise labour \u2014 put idle technicians on tasks that can take more workers (up to each task\u2019s max) to finish bottlenecks sooner</label></div>
    <div class="field"><label>Description</label><textarea id="m_desc" rows="3">${esc(p?p.description:"")}</textarea></div>`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    <button class="btn primary" data-act="save-program" data-id="${id||""}">${icon("check","ico")} ${isNew?"Create program":"Save"}</button>`;
  openModal(isNew?"New Program":"Edit Program", body, foot);
}
function saveProgram(id){
  const code=mvt("m_code"), name=mvt("m_name")||"Untitled Program", status=mv("m_status"), desc=mvt("m_desc");
  const lineMode=mv("m_linemode")||"off", lineScope=mv("m_linescope")||"program"; const optimizeLabor=!!(document.getElementById("m_optlabor")||{}).checked;
  if(id){ const p=byId(State.programs,id); if(!p){ closeModal(); return; }
    if(p.name!==name) audit("PROGRAM",id,"UPDATE","name",p.name,name);
    if(p.status!==status) audit("PROGRAM",id,"UPDATE","status",p.status,status);
    if((p.lineMode||"off")!==lineMode) audit("PROGRAM",id,"UPDATE","lineMode",p.lineMode||"off",lineMode);
    p.code=code; p.name=name; p.status=status; p.description=desc; p.lineMode=lineMode; p.lineScope=lineScope; p.optimizeLabor=optimizeLabor;
  } else {
    const p={ id:uid("prog"), code:code||"PROG", name, description:desc, status,
      aircraftIds:[], defaultCalendarId:ensureCalendarId(), activeBaselineId:null, stageGating:false, lineMode, lineScope, optimizeLabor, createdAtMs:Date.now() };
    State.programs.push(p); State.ui.activeProgram=State.ui.activeProgram||p.id;
    audit("PROGRAM",p.id,"CREATE",null,null,name);
  }
  closeModal(); commit();
}
function deleteProgram(id){
  const p=byId(State.programs,id); if(!p) return;
  confirmModal("Delete program?",
    `This permanently removes “${esc(p.name)}”, its ${p.aircraftIds.length} aircraft, and all stages, tasks and dependencies.`,
    ()=>{
      const acIds=State.aircraft.filter(a=>a.programId===id).map(a=>a.id);
      const stIds=State.stages.filter(s=>acIds.includes(s.aircraftId)).map(s=>s.id);
      const tkIds=State.tasks.filter(t=>stIds.includes(t.stageId)).map(t=>t.id);
      State.tasks=State.tasks.filter(t=>!tkIds.includes(t.id));
      State.dependencies=State.dependencies.filter(d=>!tkIds.includes(d.taskId)&&!tkIds.includes(d.predecessorId));
      State.equipmentReqs=State.equipmentReqs.filter(r=>!tkIds.includes(r.taskId));
      State.stages=State.stages.filter(s=>!stIds.includes(s.id));
      State.gates=State.gates.filter(g=>!acIds.includes(g.aircraftId));
      State.aircraft=State.aircraft.filter(a=>a.programId!==id);
      delete State.schedules[id];
      State.programs=State.programs.filter(x=>x.id!==id);
      if(State.ui.activeProgram===id) State.ui.activeProgram=State.programs[0]?State.programs[0].id:null;
      audit("PROGRAM",id,"DELETE",null,p.name,null);
      closeModal(); commit();
    });
}

/* ================================================================== */
/* AIRCRAFT editor                                                     */
/* ================================================================== */
const AC_STATUS=["NOT_STARTED","WORKING","COMPLETE","CANCELLED"];

function buildStagesAndGates(ac, programId){
  GATE_DEFS.forEach(g=>State.gates.push({ id:uid("gate"), aircraftId:ac.id, gateNumber:g.n, name:g.name,
    status:"PENDING", approvedBy:null, approvedAtMs:null, notes:"" }));
  STANDARD_STAGES.forEach((sname,si)=>{
    const st={ id:uid("stg"), aircraftId:ac.id, programId, name:sname, sequence:si+1,
      status:"NOT_STARTED", templateRef:null, taskIds:[] };
    State.stages.push(st); ac.stageIds.push(st.id);
  });
}
function aircraftModal(id){
  const a=id? byId(State.aircraft,id):null; const isNew=!a;
  const ap=activeProgram();
  if(isNew && !ap){ toast("Select or create a program first","warn"); return; }
  const body=`
    <div class="frow">
      <div class="field"><label>Serial / tail number</label><input id="m_sn" value="${esc(a?a.serialNumber:"")}" placeholder="UAV-003"></div>
      <div class="field"><label>Status</label><select id="m_status">
        ${AC_STATUS.map(s=>`<option ${a&&a.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
    </div>
    <div class="frow three">
      <div class="field"><label>Model</label><input id="m_model" value="${esc(a?a.model:"Tactical-X")}"></div>
      <div class="field"><label>Config version</label><input id="m_cfg" value="${esc(a?a.configVersion:"1.0")}"></div>
      <div class="field"><label>Build revision</label><input id="m_rev" value="${esc(a?a.buildRevision:"A")}"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Planned start</label><input type="date" id="m_start" value="${isoDate(a?a.plannedStartMs:startOfNextMonday())}"></div>
      <div class="field"><label>Planned finish</label><input type="date" id="m_finish" value="${isoDate(a?a.plannedFinishMs:startOfNextMonday()+60*DAY)}"></div>
    </div>
    ${isNew?`<p class="muted" style="font-size:11.5px">A new tail is seeded with the 10 standard stages and 5 stage gates. Add tasks in Scheduling, or apply a template.</p>`:""}`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    <button class="btn primary" data-act="save-aircraft" data-id="${id||""}">${icon("check","ico")} ${isNew?"Create aircraft":"Save"}</button>`;
  openModal(isNew?"New Aircraft":"Edit Aircraft", body, foot);
}
function saveAircraft(id){
  const sn=mvt("m_sn")||"UAV-NEW", model=mvt("m_model")||"Tactical-X", cfg=mvt("m_cfg")||"1.0",
    rev=mvt("m_rev")||"A", status=mv("m_status"),
    start=dateToMs(mv("m_start"), startOfNextMonday()), finish=dateToMs(mv("m_finish"), null);
  if(id){ const a=byId(State.aircraft,id); if(!a){ closeModal(); return; }
    if(a.serialNumber!==sn) audit("AIRCRAFT",id,"UPDATE","serialNumber",a.serialNumber,sn);
    a.serialNumber=sn; a.model=model; a.configVersion=cfg; a.buildRevision=rev; a.status=status;
    a.plannedStartMs=start; a.plannedFinishMs=finish;
  } else {
    const ap=activeProgram();
    const ac={ id:uid("ac"), programId:ap.id, serialNumber:sn, model, configVersion:cfg, buildRevision:rev,
      status, plannedStartMs:start, plannedFinishMs:finish, stageIds:[] };
    State.aircraft.push(ac); ap.aircraftIds.push(ac.id);
    buildStagesAndGates(ac, ap.id);
    State.ui.activeAircraft=ac.id;
    audit("AIRCRAFT",ac.id,"CREATE",null,null,sn);
  }
  closeModal(); commit();
}
function deleteAircraft(id){
  const a=byId(State.aircraft,id); if(!a) return;
  confirmModal("Delete aircraft?", `Remove “${esc(a.serialNumber)}” and all its stages, gates and tasks?`, ()=>{
    const stIds=State.stages.filter(s=>s.aircraftId===id).map(s=>s.id);
    const tkIds=State.tasks.filter(t=>stIds.includes(t.stageId)).map(t=>t.id);
    State.tasks=State.tasks.filter(t=>!tkIds.includes(t.id));
    State.dependencies=State.dependencies.filter(d=>!tkIds.includes(d.taskId)&&!tkIds.includes(d.predecessorId));
    State.equipmentReqs=State.equipmentReqs.filter(r=>!tkIds.includes(r.taskId));
    State.stages=State.stages.filter(s=>!stIds.includes(s.id));
    State.gates=State.gates.filter(g=>g.aircraftId!==id);
    const ap=byId(State.programs,a.programId); if(ap) ap.aircraftIds=ap.aircraftIds.filter(x=>x!==id);
    State.aircraft=State.aircraft.filter(x=>x.id!==id);
    if(State.ui.activeAircraft===id) State.ui.activeAircraft=null;
    audit("AIRCRAFT",id,"DELETE",null,a.serialNumber,null);
    closeModal(); commit();
  });
}

/* ================================================================== */
/* GATE approve / reject                                               */
/* ================================================================== */
function gateModal(id){
  const g=byId(State.gates,id); if(!g) return;
  const ac=byId(State.aircraft,g.aircraftId);
  const body=`
    <div class="kv" style="margin-bottom:14px">
      <dt>Aircraft</dt><dd>${esc(ac?ac.serialNumber:"—")}</dd>
      <dt>Gate</dt><dd>G${g.gateNumber} · ${esc(g.name)}</dd>
      <dt>Current</dt><dd>${esc(g.status)}${g.approvedBy?` · ${esc(g.approvedBy)} · ${fmtDateTime(g.approvedAtMs)}`:""}</dd>
    </div>
    <div class="field"><label>Notes</label><textarea id="m_notes" rows="3" placeholder="Inspection findings, sign-off remarks…">${esc(g.notes||"")}</textarea></div>`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    <button class="btn" data-act="gate-set" data-id="${id}" data-st="PENDING">Reset</button>
    <button class="btn danger" data-act="gate-set" data-id="${id}" data-st="REJECTED">${icon("x","ico")} Reject</button>
    <button class="btn primary" data-act="gate-set" data-id="${id}" data-st="APPROVED">${icon("check","ico")} Approve</button>`;
  openModal("Stage Gate Review", body, foot);
}
function setGate(id, status){
  const g=byId(State.gates,id); if(!g) return;
  const before=g.status;
  g.status=status; g.notes=mvt("m_notes");
  if(status==="APPROVED"){ g.approvedBy=State.settings.userLabel||"Planner"; g.approvedAtMs=Date.now(); }
  else { g.approvedBy=null; g.approvedAtMs=null; }
  audit("GATE",id,"REVIEW","status",before,status);
  closeModal(); commit();
}

/* ================================================================== */
/* LABOR POOL editor                                                   */
/* ================================================================== */
function laborModal(id){
  const p=id? byId(State.laborPools,id):null; const isNew=!p;
  const body=`
    <div class="field"><label>Skill category</label><select id="m_cat" ${id?"disabled":""}>
      ${LABOR_SKILLS.map(s=>`<option value="${s}" ${p&&p.category===s?"selected":""}>${SKILL_LABEL[s]}</option>`).join("")}</select></div>
    <div class="field"><label>Pool name</label><input id="m_name" value="${esc(p?p.name:"")}" placeholder="Composite Tech Pool"></div>
    <div class="frow">
      <div class="field"><label>Headcount</label><input type="number" min="0" id="m_hc" value="${p?p.headcount:4}">
        <div class="hint">People available for this skill at once \u2014 the scheduler never books more than this.</div></div>
      <div class="field"><label>Cost / hour ($)</label><input type="number" min="0" id="m_rate" value="${p?p.costRatePerHr:50}"></div>
    </div>`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    ${id?`<button class="btn danger" data-act="del-labor" data-id="${id}">${icon("trash","ico")} Delete</button>`:""}
    <button class="btn primary" data-act="save-labor" data-id="${id||""}">${icon("check","ico")} ${isNew?"Add pool":"Save"}</button>`;
  openModal(isNew?"New Labor Pool":"Edit Labor Pool", body, foot);
}
function saveLabor(id){
  const cat=mv("m_cat")||"ASSEMBLY_TECH", name=mvt("m_name")||(SKILL_LABEL[cat]+" Pool"),
    hc=Math.max(0,mvn("m_hc",1)), rate=Math.max(0,mvn("m_rate",0));
  if(id){ const p=byId(State.laborPools,id); if(!p){ closeModal(); return; }
    audit("LABOR",id,"UPDATE","headcount",p.headcount,hc);
    p.name=name; p.headcount=hc; p.costRatePerHr=rate;
  } else {
    State.laborPools.push({ id:uid("lab"), category:cat, name, headcount:hc, costRatePerHr:rate, calendarId:ensureCalendarId() });
    audit("LABOR","-","CREATE",null,null,name);
  }
  closeModal(); commit();
}
function deleteLabor(id){ const p=byId(State.laborPools,id); if(!p) return;
  State.laborPools=State.laborPools.filter(x=>x.id!==id); audit("LABOR",id,"DELETE",null,p.name,null);
  closeModal(); commit(); }

/* ================================================================== */
/* EQUIPMENT editor                                                    */
/* ================================================================== */
function equipModal(id){
  const e=id? byId(State.equipment,id):null; const isNew=!e;
  const body=`
    <div class="field"><label>Equipment type</label><select id="m_type" ${id?"disabled":""}>
      ${EQUIP_TYPES.map(t=>`<option value="${t}" ${e&&e.type===t?"selected":""}>${EQUIP_LABEL[t]}</option>`).join("")}</select></div>
    <div class="field"><label>Group name</label><input id="m_name" value="${esc(e?e.name:"")}" placeholder="Oven-Group"></div>
    <div class="frow">
      <div class="field"><label>Units</label><input type="number" min="0" id="m_units" value="${e?e.units:1}"></div>
      <div class="field"><label>Cost / hour ($)</label><input type="number" min="0" id="m_rate" value="${e?e.costRatePerHr:25}"></div>
    </div>
    <label style="display:flex;gap:8px;align-items:center;font-size:12px;color:var(--ink-2)">
      <input type="checkbox" id="m_cont" ${e&&e.continuousOperation?"checked":""} style="width:auto"> Continuous operation (runs 24/7 \u2014 ovens cure overnight, ignoring shifts)</label>
    <div class="hint" style="margin-top:6px">Leave off for equipment that only runs during working shifts (e.g. CNC, paint booth).</div>`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    ${id?`<button class="btn danger" data-act="del-equip" data-id="${id}">${icon("trash","ico")} Delete</button>`:""}
    <button class="btn primary" data-act="save-equip" data-id="${id||""}">${icon("check","ico")} ${isNew?"Add equipment":"Save"}</button>`;
  openModal(isNew?"New Equipment":"Edit Equipment", body, foot);
}
function saveEquip(id){
  const type=mv("m_type")||"WORKSTATION", name=mvt("m_name")||(EQUIP_LABEL[type]+"-Group"),
    units=Math.max(0,mvn("m_units",1)), rate=Math.max(0,mvn("m_rate",0)), cont=mc("m_cont");
  if(id){ const e=byId(State.equipment,id); if(!e){ closeModal(); return; }
    audit("EQUIPMENT",id,"UPDATE","units",e.units,units);
    e.name=name; e.units=units; e.costRatePerHr=rate; e.continuousOperation=cont;
  } else {
    State.equipment.push({ id:uid("eq"), type, name, units, costRatePerHr:rate, calendarId:ensureCalendarId(), continuousOperation:cont });
    audit("EQUIPMENT","-","CREATE",null,null,name);
  }
  closeModal(); commit();
}
function deleteEquip(id){ const e=byId(State.equipment,id); if(!e) return;
  State.equipment=State.equipment.filter(x=>x.id!==id); audit("EQUIPMENT",id,"DELETE",null,e.name,null);
  closeModal(); commit(); }

/* ================================================================== */
/* TASK editor (fields + equipment + dependencies) — uses MB buffer    */
/* ================================================================== */
function taskModal(taskId, stageId){
  let task, stage;
  const isNew=!taskId;
  if(isNew){
    stage=byId(State.stages,stageId); if(!stage){ toast("Stage not found","err"); return; }
    task={ id:null, stageId:stage.id, programId:stage.programId,
      wbsCode:stage.sequence+"."+(stage.taskIds.length+1), name:"", description:"",
      plannedLaborHours:8, actualLaborHours:0, fixedDurationHrs:null,
      curingDurationHrs:0, coolingDurationHrs:0, minWorkers:1, maxWorkers:4, assignedWorkers:2,
      laborSkill:"ASSEMBLY_TECH", allocationMode:"FIXED", priority:5, status:"NOT_STARTED",
      plannedCost:0, actualCost:0, percentComplete:0, cureMode:"OVEN", seq:(stage.taskIds.length+1) };
  } else {
    const src=byId(State.tasks,taskId); if(!src){ toast("Task not found","err"); return; }
    stage=byId(State.stages,src.stageId);
    task=JSON.parse(JSON.stringify(src));
  }
  const equip={}; if(taskId) State.equipmentReqs.filter(r=>r.taskId===taskId).forEach(r=>equip[r.equipmentType]={quantity:r.quantity,phase:r.phase});
  const deps= taskId? State.dependencies.filter(d=>d.taskId===taskId).map(d=>({...d})) : [];
  MB={ kind:"task", isNew, task, stageId:stage.id, aircraftId:stage.aircraftId, equip, deps };
  openModal(isNew?"Add Task":"Edit Task", taskModalBody(), taskModalFoot());
}
function siblingTasks(){ // other tasks in the same aircraft (potential predecessors)
  const stIds=State.stages.filter(s=>s.aircraftId===MB.aircraftId).map(s=>s.id);
  return State.tasks.filter(t=>stIds.includes(t.stageId) && t.id!==MB.task.id)
    .sort((a,b)=>a.wbsCode.localeCompare(b.wbsCode,undefined,{numeric:true}));
}
function taskModalBody(){
  const t=MB.task;
  const skills=LABOR_SKILLS.map(s=>`<option value="${s}" ${t.laborSkill===s?"selected":""}>${SKILL_LABEL[s]}</option>`).join("");
  const stat=Object.keys(STATUS).map(s=>`<option value="${s}" ${t.status===s?"selected":""}>${STATUS[s].label}</option>`).join("");
  const equipRows=EQUIP_TYPES.filter(et=>et!=="OVEN").map(et=>{

      <div class="field"><label>WBS</label><input id="m_wbs" value="${esc(t.wbsCode)}"></div>
      <div class="field"><label>Skill</label><select id="m_skill">${skills}</select></div>
    </div>
    <div class="frow"><div class="field" style="grid-column:1/3"><label>Status</label><select id="m_status">${stat}</select></div></div>
    <div class="seccap">Estimate &middot; planning inputs</div>
    <div class="frow three">
      <div class="field"><label>Planned labor (hrs)</label><input type="number" min="0" step="0.5" id="m_labor" value="${t.plannedLaborHours}">
        <div class="hint">Total hands-on hours. Divided across assigned workers.</div></div>
      <div class="field"><label>Fixed duration (hrs)</label><input type="number" min="0" id="m_fixed" value="${t.fixedDurationHrs==null?"":t.fixedDurationHrs}" placeholder="auto">

      <div class="field"><label>Max workers</label><input type="number" min="1" id="m_max" value="${t.maxWorkers}"></div>

      <div class="field"><label>% complete</label><input type="number" min="0" max="100" id="m_pct" value="${t.percentComplete}">

    ${helpNote(`<b>Predecessors set the build order.</b> A task with <b>no predecessor</b> runs <b>in parallel</b> with others the moment people &amp; equipment are free. Add a predecessor to force <b>sequence</b> \u2014 e.g. <i>Structural Bonding</i> must wait for <i>Lamination</i>. <b>Finish\u2192Start</b> = begin after it finishes (default &amp; most common); <b>Start\u2192Start</b> = begin together; <b>Finish\u2192Finish</b> = end together. <b>Lag</b> adds an hours delay (e.g. +4h). Resource limits still apply, so parallel tasks queue if they need the same crew or oven.`)}

function taskModalFoot(){
  return `<button class="btn" data-act="m-close">Cancel</button>
    ${MB.isNew?"":`<button class="btn danger" data-act="del-task">${icon("trash","ico")} Delete</button>`}

/* read modal fields into MB.task + MB.equip (called before dep mutations and on save) */
function syncTaskBuffer(){
  if(!MB||MB.kind!=="task") return; const t=MB.task;
  t.name=mvt("m_name")||"Untitled Task"; t.wbsCode=mvt("m_wbs")||t.wbsCode;
  t.seq=Math.max(1,Math.round(mvn("m_seq",t.seq||1)));
  t.laborSkill=mv("m_skill"); t.status=mv("m_status");
  t.plannedLaborHours=Math.max(0,mvn("m_labor",0));
  const fx=mv("m_fixed").trim(); t.fixedDurationHrs= fx===""?null:Math.max(0,parseFloat(fx)||0);
  t.priority=clamp(Math.round(mvn("m_prio",5)),1,10);
  t.minWorkers=Math.max(1,Math.round(mvn("m_min",1)));
  t.maxWorkers=Math.max(t.minWorkers,Math.round(mvn("m_max",t.minWorkers)));
  t.assignedWorkers=clamp(Math.round(mvn("m_assigned",t.minWorkers)),t.minWorkers,t.maxWorkers);
  t.curingDurationHrs=Math.max(0,mvn("m_cure",0));
  t.coolingDurationHrs=Math.max(0,mvn("m_cool",0));
  { const cm=mv("m_curemode"); t.cureMode = cm==="AMBIENT"?"AMBIENT":"OVEN"; }
  t.plannedCost=Math.max(0,mvn("m_cost",0));
  t.percentComplete=clamp(mvn("m_pct",0),0,100);
  t.actualLaborHours=Math.max(0,mvn("m_alabor",0));
  t.actualCost=Math.max(0,mvn("m_acost",0));
  // equipment checkboxes
  MB.equip={};
  document.querySelectorAll("[data-eq]").forEach(cb=>{
    if(cb.checked){ const et=cb.dataset.eq; const qEl=document.querySelector(`[data-eqq="${et}"]`);
      MB.equip[et]={ quantity:Math.max(1,parseInt(qEl&&qEl.value,10)||1), phase: et==="OVEN"?"BOTH":(et==="STORAGE_RACK"?"COOL":"WORK") }; }
  });
}
function addDep(){
  syncTaskBuffer();
  const pid=mv("m_pred"); if(!pid){ refreshTaskBody(); return; }
  if(pid===MB.task.id){ toast("A task cannot depend on itself","warn"); return; }
  if(MB.deps.some(d=>d.predecessorId===pid)){ toast("Dependency already exists","warn"); return; }
  MB.deps.push({ id:uid("dep"), taskId:MB.task.id||"__new", predecessorId:pid, type:mv("m_deptype")||"FS", lagHours:Math.max(0,mvn("m_lag",0)) });
  refreshTaskBody();
}
function delDep(i){ syncTaskBuffer(); MB.deps.splice(i,1); refreshTaskBody(); }
function refreshTaskBody(){ setModalBody(taskModalBody()); }

function saveTask(){
  syncTaskBuffer(); const t=MB.task;
  if(MB.isNew){
    t.id=uid("task");
    const stage=byId(State.stages,MB.stageId);
    State.tasks.push(t); if(stage && !stage.taskIds.includes(t.id)) stage.taskIds.push(t.id);
    audit("TASK",t.id,"CREATE",null,null,t.name);
  } else {
    const src=byId(State.tasks,t.id); if(src){ if(src.name!==t.name) audit("TASK",t.id,"UPDATE","name",src.name,t.name);
      Object.assign(src,t); }
  }
  const tid=t.id;
  // equipment reqs: replace set
  State.equipmentReqs=State.equipmentReqs.filter(r=>r.taskId!==tid);
  Object.entries(MB.equip).forEach(([et,v])=>{ if(et==="OVEN") return; State.equipmentReqs.push({ id:uid("ereq"), taskId:tid, equipmentType:et, quantity:v.quantity, phase:v.phase }); });
  if((t.curingDurationHrs||0)>0 && t.cureMode!=="AMBIENT") State.equipmentReqs.push({ id:uid("ereq"), taskId:tid, equipmentType:"OVEN", quantity:1, phase:"BOTH" });
  // dependencies: replace set (only valid predecessors)
  State.dependencies=State.dependencies.filter(d=>d.taskId!==tid);
  MB.deps.forEach(d=>{ if(d.predecessorId && d.predecessorId!==tid && byId(State.tasks,d.predecessorId))
    State.dependencies.push({ id:uid("dep"), taskId:tid, predecessorId:d.predecessorId, type:d.type||"FS", lagHours:d.lagHours||0 }); });
  closeModal(); commit();
}
function deleteTask(){
  const t=MB&&MB.task; if(!t||!t.id){ closeModal(); return; }
  const id=t.id, name=t.name;
  State.tasks=State.tasks.filter(x=>x.id!==id);
  State.dependencies=State.dependencies.filter(d=>d.taskId!==id && d.predecessorId!==id);
  State.equipmentReqs=State.equipmentReqs.filter(r=>r.taskId!==id);
  State.stages.forEach(s=>{ s.taskIds=s.taskIds.filter(x=>x!==id); });
  audit("TASK",id,"DELETE",null,name,null);
  closeModal(); commit();
}

function saveTemplateModal(){
  const ap=activeProgram(); if(!ap){ toast("No active program","warn"); return; }
  const acs=State.aircraft.filter(a=>a.programId===ap.id);
  if(!acs.length){ toast("No aircraft to capture","warn"); return; }
  const def=State.ui.activeAircraft && acs.some(a=>a.id===State.ui.activeAircraft)? State.ui.activeAircraft : acs[0].id;
  const body=`
    <div class="field"><label>Source aircraft (stage/task structure to capture)</label>
      <select id="m_src">${acs.map(a=>`<option value="${a.id}" ${a.id===def?"selected":""}>${esc(a.serialNumber)} · ${State.tasks.filter(t=>State.stages.filter(s=>s.aircraftId===a.id).map(s=>s.id).includes(t.stageId)).length} tasks</option>`).join("")}</select></div>
    <div class="field"><label>Template name</label><input id="m_name" placeholder="Standard Tactical Build"></div>
    <div class="field"><label>Description</label><textarea id="m_desc" rows="2"></textarea></div>`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    <button class="btn primary" data-act="commit-template">${icon("copy","ico")} Save Template</button>`;
  openModal("Save Aircraft as Template", body, foot);
}
function captureTemplate(aircraftId,name,desc){
  const stages=State.stages.filter(s=>s.aircraftId===aircraftId).sort((a,b)=>a.sequence-b.sequence);
  const flat=[]; stages.forEach(st=>State.tasks.filter(t=>t.stageId===st.id)
    .sort((a,b)=>a.wbsCode.localeCompare(b.wbsCode,undefined,{numeric:true})).forEach(t=>flat.push(t)));
  const gidx={}; flat.forEach((t,i)=>gidx[t.id]=i);
  const tpStages=stages.map(st=>({ name:st.name, sequence:st.sequence,
    tasks: State.tasks.filter(t=>t.stageId===st.id).sort((a,b)=>a.wbsCode.localeCompare(b.wbsCode,undefined,{numeric:true})).map(t=>({
      name:t.name, gidx:gidx[t.id],
      plannedLaborHours:t.plannedLaborHours, fixedDurationHrs:t.fixedDurationHrs,
      curingDurationHrs:t.curingDurationHrs, coolingDurationHrs:t.coolingDurationHrs,
      minWorkers:t.minWorkers, maxWorkers:t.maxWorkers, assignedWorkers:t.assignedWorkers,
      laborSkill:t.laborSkill, priority:t.priority, plannedCost:t.plannedCost,
      equip: State.equipmentReqs.filter(r=>r.taskId===t.id).map(r=>({type:r.equipmentType,quantity:r.quantity,phase:r.phase})),
      deps: State.dependencies.filter(d=>d.taskId===t.id).map(d=>({predGidx:gidx[d.predecessorId],type:d.type,lagHours:d.lagHours}))
        .filter(d=>d.predGidx!=null)
    })) }));
  return { id:uid("tpl"), name:name||"Untitled Template", description:desc||"", stages:tpStages, createdAtMs:Date.now() };
}
function commitTemplate(){
  const src=mv("m_src"), name=mvt("m_name")||"Untitled Template", desc=mvt("m_desc");
  if(!src){ closeModal(); return; }
  const tp=captureTemplate(src,name,desc); State.templates.push(tp);
  audit("TEMPLATE",tp.id,"CREATE",null,null,name);
  closeModal(); commit(); toast("Template saved");
}
function applyTemplateModal(tplId){
  const tp=byId(State.templates,tplId); if(!tp){ return; }
  const ap=activeProgram(); if(!ap){ toast("No active program","warn"); return; }
  const acs=State.aircraft.filter(a=>a.programId===ap.id);
  if(!acs.length){ toast("Add an aircraft to apply onto","warn"); return; }
  const body=`
    <p class="muted" style="margin-top:0">Applying “${esc(tp.name)}” adds its ${tp.stages.length} stage blueprint(s) and ${sum(tp.stages,s=>s.tasks.length)} task(s) to the chosen aircraft (existing stages are matched by name).</p>
    <div class="field"><label>Target aircraft</label>
      <select id="m_tgt">${acs.map(a=>`<option value="${a.id}" ${a.id===State.ui.activeAircraft?"selected":""}>${esc(a.serialNumber)}</option>`).join("")}</select></div>`;
  const foot=`<button class="btn" data-act="m-close">Cancel</button>
    <button class="btn primary" data-act="commit-apply" data-id="${tplId}">${icon("layers","ico")} Apply Template</button>`;
  openModal("Apply Template", body, foot);
}
function applyTemplate(tplId, aircraftId){
  const tp=byId(State.templates,tplId), ac=byId(State.aircraft,aircraftId); if(!tp||!ac) return;
  const programId=ac.programId; const created=[];
  tp.stages.forEach(ts=>{
    let st=State.stages.find(s=>s.aircraftId===ac.id && s.name===ts.name);
    if(!st){ st={ id:uid("stg"), aircraftId:ac.id, programId, name:ts.name, sequence:ts.sequence,
      status:"NOT_STARTED", templateRef:tp.id, taskIds:[] }; State.stages.push(st); ac.stageIds.push(st.id); }
    ts.tasks.forEach(tt=>{
      const t={ id:uid("task"), stageId:st.id, programId, wbsCode:st.sequence+"."+(st.taskIds.length+1),
        name:tt.name, description:"", plannedLaborHours:tt.plannedLaborHours, actualLaborHours:0,
        fixedDurationHrs:tt.fixedDurationHrs, curingDurationHrs:tt.curingDurationHrs, coolingDurationHrs:tt.coolingDurationHrs,
        minWorkers:tt.minWorkers, maxWorkers:tt.maxWorkers, assignedWorkers:tt.assignedWorkers,
        laborSkill:tt.laborSkill, allocationMode:"FIXED", priority:tt.priority, status:"NOT_STARTED",
        plannedCost:tt.plannedCost, actualCost:0, percentComplete:0 };
      State.tasks.push(t); st.taskIds.push(t.id); created[tt.gidx]=t.id;
      (tt.equip||[]).forEach(eq=>State.equipmentReqs.push({ id:uid("ereq"), taskId:t.id, equipmentType:eq.type, quantity:eq.quantity, phase:eq.phase }));
    });
  });
  tp.stages.forEach(ts=>ts.tasks.forEach(tt=>{ const nid=created[tt.gidx]; if(!nid) return;
    (tt.deps||[]).forEach(d=>{ const pid=created[d.predGidx];
      if(pid) State.dependencies.push({ id:uid("dep"), taskId:nid, predecessorId:pid, type:d.type, lagHours:d.lagHours }); }); }));
  State.ui.activeAircraft=ac.id;
  audit("AIRCRAFT",ac.id,"APPLY_TEMPLATE",null,null,tp.name);
  closeModal(); commit(); toast("Template applied to "+ac.serialNumber);
}
function deleteTemplate(id){ const tp=byId(State.templates,id); if(!tp) return;
  confirmModal("Delete template?",`Remove “${esc(tp.name)}”?`,()=>{
    State.templates=State.templates.filter(x=>x.id!==id); audit("TEMPLATE",id,"DELETE",null,tp.name,null);
    closeModal(); commit(); }); }

function triggerDownload(filename, text, mime){
  try{
    const blob=new Blob([text],{type:mime||"application/octet-stream"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },120);
  }catch(e){ toast("Download failed: "+e.message,"err"); }
}
function exportJSON(){ triggerDownload("aeroplan-backup-"+isoStamp()+".json", JSON.stringify(snapshot(),null,2), "application/json"); toast("Backup exported"); }
function importJSON(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{
        const obj=JSON.parse(r.result);
        if(!obj||typeof obj!=="object"||!Array.isArray(obj.programs)) throw new Error("Not an AeroPlan backup");
        if(obj.version && obj.version>SCHEMA_VERSION) toast("Backup is a newer schema; importing best-effort","warn");
        applySnapshot(obj);
        if(!State.ui.activeProgram && State.programs[0]) State.ui.activeProgram=State.programs[0].id;
        applyTheme(); persist(); render(); toast("Backup restored");
      }catch(e){ toast("Restore failed: "+e.message,"err"); } };
    r.onerror=()=>toast("Could not read file","err");
    r.readAsText(f); };
  inp.click();
}
function csvCell(v){ v=v==null?"":String(v); return /[",\r\n]/.test(v)? '"'+v.replace(/"/g,'""')+'"' : v; }
function exportCSV(kind){
  const ap=activeProgram(); const rows=[];
  if(kind==="efficiency"){
    const ef=Analytics.efficiency(ap?ap.id:null);
    rows.push(["Unit","Serial","Model","Tasks","StdHrs","ActualHrs","EarnedHrs","PctComplete","WindowHrs","AvgCrew","RequiredEffPct","AchievedEffPct","Status"]);
    ef.units.forEach(u=>rows.push([u.unit,u.serial,u.model,u.taskCount,u.std,u.act,u.earned,u.pct,u.winHrs,u.avgCrew,(u.requiredEff==null?"":u.requiredEff),(u.achievedEff==null?"":u.achievedEff),(u.complete?"Complete":(u.act>0?"In build":"Not started"))]));
  } else if(kind==="resources"){
    rows.push(["Type","Category","Name","Count","Cost/Hr","Peak %"]);

/* ---------- EFFICIENCY & LEARNING CURVE ---------- */
function viewEfficiency(){
  const ap=activeProgram();
  if(!ap) return viewHead("Efficiency & Learning Curve","Productivity & serial-build analysis")+emptyState("trend","No active program","Open a program to analyse labor efficiency and the serial-build learning curve.","");
  const lc=Analytics.learningCurve(ap.id); const eff=lc.eff; const units=eff.units;
  const ra=eff.progRequired, ac=eff.progAchieved;
  const acCls= ac==null? "" : (ra!=null && ac<ra? "k-red" : ac>=100? "k-green":"k-amber");
  const expEff= ap.expectedEfficiency||100;
  const kpis=`<div class="grid cols-5" style="margin-bottom:14px">
    <div class="kpi"><div class="label">Expected Efficiency</div>
      <div class="val" style="display:flex;align-items:center;gap:6px"><input type="number" min="10" max="200" step="5" value="${expEff}" data-act="set-expected-eff" style="width:62px;background:var(--panel-2);border:1px solid var(--line-2);color:var(--ink);border-radius:6px;padding:2px 6px;font-size:24px;font-weight:700;font-family:var(--font-display)">%</div>
      <div class="meta">planning pace \u2014 drives the schedule</div></div>
    <div class="kpi ${acCls}"><div class="label">Achieved Efficiency</div><div class="val">${ac==null?"\u2014":ac+"<span class='unit'>%</span>"}</div><div class="meta">earned \u00f7 actual labor</div></div>
    <div class="kpi k-blue"><div class="label">Required Efficiency</div><div class="val">${ra==null?"\u2014":ra+"<span class='unit'>%</span>"}</div><div class="meta">to hold planned windows</div></div>
    <div class="kpi"><div class="label">Learning Rate</div><div class="val">${lc.enough?lc.LR+"<span class='unit'>%</span>":"\u2014"}</div><div class="meta">${lc.enough?lc.slopePct+"% \u2193 per doubling":"need 2+ built units"}</div></div>
    <div class="kpi"><div class="label">Units With Actuals</div><div class="val">${eff.built}<span class="unit">/${units.length}</span></div><div class="meta">serial builds recorded</div></div>
  </div>`;
  const rowsHtml = units.length? units.map(u=>{
    const req=u.requiredEff==null?"\u2014":u.requiredEff+"%"; const ach=u.achievedEff==null?"\u2014":u.achievedEff+"%";
    const achCol= u.achievedEff==null?"var(--ink-3)":(u.requiredEff!=null&&u.achievedEff<u.requiredEff?"var(--red)":u.achievedEff>=100?"var(--green)":"var(--amber)");
    const status= u.complete? '<span class="chip s-green"><span class="dot"></span>Complete</span>' : u.act>0? '<span class="chip s-blue"><span class="dot"></span>In build</span>' : '<span class="chip"><span class="dot"></span>Not started</span>';
    return `<tr data-act="open-aircraft-stages" data-id="${u.id}" style="cursor:pointer">
      <td class="mono">U${u.unit}</td><td><b>${esc(u.serial)}</b></td>
      <td class="num">${u.std}</td><td class="num">${u.act||"\u2014"}</td><td class="num">${u.earned}</td><td class="num">${u.pct}%</td>
      <td class="num">${req}</td><td class="num" style="color:${achCol};font-weight:700">${ach}</td><td>${status}</td></tr>`;
  }).join("") : `<tr><td colspan="9" class="muted">No aircraft yet \u2014 add tails to this program.</td></tr>`;
  let analysis;
  if(lc.enough){
    const trend= lc.LR<90? "a strong learning effect" : lc.LR<98? "a moderate learning effect" : "little measurable learning yet";
    const behind= (ac!=null&&ra!=null&&ac<ra);
    analysis= `Across ${lc.points.length} built unit(s), first-unit labor fits at <b>~${lc.T1} h</b> with ${trend} \u2014 a <b>${lc.LR}% learning rate</b> (each doubling of cumulative units cuts unit hours by ~${lc.slopePct}%), R\u00b2 ${lc.r2}. `+
      (lc.proj.length? `The next unit (U${lc.obsMax+1}) is projected at <b>~${lc.proj[0].hrs} h</b>. `:"")+
      `Fleet achieved efficiency is ${ac==null?"n/a":"<b>"+ac+"%</b>"} versus a planned ${expEff}% and a required ${ra==null?"n/a":ra+"%"}`+
      (behind? ` \u2014 currently <b style="color:var(--red)">behind</b> the rate needed; add crew, overtime, or widen the planned window.`:` \u2014 on or ahead of the rate needed to hold the planned windows.`);
  } else {
    analysis= `Record <b>Actual labor (hrs)</b> and <b>% complete</b> on each task (in the task editor) for at least two serially-built tails to fit a learning curve. <b>Achieved efficiency</b> = earned \u00f7 actual labor; <b>required efficiency</b> = standard hours \u00f7 the labor capacity available inside each aircraft\u2019s planned window.`;
  }
  return viewHead("Efficiency & Learning Curve", esc(ap.name)+" \u00b7 productivity & serial-build analysis",
    `<button class="btn sm" data-act="export-csv" data-kind="efficiency">${icon("download","ico")} Units CSV</button>
     <button class="btn sm" data-act="export-pdf" data-kind="efficiency">${icon("pdf","ico")} PDF report</button>
     <button class="btn primary" data-act="run-schedule">${icon("play","ico")} Run Schedule</button>`)+`
    ${kpis}
    <div class="grid cols-2">
      <div class="panel"><div class="panel-h"><span class="eyebrow">Serial build</span><h3>Learning Curve \u2014 labor hours per unit</h3></div>
        <div class="panel-b">
          ${lc.enough? `<canvas id="lc-canvas" style="width:100%;height:260px"></canvas>
            <div class="legend"><span><i style="background:var(--accent)"></i>Fitted curve</span><span><i style="background:var(--amber)"></i>Projection</span><span><i style="background:var(--green)"></i>Completed unit</span><span><i style="background:var(--blue)"></i>In-build unit</span></div>`
          : emptyState("trend","Not enough data","Record actual labor hours & % complete on 2+ serially-built tails to plot the curve.","")}
        </div></div>
      <div class="panel"><div class="panel-h"><span class="eyebrow">Analysis</span><h3>Findings & projection</h3></div>
        <div class="panel-b"><p style="font-size:12.5px;line-height:1.65;color:var(--ink-2);margin-top:0">${analysis}</p>
          ${lc.enough? `<table class="tbl" style="margin-top:6px"><thead><tr><th>Projected unit</th><th class="num">Estimated labor (h)</th></tr></thead><tbody>${lc.proj.map(p=>`<tr><td class="mono">U${p.n}</td><td class="num">${p.hrs}</td></tr>`).join("")}</tbody></table>`:""}
        </div></div>
    </div>
    <div class="panel" style="margin-top:12px"><div class="panel-h"><span class="eyebrow">${units.length} tail(s)</span><h3>Per-unit efficiency</h3>
      <span class="spacer"></span><span class="muted" style="font-size:11px">Click a row to open the aircraft</span></div>
      <div class="panel-b"><div class="tbl-wrap"><table class="tbl"><thead><tr>
        <th>Unit</th><th>Serial</th><th class="num">Std h</th><th class="num">Actual h</th><th class="num">Earned h</th><th class="num">%</th><th class="num">Required</th><th class="num">Achieved</th><th>Status</th>
      </tr></thead><tbody>${rowsHtml}</tbody></table></div></div></div>`;
}
