      doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor.apply(doc,C.ink); doc.text(a.serialNumber.length>11?a.serialNumber.slice(0,11):a.serialNumber, M, y+cellH-4.5);
      for(let cI=0;cI<cols;cI++){ const stg=State.stages.find(ss=>ss.aircraftId===a.id && ss.name===stNames[cI]); let pct=0;
        if(stg){ const tk=State.tasks.filter(t=>t.stageId===stg.id); const tw=sum(tk,_flowW); pct= tw? Math.round(sum(tk,t=>_flowW(t)*(t.percentComplete||0))/tw):0; }
        let fill; if(pct>=100) fill=[205,236,219]; else if(pct>0){ const k=clamp(pct,0,100)/100; fill=[Math.round(226-18*k),Math.round(235-6*k),251]; } else fill=[244,246,249];
        doc.setFillColor.apply(doc,fill); doc.setDrawColor(212,219,227); doc.setLineWidth(0.6); doc.rect(M+mLabelW+cI*cellW, y, cellW, cellH, "FD");
        if(pct>0){ doc.setFont("helvetica","normal"); doc.setFontSize(6); doc.setTextColor.apply(doc, pct>=100?C.green:BLUE); doc.text(String(pct), M+mLabelW+cI*cellW+cellW/2, y+cellH-4.5, {align:"center"}); } }
      if(stt.behind){ doc.setDrawColor.apply(doc,C.red); doc.setLineWidth(1.2); doc.rect(M+mLabelW, y, cellW*cols, cellH); doc.setLineWidth(0.6); }
      y+=cellH; });
    y+=8;
    doc.setFont("helvetica","normal"); doc.setFontSize(6.5); doc.setTextColor.apply(doc,C.sub);
    doc.splitTextToSize(stNames.map((n,i)=>(i+1)+". "+n).join("     "), CW).forEach(ln=>{ ensure(10); doc.text(ln,M,y); y+=9; }); y+=10;

    const data=list.map((a,i)=>{ const st=acStatus(a.id); const varD=(a.plannedFinishMs&&st.finMs)?Math.round((st.finMs-a.plannedFinishMs)/DAY):null;
      return [String(i+1), a.serialNumber, st.released?"Released":st.currentStation, st.overall+"%",
        st.released?"Released":(st.behind?"Behind":(st.started?"In build":"Not started")), st.finMs?fmtDate(st.finMs):"\u2014", varD==null?"\u2014":(varD>0?"+"+varD+"d":varD+"d")]; });
    table([">#","Serial","Current station",">Overall","Status","Forecast",">Var"],[26,82,150,52,72,76,46], data,
      (ri,ci,cell)=>{ if(ci===3){ const v=parseInt(cell); return v>=85?C.green:v>=40?BLUE:C.amber; }
        if(ci===4) return cell==="Released"?C.green:(cell==="Behind"?C.red:(cell==="In build"?BLUE:C.sub));
        if(ci===6 && /\+/.test(cell)) return C.red; return null; });
  });
  doc.save(("fleet-status-"+isoStamp()+".pdf").replace(/[^a-z0-9.\-]/gi,"_")); toast("Fleet status report exported");
}

function exportPDF(kind){
  const doc=pdfDoc();
  if(!doc){ toast("PDF engine offline \u2014 use your browser's Print \u2192 Save as PDF","warn"); return; }
  const ap=activeProgram(); if(!ap){ toast("No active program","warn"); return; }
  const M=44; let y=0;
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), CW=W-2*M;
  const titleMap={executive:"Executive Summary",weekly:"Weekly Production Report",resource:"Resource Utilization Report",capacity:"Capacity Planning Report",aircraft:"Aircraft Status Report",efficiency:"Efficiency & Learning Curve Report"};
  const C={ink:[28,38,52],sub:[110,125,140],line:[223,229,236],green:[22,140,70],amber:[193,130,10],red:[206,42,42],blue:[37,99,235],grey:[120,130,140],head:[233,239,245],zebra:[247,249,251]};
  const spiCol=v=> v<0.9?C.red : v<0.99?C.amber : C.green;
  const pctCol=v=> v>100?C.red : v>=85?C.amber : v>=60?C.green : C.blue;
  const money=v=>"$"+Math.round(v||0).toLocaleString();

  function header(){
    doc.setFillColor(10,14,20); doc.rect(0,0,W,68,"F");
    doc.setFillColor(56,189,248); doc.rect(0,68,W,3,"F");
    let tx=M; const lg=State.settings.logoDataUrl;
    if(lg){ try{ const fmt=/png/i.test(lg)?"PNG":/webp/i.test(lg)?"WEBP":/svg/i.test(lg)?"PNG":"JPEG";
      doc.addImage(lg, fmt, M, 14, 40, 40); tx=M+50; }catch(_){ tx=M; } }
    doc.setTextColor(56,189,248); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    if(!lg) doc.text((State.settings.logoText||"APP").toUpperCase(),tx,30);
    doc.setTextColor(255,255,255); doc.setFontSize(15);
    doc.text(titleMap[kind]||"Report", tx, 50);
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(150,170,190);
    doc.text((State.settings.companyName||"AeroPlan Pro"), W-M, 26, {align:"right"});
    doc.text("Prepared by "+(State.settings.userLabel||"Planner"), W-M, 38, {align:"right"});
    doc.text("Generated "+new Date().toLocaleString(), W-M, 50, {align:"right"});
    // program meta band
    doc.setFillColor(244,247,250); doc.rect(0,71,W,30,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(11.5); doc.setTextColor.apply(doc,C.ink); doc.text(ap.name,M,90);
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor.apply(doc,C.sub);
    doc.text(ap.code+"   \u00b7   Status: "+ap.status+"   \u00b7   "+acs.length+" aircraft   \u00b7   "+State.tasks.filter(t=>t.programId===ap.id).length+" tasks", W-M, 90, {align:"right"});
    y=120;
  }
  function ensure(h){ if(y+h>H-44){ doc.addPage(); y=52; } }
  function section(t, sub){ ensure(34); doc.setFillColor(56,189,248); doc.rect(M,y-9,3,13,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(11.5); doc.setTextColor.apply(doc,C.ink); doc.text(t,M+9,y+1);
    if(sub){ doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor.apply(doc,C.sub); doc.text(sub, W-M, y, {align:"right"}); }
    y+=8; doc.setDrawColor.apply(doc,C.line); doc.line(M,y,W-M,y); y+=16; }
  function paragraph(text){ doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(70,82,98);
    const lines=doc.splitTextToSize(text, CW); lines.forEach(ln=>{ ensure(14); doc.text(ln,M,y); y+=13; }); y+=8; }
  function metricBand(cards){ ensure(62); const n=cards.length, gap=10, cw=(CW-gap*(n-1))/n;
    cards.forEach((c,i)=>{ const x=M+i*(cw+gap);
      doc.setFillColor(248,250,252); doc.setDrawColor.apply(doc,C.line); doc.roundedRect(x,y,cw,52,5,5,"FD");
      doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor.apply(doc,C.sub); doc.text(String(c.label).toUpperCase(),x+10,y+15);
      doc.setFont("helvetica","bold"); doc.setFontSize(17); doc.setTextColor.apply(doc,(c.color||C.ink)); doc.text(String(c.value),x+10,y+36);
      if(c.sub){ doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor.apply(doc,C.sub); doc.text(String(c.sub),x+10,y+48); } });
    y+=64; }
  function table(cols,widths,data,opt){
    opt=opt||{}; const align=opt.align||[]; const x0=M; ensure(28);
    doc.setFillColor.apply(doc,(opt.headFill||C.head)); doc.rect(M,y-12,CW,20,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(64,78,94);
    let x=x0; cols.forEach((c,i)=>{ const a=align[i]; doc.text(String(c), a==="r"?x+widths[i]-4:x+4, y+2, {align:a==="r"?"right":"left"}); x+=widths[i]; });
    y+=16; doc.setFont("helvetica","normal"); doc.setFontSize(8.5);
    if(!data.length){ ensure(15); doc.setTextColor.apply(doc,C.sub); doc.text("\u2014 none \u2014",M+4,y); y+=14; }
    data.forEach((row,ri)=>{ ensure(15);
      if(ri%2===1){ doc.setFillColor.apply(doc,C.zebra); doc.rect(M,y-10,CW,14,"F"); }
      x=x0; row.forEach((cell,ci)=>{ let col=C.ink; if(opt.cell){ const cc=opt.cell(ri,ci,cell); if(cc) col=cc; }
        doc.setTextColor.apply(doc,col); const a=align[ci];
        let s=String(cell==null?"":cell); const max=widths[ci]-7; let txt=s;
        while(doc.getTextWidth(txt)>max && txt.length>3) txt=txt.slice(0,-2); if(txt!==s) txt=txt.slice(0,-1)+"\u2026";
        doc.text(txt, a==="r"?x+widths[ci]-4:x+4, y, {align:a==="r"?"right":"left"}); x+=widths[ci]; });
      y+=14; doc.setDrawColor(236,240,244); doc.line(M,y-10,W-M,y-10); });
    y+=10;
  }
  function bar(x,yy,w,pct,col){ const h=7; doc.setFillColor(228,233,239); doc.roundedRect(x,yy,w,h,2,2,"F");
    const fw=Math.max(2,Math.min(w,w*clamp(pct,0,100)/100)); doc.setFillColor.apply(doc,col); doc.roundedRect(x,yy,fw,h,2,2,"F"); }
  function flowChart(stations){ if(!stations||!stations.length) return; ensure(66);
    const n=stations.length, gap=7, bw=(CW-gap*(n-1))/n, bh=36, yTop=y;
    stations.forEach((st,i)=>{ const x=M+i*(bw+gap);
      const col= st.status==="complete"?C.green : st.status==="active"?C.blue : C.grey;
      if(st.status==="complete") doc.setFillColor(225,244,232); else if(st.status==="active") doc.setFillColor(223,236,252); else doc.setFillColor(243,246,249);
      doc.setDrawColor.apply(doc,col); doc.setLineWidth(st.status==="active"?1.5:0.8); doc.roundedRect(x,yTop,bw,bh,4,4,"FD"); doc.setLineWidth(0.8);
      doc.setFillColor.apply(doc,col); doc.circle(x+8,yTop+9,2.4,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(6.6); doc.setTextColor.apply(doc,C.ink);
      const nm=doc.splitTextToSize(String(st.name), bw-15); doc.text(nm[0]||"", x+13, yTop+11.5); if(nm[1]) doc.text(nm[1], x+13, yTop+19);
      doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor.apply(doc,col); doc.text(st.pct+"%", x+bw-5, yTop+bh-7, {align:"right"});
      doc.setFillColor(228,233,239); doc.roundedRect(x+7,yTop+bh-9,bw-44,4,2,2,"F");
      const fw=Math.max(1,(bw-44)*clamp(st.pct,0,100)/100); doc.setFillColor.apply(doc,col); doc.roundedRect(x+7,yTop+bh-9,fw,4,2,2,"F");
      if(i<n-1){ doc.setDrawColor(150,160,172); doc.line(x+bw+1,yTop+bh/2,x+bw+gap-1,yTop+bh/2); } });
    y=yTop+bh+14;
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
    doc.setFillColor.apply(doc,C.green); doc.circle(M+3,y-3,2.4,"F"); doc.setTextColor.apply(doc,C.sub); doc.text("Completed",M+9,y);
    doc.setFillColor.apply(doc,C.blue); doc.circle(M+72,y-3,2.4,"F"); doc.text("Active (in progress)",M+78,y);
    doc.setFillColor.apply(doc,C.grey); doc.circle(M+182,y-3,2.4,"F"); doc.text("Pending",M+188,y);
    y+=16; }

  const e=Analytics.evm(ap.id)||{BAC:0,EV:0,AC:0,PV:0,SV:0,CV:0,SPI:1,CPI:1,EAC:0,ETC:0,pctComplete:0};
  const fc=Analytics.forecast(ap.id); const u=Analytics.utilizationSummary(ap.id);
  const acs=State.aircraft.filter(a=>a.programId===ap.id);
  const sched=State.schedules[ap.id];
  const allTasks=State.tasks.filter(t=>t.programId===ap.id);
  const critCount= sched? sched.taskSchedules.filter(s=>s.onCriticalPath).length : 0;
  const map={}; if(sched) sched.taskSchedules.forEach(s=>map[s.taskId]=s);
  const currentStage=(acId)=>{ const sts=State.stages.filter(s=>s.aircraftId===acId).sort((a,b)=>a.sequence-b.sequence);
    for(const st of sts){ const tk=State.tasks.filter(t=>t.stageId===st.id); if(tk.length && tk.some(t=>t.status!=="COMPLETE")) return st.name; }
    return sts.length?"Released":"\u2014"; };

  header();

  if(kind==="executive"){
    metricBand([
      {label:"Complete",value:e.pctComplete+"%",sub:allTasks.filter(t=>t.status==="COMPLETE").length+" / "+allTasks.length+" tasks",color:pctCol(e.pctComplete>100?100:e.pctComplete)},
      {label:"Schedule SPI",value:e.SPI,sub:e.SPI<1?"behind plan":"on / ahead",color:spiCol(e.SPI)},
      {label:"Cost CPI",value:e.CPI,sub:e.CPI<1?"over budget":"on / under",color:spiCol(e.CPI)},
      {label:"Forecast",value:fc?fc.risk.toUpperCase():"\u2014",sub:fc?fc.confidence+"% confidence":"",color:fc?(fc.risk==="High"?C.red:fc.risk==="Medium"?C.amber:C.green):C.grey}
    ]);
    section("Program Overview");
    paragraph("This program comprises "+acs.length+" aircraft and "+allTasks.length+" planned tasks, "+e.pctComplete+"% complete by earned value. "+
      "Schedule performance index (SPI) is "+e.SPI+" ("+(e.SPI<1?"running behind the plan":"on or ahead of plan")+") and cost performance index (CPI) is "+e.CPI+" ("+(e.CPI<1?"over budget":"on or under budget")+"). "+
      (sched? "The resource-constrained schedule forecasts a finish of "+fmtDate(fc?fc.expectedMs:sched.projectFinishMs)+", with "+critCount+" task(s) on the critical path." : "Run the scheduler to generate finish-date and critical-path forecasts."));
    section("Production Flow","stations across the fleet");
    flowChart(programFlow(ap.id));
    section("Earned Value Analysis","figures vs active plan");
    table(["Metric","Value","Interpretation"],[150,110,CW-260],[
      ["Budget at Completion (BAC)",money(e.BAC),"Total planned cost of the program"],
      ["Planned Value (PV)",money(e.PV),"Budgeted cost of work scheduled to date"],
      ["Earned Value (EV)",money(e.EV),"Budgeted cost of work actually completed"],
      ["Actual Cost (AC)",money(e.AC),"Real spend booked to date"],
      ["Schedule Variance (SV)",money(e.SV),e.SV<0?"Behind schedule":"Ahead of schedule"],
      ["Cost Variance (CV)",money(e.CV),e.CV<0?"Over budget":"Under budget"],
      ["Est. at Completion (EAC)",money(e.EAC),"Projected total cost at current CPI"],
      ["Est. to Complete (ETC)",money(e.ETC),"Remaining cost to finish"]
    ],{align:["l","r","l"]});
    section("Schedule & Forecast");
    table(["Checkpoint","Date"],[200,CW-200],[
      ["Scheduled start", sched?fmtDate(sched.projectStartMs):"\u2014"],
      ["Scheduled finish", sched?fmtDate(sched.projectFinishMs):"\u2014"],
      ["Optimistic finish", fc?fmtDate(fc.optimisticMs):"\u2014"],
      ["Expected finish", fc?fmtDate(fc.expectedMs):"\u2014"],
      ["Pessimistic finish", fc?fmtDate(fc.pessimisticMs):"\u2014"],
      ["Critical-path tasks", String(critCount)],
      ["Forecast confidence", fc?fc.confidence+"%":"\u2014"]
    ],{align:["l","r"]});
    section("Fleet Snapshot");
    table(["Tail","Model","Current stage","Complete","Status"],[80,90,150,70,CW-390],
      acs.map(a=>[a.serialNumber,a.model,currentStage(a.id),aircraftCompletion(a.id)+"%",a.status]),
      {align:["l","l","l","r","l"],cell:(r,c,v)=> c===3? pctCol(parseFloat(v)) : null});
    section("Top Risks & Recommendations");
    const bn=Analytics.bottlenecks(ap.id);
    table(["Constraint","Type","Peak","Recommended action"],[140,70,55,CW-265],
      bn.length?bn.slice(0,8).map(b=>[b.name,b.type,round(b.val,0)+"%",b.rec]):[["No constraints detected","\u2014","\u2014","All resources within capacity"]],
      {align:["l","l","r","l"],cell:(r,c,v)=> c===2? pctCol(parseFloat(v)):null});
    ensure(40); y+=6; doc.setDrawColor.apply(doc,C.line); doc.line(M,y,W-M,y); y+=16;
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor.apply(doc,C.sub);
    doc.text("Prepared by: "+(State.settings.userLabel||"Planner")+"  ____________________        Approved: ____________________        Date: __________", M, y);

  } else if(kind==="weekly"){
    const now=Date.now(), wkAhead=now+7*DAY, wkBack=now-7*DAY;
    metricBand([
      {label:"Complete",value:e.pctComplete+"%",sub:allTasks.filter(t=>t.status==="COMPLETE").length+" done",color:pctCol(e.pctComplete>100?100:e.pctComplete)},
      {label:"SPI",value:e.SPI,sub:e.SPI<1?"behind":"on/ahead",color:spiCol(e.SPI)},
      {label:"CPI",value:e.CPI,sub:e.CPI<1?"over":"on/under",color:spiCol(e.CPI)},
      {label:"Forecast finish",value:sched?fmtDate(fc?fc.expectedMs:sched.projectFinishMs):"\u2014",sub:fc?fc.risk+" risk":"",color:C.ink}
    ]);
    section("Reporting Period", new Date(wkBack).toLocaleDateString()+"  \u2013  "+new Date().toLocaleDateString());
    paragraph("Week-over-week production status for "+ap.name+". "+critCount+" task(s) lie on the critical path; schedule index "+e.SPI+", cost index "+e.CPI+".");
    section("Completed in the last 7 days");
    const completed=allTasks.map(t=>({t,s:map[t.id]})).filter(o=>o.s && o.t.status==="COMPLETE" && o.s.finishMs>=wkBack)
      .sort((a,b)=>a.s.finishMs-b.s.finishMs).slice(0,20);
    table(["WBS","Task","Finished","Skill"],[50,CW-260,90,120],
      completed.map(o=>[o.t.wbsCode,o.t.name,fmtDate(o.s.finishMs),SKILL_LABEL[o.t.laborSkill]||o.t.laborSkill]),{align:["l","l","l","l"]});
    section("Active or starting (next 7 days)");
    const upcoming=allTasks.map(t=>({t,s:map[t.id]})).filter(o=>o.s && o.s.startMs<=wkAhead && o.s.finishMs>=now && o.t.status!=="COMPLETE")
      .sort((a,b)=>a.s.startMs-b.s.startMs).slice(0,24);
    table(["WBS","Task","Start","Finish","Status","Crit"],[48,CW-360,80,80,80,32],
      upcoming.map(o=>[o.t.wbsCode,o.t.name,fmtDate(o.s.startMs),fmtDate(o.s.finishMs),(STATUS[o.t.status]||{}).label||o.t.status,o.s.onCriticalPath?"\u25CF":""]),
      {align:["l","l","l","l","l","c"],cell:(r,c)=> c===5? C.red:null});
    section("Overdue / at-risk");
    const overdue=allTasks.map(t=>({t,s:map[t.id]})).filter(o=>o.s && o.t.status!=="COMPLETE" && o.s.finishMs<now)
      .sort((a,b)=>a.s.finishMs-b.s.finishMs).slice(0,16);
    table(["WBS","Task","Planned finish","% done","Status"],[48,CW-330,100,60,122],
      overdue.map(o=>[o.t.wbsCode,o.t.name,fmtDate(o.s.finishMs),o.t.percentComplete+"%",(STATUS[o.t.status]||{}).label||o.t.status]),
      {align:["l","l","l","r","l"],cell:(r,c)=> c===2?C.red:null});
    section("Gate reviews pending");
    const pend=State.gates.filter(g=>acs.some(a=>a.id===g.aircraftId) && g.status==="PENDING");
    table(["Aircraft","Gate","Criterion"],[110,60,CW-170],
      pend.slice(0,12).map(g=>{ const a=byId(State.aircraft,g.aircraftId); return [a?a.serialNumber:"\u2014","G"+g.gateNumber,g.name]; }),{align:["l","l","l"]});
    section("Resource pressure");
    const bn=Analytics.bottlenecks(ap.id);
    table(["Resource","Type","Peak","Action"],[150,70,55,CW-275],
      bn.length?bn.slice(0,6).map(b=>[b.name,b.type,round(b.val,0)+"%",b.rec]):[["All resources healthy","\u2014","\u2014","No action required"]],
      {align:["l","l","r","l"],cell:(r,c,v)=> c===2?pctCol(parseFloat(v)):null});

  } else if(kind==="resource"){
    const labVals=Object.values(u.labor), eqVals=Object.values(u.equip).filter(d=>d.units>0);
    const peakLab=Math.max(0,...labVals.map(d=>d.peak)), peakEq=Math.max(0,...eqVals.map(d=>d.peak));
    const avgLab=labVals.length?round(labVals.reduce((s,d)=>s+d.util,0)/labVals.length,0):0;
    const avgEq=eqVals.length?round(eqVals.reduce((s,d)=>s+d.util,0)/eqVals.length,0):0;
    metricBand([
      {label:"Peak labor",value:round(peakLab,0)+"%",sub:Analytics.utilStatus(peakLab),color:pctCol(peakLab)},
      {label:"Avg labor",value:avgLab+"%",sub:"across skills",color:pctCol(avgLab)},
      {label:"Peak equipment",value:round(peakEq,0)+"%",sub:Analytics.utilStatus(peakEq),color:pctCol(peakEq)},
      {label:"Avg equipment",value:avgEq+"%",sub:"across units",color:pctCol(avgEq)}
    ]);
    section("Labor Pools","headcount, loading & status");
    table(["Skill","Headcount","Cost/hr","Avg util","Peak util","Status"],[CW-380,70,70,75,75,90],
      State.laborPools.map(p=>{ const d=u.labor[p.category]||{util:0,peak:0};
        return [SKILL_LABEL[p.category],p.headcount,"$"+p.costRatePerHr,round(d.util,0)+"%",round(d.peak,0)+"%",Analytics.utilStatus(d.peak)]; }),
      {align:["l","r","r","r","r","l"],cell:(r,c,v)=> (c===4||c===5)? pctCol(parseFloat(String(v))||(/Over|High/.test(String(v))?95:50)) : (c===4?pctCol(parseFloat(v)):null)});
    section("Equipment","units, loading & status");
    table(["Type","Units","Cost/hr","Mode","Avg util","Peak util","Status"],[CW-450,55,65,80,70,75,105],
      State.equipment.map(eq=>{ const d=u.equip[eq.type]||{util:0,peak:0};
        return [EQUIP_LABEL[eq.type],eq.units,"$"+eq.costRatePerHr,eq.continuousOperation?"24/7":"calendar",round(d.util,0)+"%",round(d.peak,0)+"%",Analytics.utilStatus(d.peak)]; }),
      {align:["l","r","r","l","r","r","l"],cell:(r,c,v)=> c===5? pctCol(parseFloat(v)):null});
    section("Capacity Guidance");
    paragraph("Aerospace planning best practice targets 75\u201385% sustained utilization \u2014 high enough for efficiency, with buffer to absorb disruption. Resources peaking above 100% are over-allocated and will delay dependent work; add headcount, units, a shift or overtime. Resources below 60% are under-used and may be redeployed.");
    section("Recommendations");
    const bn=Analytics.bottlenecks(ap.id);
    table(["Resource","Type","Peak","Recommended action"],[140,70,55,CW-265],
      bn.length?bn.map(b=>[b.name,b.type,round(b.val,0)+"%",b.rec]):[["No constraints","\u2014","\u2014","All resources within healthy band"]],
      {align:["l","l","r","l"],cell:(r,c,v)=> c===2?pctCol(parseFloat(v)):null});

  } else if(kind==="capacity"){
    const b=Analytics.capacityBuckets(ap.id);
    if(!b.days.length){ section("Capacity"); paragraph("Run the scheduler first to compute daily capacity buckets."); }
    else {
      const labTot=b.laborCapDayTotal, eqTot=b.equipCapDayTotal;
      const labAlloc=b.days.map((d,i)=>sum(Object.values(b.labor),L=>L.alloc[i]));
      const eqAlloc=b.days.map((d,i)=>sum(Object.values(b.equip),E=>E.alloc[i]));
      const labPk=Math.max(0,...b.days.map((d,i)=> labTot[i]>0? labAlloc[i]/labTot[i]*100:0));
      const eqPk=Math.max(0,...b.days.map((d,i)=> eqTot[i]>0? eqAlloc[i]/eqTot[i]*100:0));
      const overDays=b.days.filter((d,i)=> (labTot[i]>0&&labAlloc[i]>labTot[i]) || (eqTot[i]>0&&eqAlloc[i]>eqTot[i])).length;
      metricBand([
        {label:"Peak labor day",value:round(labPk,0)+"%",sub:Analytics.utilStatus(labPk),color:pctCol(labPk)},
        {label:"Peak equip day",value:round(eqPk,0)+"%",sub:Analytics.utilStatus(eqPk),color:pctCol(eqPk)},
        {label:"Overloaded days",value:overDays,sub:"above 100% capacity",color:overDays?C.red:C.green},
        {label:"Horizon",value:b.nDays+"d",sub:fmtDate(b.days[0])+" \u2192",color:C.ink}
      ]);
      section("Peak Loading by Resource");
      const rows=[];
      LABOR_SKILLS.forEach(s=>{ const L=b.labor[s]; if(!L||Math.max(0,...L.capDay)===0) return;
        let pk=0,pi=-1; L.alloc.forEach((v,i)=>{ const r=L.capDay[i]>0?v/L.capDay[i]:0; if(r>pk){pk=r;pi=i;} });
        rows.push([SKILL_LABEL[s],"Labor",round(Math.max(0,...L.alloc),0)+"h",round(pk*100,0)+"%",pi>=0?fmtDate(b.days[pi]):"\u2014"]); });
      EQUIP_TYPES.forEach(t=>{ const E=b.equip[t]; if(!E||E.units===0||Math.max(0,...E.capDay)===0) return;
        let pk=0,pi=-1; E.alloc.forEach((v,i)=>{ const r=E.capDay[i]>0?v/E.capDay[i]:0; if(r>pk){pk=r;pi=i;} });
        rows.push([EQUIP_LABEL[t],"Equipment",round(Math.max(0,...E.alloc),0)+"h",round(pk*100,0)+"%",pi>=0?fmtDate(b.days[pi]):"\u2014"]); });
      table(["Resource","Kind","Peak load","Peak %","Peak day"],[CW-330,90,80,60,100],rows,
        {align:["l","l","r","r","l"],cell:(r,c,v)=> c===3?pctCol(parseFloat(v)):null});
      section("Busiest Days (labor)");
      const dayRows=b.days.map((d,i)=>({d,pct: labTot[i]>0? labAlloc[i]/labTot[i]*100:0, load:labAlloc[i], cap:labTot[i]}))
        .filter(o=>o.cap>0).sort((a,b2)=>b2.pct-a.pct).slice(0,10);
      table(["Date","Allocated","Available","Utilization"],[140,90,90,CW-320],
        dayRows.map(o=>[fmtDate(o.d),round(o.load,0)+"h",round(o.cap,0)+"h",round(o.pct,0)+"%"]),
        {align:["l","r","r","r"],cell:(r,c,v)=> c===3?pctCol(parseFloat(v)):null});
      section("Overloads & Recommendations");
      const bn=Analytics.bottlenecks(ap.id);
      table(["Resource","Peak","Recommended action"],[150,60,CW-210],
        bn.length?bn.map(b2=>[b2.name,round(b2.val,0)+"%",b2.rec]):[["None","\u2014","All resources within capacity"]],
        {align:["l","r","l"],cell:(r,c,v)=> c===1?pctCol(parseFloat(v)):null});
    }

  } else if(kind==="aircraft"){
    section("Fleet Completion");
    table(["Tail","Model","Rev","Current stage","Complete","Status"],[80,80,45,CW-415,70,140],
      acs.map(a=>[a.serialNumber,a.model,a.buildRevision,currentStage(a.id),aircraftCompletion(a.id)+"%",a.status]),
      {align:["l","l","l","l","r","l"],cell:(r,c,v)=> c===4?pctCol(parseFloat(v)):null});
    acs.forEach(a=>{
      section("Aircraft "+a.serialNumber, a.model+" \u00b7 config "+a.configVersion+" \u00b7 rev "+a.buildRevision);
      const comp=aircraftCompletion(a.id);
      ensure(22); doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor.apply(doc,C.sub);
      doc.text("Completion",M,y+6); bar(M+70,y,CW-160,comp,pctCol(comp));
      doc.setFont("helvetica","bold"); doc.setTextColor.apply(doc,pctCol(comp)); doc.text(comp+"%",W-M,y+6,{align:"right"}); y+=24;
      flowChart(stationFlow(a.id));
      const sts=State.stages.filter(s=>s.aircraftId===a.id).sort((x,z)=>x.sequence-z.sequence);
      table(["#","Stage","Tasks","Done","Stage %"],[34,CW-310,70,70,120],
        sts.map(st=>{ const tk=State.tasks.filter(t=>t.stageId===st.id); const dn=tk.filter(t=>t.status==="COMPLETE").length;
          const pct= tk.length? round(dn/tk.length*100,0):0; return [st.sequence,st.name,tk.length,dn,pct+"%"]; }),
        {align:["r","l","r","r","r"],cell:(r,c,v)=> c===4?pctCol(parseFloat(v)):null});
      const gates=State.gates.filter(g=>g.aircraftId===a.id).sort((x,z)=>x.gateNumber-z.gateNumber);
      table(["Gate","Criterion","Status","Signed by","When"],[50,CW-356,80,110,116],
        gates.map(g=>["G"+g.gateNumber,g.name,g.status,g.approvedBy||"\u2014",g.approvedAtMs?fmtDate(g.approvedAtMs):"\u2014"]),
        {align:["l","l","l","l","l"],cell:(r,c,v)=> c===2? (v==="APPROVED"?C.green:v==="REJECTED"?C.red:C.amber):null});
    });
  } else if(kind==="efficiency"){
    const lc=Analytics.learningCurve(ap.id); const ef=lc.eff; const acv=ef.progAchieved, rav=ef.progRequired;
    metricBand([
      {label:"Achieved Eff.",value: acv==null?"\u2014":acv+"%", sub:"earned \u00f7 actual", color: acv==null?C.grey:(rav!=null&&acv<rav?C.red:acv>=100?C.green:C.amber)},
      {label:"Required Eff.",value: rav==null?"\u2014":rav+"%", sub:"to hold windows", color:C.blue},
      {label:"Learning Rate",value: lc.enough?lc.LR+"%":"\u2014", sub: lc.enough?lc.slopePct+"% per doubling":"need 2+ units", color:C.ink},
      {label:"Units (actuals)",value: ef.built+" / "+ef.units.length, sub:"serial builds", color:C.ink}
    ]);
    section("Per-Unit Efficiency","standard vs actual labor hours");
    table(["Unit","Serial","Std h","Act h","Earned","%","Req %","Ach %","Status"],
      [38, CW-376, 46,46,50,34,46,46,70],
      ef.units.map(u=>["U"+u.unit,u.serial,u.std,(u.act||"\u2014"),u.earned,u.pct+"%",(u.requiredEff==null?"\u2014":u.requiredEff+"%"),(u.achievedEff==null?"\u2014":u.achievedEff+"%"),(u.complete?"Complete":(u.act>0?"In build":"Not started"))]),
      {align:["l","l","r","r","r","r","r","r","l"], cell:(r,c)=>{ if(c!==7) return null; const u=ef.units[r]; if(!u||u.achievedEff==null) return C.grey; if(u.requiredEff!=null&&u.achievedEff<u.requiredEff) return C.red; return u.achievedEff>=100?C.green:C.amber; }});
    if(lc.enough){
      section("Learning Curve","Wright model \u00b7 LR "+lc.LR+"% \u00b7 R\u00b2 "+lc.r2);
      ensure(196); const px=M, pw=CW, ph=172, py=y;
      const maxN=lc.obsMax+5; const maxV=Math.max.apply(null,[lc.T1].concat(lc.curve.map(c=>c.hrs)).concat(lc.points.map(p=>p.hrs)))*1.08;
      const plotL=px+46, plotR=px+pw-14, plotT=py+8, plotB=py+ph-20, plotW=plotR-plotL, plotH=plotB-plotT;
      doc.setDrawColor.apply(doc,C.line); doc.rect(px,py,pw,ph);
      doc.setFontSize(7); doc.setTextColor.apply(doc,C.sub);
      for(let g=0;g<=4;g++){ const yy=plotT+plotH*g/4; doc.setDrawColor(238,242,246); doc.line(plotL,yy,plotR,yy); doc.text(String(Math.round(maxV*(1-g/4))),px+42,yy+3,{align:"right"}); }
      const X=k=> plotL + (maxN>1?(k-1)/(maxN-1):0)*plotW; const Y=v=> plotT+plotH*(1-v/maxV);
      for(let k=1;k<=maxN;k++){ if(maxN>14&&k%2===0) continue; doc.text("U"+k, X(k), plotB+12, {align:"center"}); }
      doc.setLineWidth(1.6); let prev=null;
      lc.curve.forEach(c=>{ const cx=X(c.n),cy=Y(c.hrs); if(prev){ if(c.n<=lc.obsMax) doc.setDrawColor(37,99,235); else doc.setDrawColor(193,130,10); doc.line(prev[0],prev[1],cx,cy); } prev=[cx,cy]; });
      doc.setLineWidth(1);
      lc.points.forEach(p=>{ const cx=X(p.n),cy=Y(p.hrs); doc.setFillColor.apply(doc, p.complete?C.green:C.blue); doc.circle(cx,cy,2.6,"F"); });
      y=py+ph+14;
      table(["Projected unit","Estimated labor (h)"],[CW-170,170], lc.proj.map(p=>["U"+p.n,p.hrs]),{align:["l","r"]});
    }
    section("Analysis & Recommendations");
    let an;
    if(lc.enough){ const trend= lc.LR<90?"a strong learning effect":lc.LR<98?"a moderate learning effect":"little measurable learning yet"; const behind=(acv!=null&&rav!=null&&acv<rav);
      an="Across "+lc.points.length+" built unit(s), first-unit labor fits at ~"+lc.T1+" h with "+trend+" \u2014 a "+lc.LR+"% learning rate (each doubling of cumulative units cuts unit hours by ~"+lc.slopePct+"%), R\u00b2 "+lc.r2+". "+(lc.proj.length?"The next unit (U"+(lc.obsMax+1)+") is projected at ~"+lc.proj[0].hrs+" h. ":"")+"Fleet achieved efficiency is "+(acv==null?"n/a":acv+"%")+" against a required "+(rav==null?"n/a":rav+"%")+(behind?" \u2014 currently behind the rate needed to hold the planned windows; add crew, authorise overtime, or widen the window.":" \u2014 on or ahead of the rate needed to hold the planned windows.");
    } else an="Record actual labor hours and % complete on each task for at least two serially-built tails to fit a learning curve. Achieved efficiency = earned \u00f7 actual labor; required efficiency = standard hours \u00f7 the labor capacity available inside each aircraft's planned window.";
    paragraph(an);

  }

  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){ doc.setPage(i);
    doc.setDrawColor.apply(doc,C.line); doc.line(M,H-32,W-M,H-32);
    doc.setFontSize(7.5); doc.setTextColor(150,160,175);
    doc.text((State.settings.companyName||"AeroPlan Pro")+"  \u00b7  "+ap.name+"  \u00b7  Confidential",M,H-20);
    doc.text("Page "+i+" of "+pages,W-M,H-20,{align:"right"}); }
  doc.save("aeroplan-"+kind+"-"+isoStamp()+".pdf");
  toast(titleMap[kind]+" exported");
}

/* ---------- Duplicate (deep clone with fresh ids) ---------- */
function cloneAircraftInto(srcAc, programId){
  const na=JSON.parse(JSON.stringify(srcAc)); na.id=uid("ac"); na.programId=programId; na.stageIds=[]; na.status="NOT_STARTED";
  na.serialNumber = (programId===srcAc.programId)? srcAc.serialNumber+"-COPY" : srcAc.serialNumber;
  State.aircraft.push(na); const np=byId(State.programs,programId); if(np) np.aircraftIds.push(na.id);
  State.gates.filter(g=>g.aircraftId===srcAc.id).forEach(g=>{ const ng=JSON.parse(JSON.stringify(g)); ng.id=uid("gate"); ng.aircraftId=na.id; ng.status="PENDING"; ng.signedBy=null; ng.signedAtMs=null; State.gates.push(ng); });
  const stages=State.stages.filter(s=>s.aircraftId===srcAc.id).sort((a,b)=>a.sequence-b.sequence);
  const taskMap={};
  stages.forEach(st=>{ const ns=JSON.parse(JSON.stringify(st)); ns.id=uid("stg"); ns.aircraftId=na.id; ns.programId=programId; ns.taskIds=[]; ns.status="NOT_STARTED";
    State.stages.push(ns); na.stageIds.push(ns.id);
    State.tasks.filter(t=>t.stageId===st.id).forEach(t=>{ const nt=JSON.parse(JSON.stringify(t)); nt.id=uid("task"); nt.stageId=ns.id; nt.programId=programId;
      nt.status="NOT_STARTED"; nt.percentComplete=0; nt.actualLaborHours=0; nt.actualCost=0;
      State.tasks.push(nt); ns.taskIds.push(nt.id); taskMap[t.id]=nt.id;
      State.equipmentReqs.filter(r=>r.taskId===t.id).forEach(r=>{ const nr=JSON.parse(JSON.stringify(r)); nr.id=uid("ereq"); nr.taskId=nt.id; State.equipmentReqs.push(nr); }); });
  });
  State.dependencies.filter(d=>taskMap[d.taskId] && taskMap[d.predecessorId]).forEach(d=>{
    State.dependencies.push({ id:uid("dep"), taskId:taskMap[d.taskId], predecessorId:taskMap[d.predecessorId], type:d.type, lagHours:d.lagHours }); });
  return na;
}
function dupProgram(programId){ const p=byId(State.programs,programId); if(!p) return;
  const np=JSON.parse(JSON.stringify(p)); np.id=uid("prog"); np.name=p.name+" (copy)"; np.aircraftIds=[]; np.activeBaselineId=null; np.createdAtMs=Date.now();
  State.programs.push(np);
  State.aircraft.filter(a=>a.programId===programId).forEach(a=>cloneAircraftInto(a, np.id));
  State.ui.activeProgram=np.id; State.ui.activeAircraft=null;
  audit("PROGRAM",np.id,"CREATE",null,null,"duplicated from "+p.name);
  commit(); toast("Program duplicated — press Run Schedule to build its timeline");
}
function dupAircraft(acId){ const a=byId(State.aircraft,acId); if(!a) return; const na=cloneAircraftInto(a, a.programId);
  State.ui.activeAircraft=na.id; commit(); toast("Aircraft duplicated"); }
function dupTask(taskId){ const t=byId(State.tasks,taskId); if(!t) return; const stage=byId(State.stages,t.stageId); if(!stage) return;
  const nt=JSON.parse(JSON.stringify(t)); nt.id=uid("task"); nt.name=t.name+" (copy)"; nt.status="NOT_STARTED"; nt.percentComplete=0; nt.actualLaborHours=0; nt.actualCost=0;
  nt.wbsCode=stage.sequence+"."+(stage.taskIds.length+1);
  State.tasks.push(nt); stage.taskIds.push(nt.id);
  State.equipmentReqs.filter(r=>r.taskId===taskId).forEach(r=>{ const nr=JSON.parse(JSON.stringify(r)); nr.id=uid("ereq"); nr.taskId=nt.id; State.equipmentReqs.push(nr); });
  State.dependencies.filter(d=>d.taskId===taskId).forEach(d=>{ if(byId(State.tasks,d.predecessorId)) State.dependencies.push({ id:uid("dep"), taskId:nt.id, predecessorId:d.predecessorId, type:d.type, lagHours:d.lagHours }); });
  commit(); toast("Task duplicated"); }
function dupLabor(id){ const p=byId(State.laborPools,id); if(!p) return; const np=JSON.parse(JSON.stringify(p)); np.id=uid("lab"); np.name=p.name+" (copy)"; State.laborPools.push(np); commit(); toast("Labor pool duplicated"); }
function dupEquip(id){ const e=byId(State.equipment,id); if(!e) return; const ne=JSON.parse(JSON.stringify(e)); ne.id=uid("eq"); ne.name=e.name+" (copy)"; State.equipment.push(ne); commit(); toast("Equipment duplicated"); }
function dupTemplate(id){ const tp=byId(State.templates,id); if(!tp) return; const nt=JSON.parse(JSON.stringify(tp)); nt.id=uid("tpl"); nt.name=tp.name+" (copy)"; nt.createdAtMs=Date.now(); State.templates.push(nt); commit(); toast("Template duplicated"); }

/* ---------- Stage CRUD + stage gating ---------- */
let STAGE_BUF=null;
function addStage(acId){ stageModal(null, acId); }
function stageModal(id, acId){
  const st = id? byId(State.stages,id): null; const ac = st? st.aircraftId : acId;
  STAGE_BUF={ id: st?st.id:null, aircraftId:ac, name: st?st.name:"" };
  const curSeq = st? st.sequence : ((State.stages.filter(x=>x.aircraftId===ac).map(x=>x.sequence).reduce((m,v)=>Math.max(m,v),0))+1);
  openModal(id?"Edit stage":"Add stage", `
    <div class="frow"><div class="field" style="grid-column:1/3"><label>Stage name</label><input id="stg_name" value="${esc(STAGE_BUF.name)}" placeholder="e.g. Components Lamination"></div></div>
    <div class="field" style="max-width:160px"><label>Sequence (order)</label><input type="number" min="1" id="stg_seq" value="${curSeq}"></div>
    <div class="hint">Stages run in this numeric order. With <b>stage gating</b> on, a stage starts only after the previous one is fully complete.</div>`,
    `<button class="btn" data-act="m-close">Cancel</button><button class="btn primary" data-act="save-stage">${icon("check","ico")} ${id?"Save":"Add stage"}</button>`);
}
function saveStage(){
  if(!STAGE_BUF) return; const name=((document.getElementById("stg_name")||{}).value||"").trim()||"New Stage";
  const seqEl=document.getElementById("stg_seq"); const typed= seqEl? Math.max(1,Math.round(parseFloat(seqEl.value)||1)) : null;
  let acId=STAGE_BUF.aircraftId;
  if(STAGE_BUF.id){ const st=byId(State.stages,STAGE_BUF.id); if(st){ if(st.name!==name) audit("STAGE",st.id,"UPDATE","name",st.name,name); st.name=name; acId=st.aircraftId;
      if(typed!=null) st.sequence = typed - 0.5; } }   // -0.5 lets it slot just before an equal-numbered stage
  else { const ac=byId(State.aircraft,acId); if(!ac){ closeModal(); return; }
    const seqs=State.stages.filter(s=>s.aircraftId===ac.id).map(s=>s.sequence);
    const seq = typed!=null? typed-0.5 : ((seqs.length?Math.max(...seqs):0)+1);
    const st={ id:uid("stg"), aircraftId:ac.id, programId:ac.programId, name, sequence:seq, status:"NOT_STARTED", templateRef:null, taskIds:[] };
    State.stages.push(st); ac.stageIds.push(st.id); audit("STAGE",st.id,"CREATE",null,null,name); }
  // resequence the aircraft's stages to contiguous 1..n preserving the chosen order
  State.stages.filter(s=>s.aircraftId===acId).sort((a,b)=>a.sequence-b.sequence).forEach((s,i)=>s.sequence=i+1);
  STAGE_BUF=null; closeModal(); commit();
}
function delStage(id){ const st=byId(State.stages,id); if(!st) return; const tk=State.tasks.filter(t=>t.stageId===id);
  confirmModal("Delete stage?", `Remove \u201c${esc(st.name)}\u201d${tk.length?` and its ${tk.length} task(s)`:""}? This cannot be undone.`, ()=>{
    const tkIds=tk.map(t=>t.id);
    State.tasks=State.tasks.filter(t=>t.stageId!==id);
    State.dependencies=State.dependencies.filter(d=>!tkIds.includes(d.taskId)&&!tkIds.includes(d.predecessorId));
    State.equipmentReqs=State.equipmentReqs.filter(r=>!tkIds.includes(r.taskId));
    const ac=byId(State.aircraft,st.aircraftId); if(ac) ac.stageIds=ac.stageIds.filter(x=>x!==id);
    State.stages=State.stages.filter(x=>x.id!==id);
    State.stages.filter(s=>s.aircraftId===st.aircraftId).sort((a,b)=>a.sequence-b.sequence).forEach((s,i)=>s.sequence=i+1);
    audit("STAGE",id,"DELETE",null,st.name,null); closeModal(); commit();
  });
}
function moveStage(id, dir){ const st=byId(State.stages,id); if(!st) return;
  const sibs=State.stages.filter(s=>s.aircraftId===st.aircraftId).sort((a,b)=>a.sequence-b.sequence);
  const i=sibs.findIndex(s=>s.id===id); const j= dir==="up"? i-1 : i+1; if(j<0||j>=sibs.length) return;
  const tmp=sibs[i].sequence; sibs[i].sequence=sibs[j].sequence; sibs[j].sequence=tmp; commit();
}
function toggleStageGating(){ const ap=activeProgram(); if(!ap) return; ap.stageGating=!ap.stageGating;
  audit("PROGRAM",ap.id,"UPDATE","stageGating",String(!ap.stageGating),String(ap.stageGating));
  if(State.schedules[ap.id]) runSchedule(ap.id);
  commit(); toast("Stage gating "+(ap.stageGating?"enabled \u2014 stages run strictly in order":"disabled \u2014 tasks run as dependencies & resources allow"));
}

function toggleStageCollapse(id){ State.ui.collapsedStages=State.ui.collapsedStages||{};
  if(State.ui.collapsedStages[id]) delete State.ui.collapsedStages[id]; else State.ui.collapsedStages[id]=true; render(); }
function toggleStageGate(id){ const st=byId(State.stages,id); if(!st) return; st.gated=!st.gated;
  audit("STAGE",st.id,"UPDATE","gated",String(!st.gated),String(st.gated));
  const ap=activeProgram(); if(ap && State.schedules[ap.id]) runSchedule(ap.id);
  commit(); toast("Stage gate "+(st.gated?"ON \u2014 \u201c"+st.name+"\u201d waits for all earlier stages":"OFF \u2014 \u201c"+st.name+"\u201d runs as dependencies allow")); }
function collapseAllStages(){ const ap=activeProgram(); if(!ap) return;
  const acId=State.ui.activeAircraft && byId(State.aircraft,State.ui.activeAircraft)? State.ui.activeAircraft : (State.aircraft.filter(a=>a.programId===ap.id)[0]||{}).id;
  const sts=State.stages.filter(s=>s.aircraftId===acId); State.ui.collapsedStages=State.ui.collapsedStages||{};
  const anyOpen=sts.some(s=>!State.ui.collapsedStages[s.id]);
  sts.forEach(s=>{ if(anyOpen) State.ui.collapsedStages[s.id]=true; else delete State.ui.collapsedStages[s.id]; });
  render(); }
function dupStage(id){ const st=byId(State.stages,id); if(!st) return; const ac=byId(State.aircraft,st.aircraftId);
  const seqs=State.stages.filter(x=>x.aircraftId===st.aircraftId).map(x=>x.sequence); const seq=(seqs.length?Math.max(...seqs):0)+1;
  const ns=JSON.parse(JSON.stringify(st)); ns.id=uid("stg"); ns.name=st.name+" (copy)"; ns.sequence=seq; ns.taskIds=[]; ns.status="NOT_STARTED";
  State.stages.push(ns); if(ac) ac.stageIds.push(ns.id);
  const map={};
  State.tasks.filter(t=>t.stageId===id).sort((a,b)=>((a.seq||0)-(b.seq||0))).forEach(t=>{ const nt=JSON.parse(JSON.stringify(t)); nt.id=uid("task"); nt.stageId=ns.id; nt.status="NOT_STARTED"; nt.percentComplete=0; nt.actualLaborHours=0; nt.actualCost=0;
    State.tasks.push(nt); ns.taskIds.push(nt.id); map[t.id]=nt.id;
    State.equipmentReqs.filter(r=>r.taskId===t.id).forEach(r=>{ const nr=JSON.parse(JSON.stringify(r)); nr.id=uid("ereq"); nr.taskId=nt.id; State.equipmentReqs.push(nr); }); });
  State.dependencies.filter(d=>map[d.taskId]).forEach(d=>{ const pred=map[d.predecessorId]||d.predecessorId; if(byId(State.tasks,pred)) State.dependencies.push({id:uid("dep"),taskId:map[d.taskId],predecessorId:pred,type:d.type,lagHours:d.lagHours}); });
  audit("STAGE",ns.id,"CREATE",null,null,"duplicated from "+st.name); commit(); toast("Stage duplicated with its tasks");
}

function qrLibReady(){ return typeof window.QRCode!=="undefined"; }

function techById(id){ return (State.technicians||[]).find(t=>t.id===id)||null; }
function ciFmtDur(ms){ ms=Math.max(0,ms); const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  return (h?h+"h ":"")+(h||m?String(m).padStart(h?2:1,"0")+"m ":"")+String(ss).padStart(2,"0")+"s"; }
function taskDeepLink(id){ const baseUrl=(location.href||"").split("#")[0]; return baseUrl+"#task="+id; }

function addTechnician(name){ name=(name||"").trim(); if(!name) return; State.technicians=State.technicians||[];
  const t={id:uid("tech"),name,badge:""}; State.technicians.push(t); State.ui.checkinTech=t.id;
  audit("TECH",t.id,"CREATE",null,null,name); commit(); }
function removeTechnician(id){ State.technicians=(State.technicians||[]).filter(t=>t.id!==id);
  if(State.ui.checkinTech===id) State.ui.checkinTech=null; commit(); }

function ciStart(){ const techId=State.ui.checkinTech, taskId=State.ui.checkinTask;
  if(!techId){ toast("Pick a technician first","warn"); return; }
  if(!taskId){ toast("Pick a task first","warn"); return; }
  State.timeSessions=State.timeSessions||[];
  if(State.timeSessions.some(s=>!s.endMs && s.taskId===taskId && s.techId===techId)){ toast("Already checked in to this task","warn"); return; }
  const tk=byId(State.tasks,taskId); const tech=techById(techId);
  const w=clamp(Math.round(State.ui.checkinWorkers||1),1,99);
  State.timeSessions.push({id:uid("sess"),taskId,techId,techName:tech?tech.name:"",workers:w,startMs:Date.now(),endMs:null});
  if(tk && ["NOT_STARTED","READY","BLOCKED"].includes(tk.status)) tk.status="WORKING";
  audit("TASK",taskId,"UPDATE","checkIn",(tech?tech.name:"")+"","started");
  commit(); toast((tech?tech.name:"Tech")+" checked in"+(w>1?" ("+w+" workers)":"")); }

function ciClose(sessionId, complete){ const ss=(State.timeSessions||[]).find(s=>s.id===sessionId); if(!ss||ss.endMs) return;
  ss.endMs=Date.now(); const hrs=Math.max(0,(ss.endMs-ss.startMs)/HOUR); const workers=Math.max(1,ss.workers||1);
  const personHrs=hrs*workers; const tk=byId(State.tasks,ss.taskId);
  if(tk){ tk.actualLaborHours=round((tk.actualLaborHours||0)+personHrs,2);
    if(complete){ tk.status="COMPLETE"; tk.percentComplete=100; }
    audit("TASK",ss.taskId,"UPDATE", complete?"checkOutComplete":"checkOut", ss.techName+" \u00d7"+workers+"w", round(personHrs,2)+" person-h"); }
  commit(); toast(complete? "Task completed (+"+round(personHrs,2)+" person-h)" : "Checked out (+"+round(personHrs,2)+" person-h)"); }

/* Manual time log: actual labour hours = workers × hours (no live timer). */
function ciLogManual(taskId, workers, hours, complete){ const tk=byId(State.tasks,taskId); if(!tk) return;
  workers=clamp(Math.round(workers||1),1,99); hours=Math.max(0,hours||0); if(hours<=0){ toast("Enter hours > 0","warn"); return; }
  const personHrs=round(workers*hours,2); tk.actualLaborHours=round((tk.actualLaborHours||0)+personHrs,2);
  if(complete){ tk.status="COMPLETE"; tk.percentComplete=100; } else if(tk.status==="NOT_STARTED"){ tk.status="WORKING"; }
  audit("TASK",taskId,"UPDATE","manualLog",workers+"w \u00d7 "+hours+"h", "+"+personHrs+" person-h");
  commit(); toast("Logged "+personHrs+" person-hours ("+workers+"\u00d7"+hours+"h)"); }

function ciSetProgress(taskId,pct){ const tk=byId(State.tasks,taskId); if(!tk) return; pct=clamp(Math.round(pct),0,100);
  tk.percentComplete=pct; if(pct>=100){ tk.status="COMPLETE"; } else if(tk.status==="COMPLETE"){ tk.status="WORKING"; }
  audit("TASK",taskId,"UPDATE","percentComplete",null,String(pct)); commit(); }

function ciPrintQR(opts){ opts=opts||{}; const ap=activeProgram(); if(!ap){ toast("No active program","warn"); return; }
  let acs=State.aircraft.filter(a=>a.programId===ap.id);
  if(opts.aircraftId) acs=acs.filter(a=>a.id===opts.aircraftId);
  const items=[]; acs.forEach(a=>{ let stgs=State.stages.filter(s=>s.aircraftId===a.id).sort((x,z)=>x.sequence-z.sequence);
    if(opts.station) stgs=stgs.filter(s=>s.name===opts.station);
    stgs.forEach(st=>{ State.tasks.filter(t=>t.stageId===st.id).sort((x,z)=>((x.seq||0)-(z.seq||0))).forEach(t=>{
      if(opts.activeOnly && t.status==="COMPLETE") return; items.push({t,ac:a,station:st.name}); }); }); });
  if(!items.length){ toast("No matching tasks to label","warn"); return; }
  const haveQR=qrLibReady();
  const cells=items.map(it=>{ const link=taskDeepLink(it.t.id); let img="";
    if(haveQR){ try{ const tmp=document.createElement("div"); new window.QRCode(tmp,{text:link,width:150,height:150,correctLevel:window.QRCode.CorrectLevel.M});
      const cv=tmp.querySelector("canvas"); const im=tmp.querySelector("img"); img= cv? '<img src="'+cv.toDataURL("image/png")+'">' : (im? '<img src="'+im.src+'">':""); }catch(_){ img=""; } }
    return '<div class="lbl"><div class="qr">'+(img||'<div class="noqr">QR library offline</div>')+'</div>'+
      '<div class="meta"><div class="nm">'+esc(it.t.name)+'</div><div class="sub">'+esc(it.ac.serialNumber)+' \u00b7 '+esc(it.station||"")+' \u00b7 WBS '+esc(it.t.wbsCode)+'</div>'+
      '<div class="lk">'+esc(link)+'</div></div></div>'; }).join("");
  const w=window.open("","_blank"); if(!w){ toast("Allow pop-ups to print labels","warn"); return; }
  w.document.write('<html><head><title>Task QR labels \u2014 '+esc(ap.name)+'</title><style>@page{margin:10mm}*{box-sizing:border-box}'+
    'body{font-family:Arial,sans-serif;margin:0;color:#15202b}h1{font-size:14px;margin:0 0 8px}'+
    '.grid{display:flex;flex-wrap:wrap;gap:8px}.lbl{width:31%;border:1px solid #cdd7e1;border-radius:6px;padding:8px;display:flex;gap:8px;page-break-inside:avoid}'+
    '.qr img{width:120px;height:120px}.noqr{width:120px;height:120px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#94a3b8;border:1px dashed #cbd5e1;text-align:center}'+
    '.meta{flex:1;min-width:0}.nm{font-weight:700;font-size:12px}.sub{font-size:10px;color:#5b6b7e;margin:2px 0}.lk{font-size:7.5px;color:#94a3b8;word-break:break-all}</style></head><body>'+
    '<h1>'+esc(ap.name)+' \u2014 Task QR labels'+(haveQR?'':' (QR library offline \u2014 deep-links shown as text)')+'</h1><div class="grid">'+cells+'</div>'+
    '<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},300);}</scr'+'ipt></body></html>');
  w.document.close(); }

/* ---- QR: camera scan (uses html5-qrcode if loaded) ---- */
let CI_SCANNER=null;
function ciScan(){ if(!scanLibReady()){ toast("Scanner library not loaded \u2014 use manual check-in (online enables the camera)","warn"); return; }
  openModal("Scan task QR", '<div id="ci-reader" style="width:100%;min-height:260px;background:#000;border-radius:8px"></div><div class="hint">Point the camera at a task label. Make sure a technician is selected first.</div>',
    '<button class="btn" data-act="ci-scan-stop">Close</button>');
  setTimeout(()=>{ try{ CI_SCANNER=new window.Html5Qrcode("ci-reader");
    CI_SCANNER.start({facingMode:"environment"},{fps:10,qrbox:220}, (txt)=>{ const m=(txt||"").match(/task=([\w-]+)/)||(/^[\w-]+$/.test(txt||"")?[null,txt]:null);
      const id=m&&m[1]; const tk=id&&byId(State.tasks,id); if(tk){ ciScanStop(); const st=byId(State.stages,tk.stageId);
        if(st){ State.ui.checkinAircraft=st.aircraftId; State.ui.activeProgram=tk.programId; } State.ui.checkinTask=tk.id;
        closeModal(); render(); if(State.ui.checkinTech) ciStart(); else toast("Scanned "+tk.name+" \u2014 pick a technician, then Check in"); } },
      ()=>{}); }catch(e){ toast("Camera error: "+e.message,"warn"); } }, 120); }
function ciScanStop(){ if(CI_SCANNER){ try{ CI_SCANNER.stop().then(()=>{try{CI_SCANNER.clear();}catch(_){}}); }catch(_){} CI_SCANNER=null; } }

function viewCheckin(){
  const ap=activeProgram();
  if(!ap) return viewHead("Check-in","Shop-floor time tracking")+emptyState("lock","No active program","Open a program to check technicians into tasks and track time.","");
  const techs=State.technicians||[]; const sessions=State.timeSessions||[]; const open=sessions.filter(s=>!s.endMs);
  const acs=State.aircraft.filter(a=>a.programId===ap.id);
  const acSel= State.ui.checkinAircraft && acs.some(a=>a.id===State.ui.checkinAircraft)? State.ui.checkinAircraft : (acs[0]&&acs[0].id);
  const stageIds=State.stages.filter(s=>s.aircraftId===acSel).map(s=>s.id);
  const tasks=State.tasks.filter(t=>stageIds.includes(t.stageId)).sort((a,b)=>((a.seq||0)-(b.seq||0))||a.wbsCode.localeCompare(b.wbsCode,undefined,{numeric:true}));
  const taskSel= State.ui.checkinTask && tasks.some(t=>t.id===State.ui.checkinTask)? State.ui.checkinTask : (tasks[0]&&tasks[0].id);
  const techSel= State.ui.checkinTech && techs.some(t=>t.id===State.ui.checkinTech)? State.ui.checkinTech : (techs[0]&&techs[0].id);
  if(taskSel!==State.ui.checkinTask) State.ui.checkinTask=taskSel; if(techSel!==State.ui.checkinTech) State.ui.checkinTech=techSel; if(acSel!==State.ui.checkinAircraft) State.ui.checkinAircraft=acSel;
  const techOpts=techs.map(t=>`<option value="${t.id}" ${t.id===techSel?"selected":""}>${esc(t.name)}</option>`).join("")||'<option value="">— none —</option>';
  const acOpts=acs.map(a=>`<option value="${a.id}" ${a.id===acSel?"selected":""}>${esc(a.serialNumber)}</option>`).join("");
  const taskOpts=tasks.map(t=>`<option value="${t.id}" ${t.id===taskSel?"selected":""}>#${t.seq||1} ${esc(t.wbsCode)} ${esc(t.name)} \u2014 ${t.percentComplete||0}%</option>`).join("")||'<option value="">— no tasks —</option>';

  const openRows= open.length? open.map(s=>{ const tk=byId(State.tasks,s.taskId); const st=tk?byId(State.stages,tk.stageId):null; const acn= st?byId(State.aircraft,st.aircraftId):null;
    return `<div class="panel" style="margin-bottom:8px"><div class="panel-b" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:160px"><b>${tk?esc(tk.name):"—"}</b><div class="muted" style="font-size:11px">${acn?esc(acn.serialNumber):""} \u00b7 ${esc(s.techName||"")}${(s.workers||1)>1?" \u00b7 "+s.workers+" workers":""}</div></div>
      <div class="mono" style="font-size:18px;min-width:96px;text-align:right" id="ci-el-${s.id}">${ciFmtDur(Date.now()-s.startMs)}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <label class="muted" style="font-size:11px">%</label><input type="number" min="0" max="100" value="${tk?tk.percentComplete||0:0}" data-act="ci-progress" data-id="${s.taskId}" style="width:58px;background:var(--panel-2);border:1px solid var(--line-2);color:var(--ink);border-radius:6px;padding:4px 6px">
        <button class="btn sm" data-act="ci-pause" data-id="${s.id}">${icon("pause","ico")} Check out</button>
        <button class="btn sm primary" data-act="ci-complete" data-id="${s.id}">${icon("check","ico")} Complete</button>
      </div></div></div>`; }).join("") : `<div class="muted" style="padding:8px">No one checked in right now.</div>`;

  const done=sessions.filter(s=>s.endMs).slice(-8).reverse();
  const doneRows= done.length? done.map(s=>{ const tk=byId(State.tasks,s.taskId); return `<tr><td>${esc(s.techName||"")}</td><td>${tk?esc(tk.name):"—"}</td><td class="num">${round((s.endMs-s.startMs)/HOUR,2)}h</td><td>${fmtDateTime(s.endMs)}</td></tr>`; }).join("") : `<tr><td colspan="4" class="muted">No completed sessions yet.</td></tr>`;

  return viewHead("Check-in", esc(ap.name)+" \u00b7 shop-floor time tracking",
    `${scanLibReady()?`<button class="btn sm" data-act="ci-scan">${icon("aircraft","ico")} Scan QR</button>`:""}
     <button class="btn sm" data-act="ci-print-qr">${icon("printer","ico")} Print QR labels…</button>`)+`
    <div class="split">
      <div class="panel"><div class="panel-h"><span class="eyebrow">Manual check-in</span><h3>Check a technician into a task</h3></div>
        <div class="panel-b">
          <div class="field"><label>Technician</label><div style="display:flex;gap:6px">
            <select data-act="ci-set-tech" style="flex:1">${techOpts}</select>
            <button class="btn sm" data-act="ci-add-tech">${icon("plus","ico")} Add</button></div></div>
          <div class="field"><label>Aircraft</label><select data-act="ci-set-aircraft">${acOpts||'<option>— none —</option>'}</select></div>
          <div class="field"><label>Task</label><select data-act="ci-set-task">${taskOpts}</select></div>
          <div class="field"><label>Workers on this check-in</label><input type="number" min="1" max="99" value="${State.ui.checkinWorkers||1}" data-act="ci-set-workers" style="width:90px">
            <div class="hint" style="margin-top:3px">Actual labour hours = <b>workers \u00d7 time</b>. A 3-worker check-in for 2 h logs 6 person-hours.</div></div>
          <button class="btn primary" style="width:100%;margin-top:4px" data-act="ci-start">${icon("play","ico")} Check in &amp; start timer</button>
          <div style="border-top:1px solid var(--line);margin:12px 0 8px;padding-top:10px">
            <div class="muted" style="font-size:11px;margin-bottom:6px">Or log time already worked (no timer):</div>
            <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap">
              <div><label class="muted" style="font-size:10px">Workers</label><input id="ci_lm_workers" type="number" min="1" max="99" value="1" style="width:74px"></div>
              <div><label class="muted" style="font-size:10px">Hours each</label><input id="ci_lm_hours" type="number" min="0" step="0.25" value="0" style="width:84px"></div>
              <button class="btn sm" data-act="ci-log-manual">${icon("plus","ico")} Log</button>
            </div></div>
          <div class="hint">No QR needed \u2014 this works on any device. QR is optional: print labels above and (when online) tap <b>Scan QR</b> to check in by camera. Time is added to the task\u2019s <b>actual labour hours</b> (person-hours) and feeds efficiency &amp; the learning curve.</div>
        </div></div>
      <div class="panel"><div class="panel-h"><span class="eyebrow">${open.length} active</span><h3>Currently checked in</h3></div>
        <div class="panel-b">${openRows}</div></div>
    </div>
    <div class="panel" style="margin-top:12px"><div class="panel-h"><span class="eyebrow">Recent</span><h3>Completed sessions</h3>
      <span class="spacer"></span>${techs.length?`<span class="muted" style="font-size:11px">${techs.length} technician(s)</span>`:""}</div>
      <div class="panel-b"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Technician</th><th>Task</th><th class="num">Logged</th><th>When</th></tr></thead><tbody>${doneRows}</tbody></table></div></div></div>`;
}

function setupPWA(){
  try{
    const svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='104' fill='#0a0e14'/><rect x='40' y='40' width='432' height='432' rx='72' fill='none' stroke='#38bdf8' stroke-width='10' opacity='0.5'/><text x='50%' y='60%' font-size='205' text-anchor='middle' fill='#38bdf8' font-family='Arial,Helvetica,sans-serif' font-weight='bold'>AP</text></svg>";
    const icon="data:image/svg+xml;utf8,"+encodeURIComponent(svg);
    [["icon"],["apple-touch-icon"]].forEach(([rel])=>{ let l=document.querySelector("link[rel='"+rel+"']"); if(!l){ l=document.createElement("link"); l.rel=rel; document.head.appendChild(l); } l.href=icon; });
    const here=(location.href||"").split("#")[0]; const scope=here.replace(/[^/]*$/,"");
    const mani={ name:"AeroPlan Pro", short_name:"AeroPlan", description:"UAV manufacturing planning & MES", start_url:here||".", scope:scope||"./", display:"standalone", orientation:"any", background_color:"#0a0e14", theme_color:"#0a0e14",
      icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any"},{src:icon,sizes:"192x192",type:"image/svg+xml",purpose:"maskable"}] };
    let ml=document.getElementById("manifest-link"); if(!ml){ ml=document.createElement("link"); ml.rel="manifest"; ml.id="manifest-link"; document.head.appendChild(ml); }
    try{ ml.href=URL.createObjectURL(new Blob([JSON.stringify(mani)],{type:"application/manifest+json"})); }
    catch(_){ ml.href="data:application/manifest+json,"+encodeURIComponent(JSON.stringify(mani)); }
    if("serviceWorker" in navigator && /^https?:$/.test(location.protocol)){
      const sw="self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open('aeroplan-v1').then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(resp=>{try{c.put(e.request,resp.clone());}catch(_){ } return resp;}).catch(()=>c.match(e.request)))));});";
      try{ navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"text/javascript"}))).catch(()=>{}); }catch(_){}
    }
  }catch(_){}
}

async function init(){
  els.root=document.getElementById("root");
  els.modal=document.getElementById("modal-root");
  setupPWA();
  try{ await Persist.open(); }catch(e){ /* falls back to memory */ }
  let loaded=null;
  try{ loaded=await Persist.load(); }catch(e){ loaded=null; }
  if(loaded && Array.isArray(loaded.programs) && loaded.programs.length){
    applySnapshot(loaded);
    if(!State.ui.activeProgram && State.programs[0]) State.ui.activeProgram=State.programs[0].id;
  } else {
    seedIfEmpty();
  }
  normalizeCalendars(); normalizeTasks();
  State.technicians=State.technicians||[]; State.timeSessions=State.timeSessions||[];
  { const hm=(location.hash||"").match(/task=([\w-]+)/);
    if(hm){ const tk=byId(State.tasks,hm[1]); if(tk){ const st=byId(State.stages,tk.stageId);
      State.ui.activeProgram=tk.programId; State.ui.module="checkin"; State.ui.checkinTask=tk.id; if(st) State.ui.checkinAircraft=st.aircraftId; } } }
  applyTheme();
  render();
  // first-time persist so a reload restores even without an explicit save
  persist();
}

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", init);
else init();
</script>
